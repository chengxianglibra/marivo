fail_fast: true  # 任意hook失败立即停止，避免lint失败时跑pytest

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        additional_dependencies: [types-PyYAML, types-PyMySQL, pydantic, fastapi, starlette]
        args: [--strict, --ignore-missing-imports]
        files: ^marivo/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-toml

  - repo: local
    hooks:
      - id: lint-imports
        name: lint-imports
        entry: .venv/bin/lint-imports
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: .venv/bin/pytest
        language: system
        types: [python]
        pass_filenames: false
        args: [-x, -q]
