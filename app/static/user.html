<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factum Analytics</title>
<link rel="stylesheet" href="/static/shared.css">
<style>
/* ── Page-specific overrides ────────────────────────────── */

/* Detail panel (sessions/plans drill-down) */
.detail-back { cursor: pointer; color: var(--color-primary); font-size: var(--font-size-sm); margin-bottom: var(--space-md); display: inline-flex; align-items: center; gap: 4px; }
.detail-back:hover { color: var(--color-primary-hover); }
.detail-meta { display: grid; grid-template-columns: 140px 1fr; gap: 4px 12px; font-size: var(--font-size-base); margin-bottom: var(--space-lg); }
.detail-meta dt { color: var(--color-text-secondary); font-weight: 500; }
.detail-meta dd { color: var(--color-text); word-break: break-all; }

/* Toolbar */
.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-md); }
.toolbar h2 { margin-bottom: 0; }

/* Inline form row */
.inline-form { display: flex; gap: var(--space-sm); align-items: flex-end; flex-wrap: wrap; margin-bottom: var(--space-md); }
.inline-form .form-group { margin-bottom: 0; }

/* Step builder list */
.step-list-item { background: #f8fafc; border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-sm) var(--space-md); margin-bottom: 6px; font-size: var(--font-size-sm); display: flex; justify-content: space-between; align-items: center; }
.step-list-item .step-info { flex: 1; }
.step-list-item .step-remove { cursor: pointer; color: var(--color-error); font-weight: 600; margin-left: var(--space-sm); }

/* Checkbox label */
.checkbox-label { display: inline-flex; align-items: center; gap: 6px; font-size: var(--font-size-sm); cursor: pointer; }

/* Spinner (for inline loading) */
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--color-border); border-top-color: var(--color-primary); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Evidence dashboard */
.ev-summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: var(--space-md); margin-bottom: var(--space-xl); }
.ev-claim-row { display: flex; align-items: center; gap: var(--space-md); }
.ev-claim-row .ev-claim-text { flex: 1; }
.ev-claim-row .ev-claim-conf { width: 180px; display: flex; align-items: center; gap: var(--space-sm); }
.ev-donut-row { display: flex; flex-wrap: wrap; gap: var(--space-xl); margin-bottom: var(--space-lg); align-items: flex-start; }
.ev-donut-item { text-align: center; }
.ev-donut-item .ev-donut-label { font-size: var(--font-size-xs); color: var(--color-text-secondary); margin-top: 4px; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Recommendation cards */
.rec-card { margin-bottom: var(--space-md); padding: var(--space-lg); border-radius: var(--radius-lg); background: var(--color-surface); border: 1px solid var(--color-border); }
.rec-card .rec-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--space-sm); }
.rec-card .rec-action { font-weight: 500; flex: 1; }
.rec-card .rec-meta { font-size: var(--font-size-sm); color: var(--color-text-secondary); display: flex; gap: var(--space-lg); margin-top: var(--space-xs); }

/* Plan step cards */
.plan-step-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--space-md); }
.plan-step-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-lg); }
.plan-step-card .psc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-sm); }
.plan-step-card .psc-type { font-weight: 600; font-size: var(--font-size-base); }
.plan-step-card .psc-deps { font-size: var(--font-size-xs); color: var(--color-text-muted); margin-top: var(--space-xs); }
.plan-step-card .psc-result { margin-top: var(--space-md); padding-top: var(--space-md); border-top: 1px solid var(--color-border); }
.plan-step-card .psc-result-label { font-size: var(--font-size-xs); color: var(--color-text-secondary); font-weight: 600; margin-bottom: var(--space-xs); text-transform: uppercase; letter-spacing: 0.03em; }
.plan-step-card .psc-result-meta { font-size: var(--font-size-xs); color: var(--color-text-muted); margin-top: var(--space-xs); }
.plan-step-card .psc-result-note { font-size: var(--font-size-xs); color: var(--color-text-muted); margin-top: var(--space-xs); }
.plan-step-card .psc-result pre { margin: var(--space-sm) 0 0; max-height: 220px; overflow: auto; }

/* Catalog search result cards */
.cat-result-card { display: flex; align-items: flex-start; gap: var(--space-md); padding: var(--space-md) var(--space-lg); border: 1px solid var(--color-border); border-radius: var(--radius-lg); margin-bottom: var(--space-sm); background: var(--color-surface); transition: box-shadow var(--transition-fast); }
.cat-result-card:hover { box-shadow: var(--shadow-md); }
.cat-result-icon { width: 36px; height: 36px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.cat-result-icon.type-entity { background: var(--color-info-bg); color: var(--color-info); }
.cat-result-icon.type-metric { background: var(--color-success-bg); color: var(--color-success); }
.cat-result-icon.type-asset { background: var(--color-warning-bg); color: var(--color-warning); }
.cat-result-body { flex: 1; min-width: 0; }
.cat-result-body .cat-name { font-weight: 600; font-size: var(--font-size-base); }
.cat-result-body .cat-display { font-size: var(--font-size-sm); color: var(--color-text-secondary); }
.cat-result-body .cat-desc { font-size: var(--font-size-sm); color: var(--color-text-muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Resolve structured layout */
.resolve-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-lg); margin-top: var(--space-md); }
@media (max-width: 768px) { .resolve-grid { grid-template-columns: 1fr; } }

/* Auto-refresh countdown */
.refresh-indicator { display: inline-flex; align-items: center; gap: 4px; font-size: var(--font-size-xs); color: var(--color-text-muted); }
.refresh-indicator .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-success); animation: pulse-dot 2s ease-in-out infinite; }

/* Readiness signal panel (M-04) */
.readiness-panel { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-lg); margin-bottom: var(--space-md); }
.readiness-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-md); }
.readiness-header h3 { margin: 0; font-size: var(--font-size-base); font-weight: 600; }
.readiness-dim { display: grid; grid-template-columns: 160px 1fr 44px; align-items: center; gap: var(--space-sm); margin-bottom: var(--space-xs); }
.readiness-dim-label { font-size: var(--font-size-sm); color: var(--color-text-secondary); }
.readiness-dim-val { font-size: var(--font-size-sm); font-weight: 600; text-align: right; }
.badge-action-synthesize { background: var(--color-success-bg); color: var(--color-success); }
.badge-action-stop { background: var(--color-error-bg); color: var(--color-error); }
.badge-action-resolve { background: var(--color-warning-bg); color: var(--color-warning); }
.badge-action-explore { background: var(--color-info-bg); color: var(--color-info); }

/* Live claims mini-table (M-04) */
.live-claims-panel { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-lg); margin-bottom: var(--space-md); }
.live-claims-panel h3 { margin: 0 0 var(--space-sm); font-size: var(--font-size-base); font-weight: 600; }

/* Graph container override for catalog */
#cat-graph-vis { min-height: 400px; }

/* Causal basis inline panel (M-10) */
.causal-basis-block { margin-top: var(--space-sm); padding: var(--space-sm) var(--space-md); background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: var(--font-size-xs); }
.causal-basis-block .cb-label { font-weight: 600; color: var(--color-text-secondary); margin-bottom: 2px; }

/* Reflection context panel (M-11) */
.reflection-panel { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-lg); margin-bottom: var(--space-md); }
.reflection-panel h3 { margin: 0 0 var(--space-md); font-size: var(--font-size-base); font-weight: 600; }

/* Evidence gap list (M-11) */
.gap-row { display: flex; flex-direction: column; gap: 2px; padding: var(--space-sm) 0; border-bottom: 1px solid var(--color-border); }
.gap-row:last-child { border-bottom: none; }
.gap-row .gap-title { font-weight: 500; font-size: var(--font-size-sm); }
.gap-row .gap-meta { font-size: var(--font-size-xs); color: var(--color-text-muted); }
</style>
</head>
<body>

<div class="app-layout">
  <!-- ── Sidebar ──────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      Factum
      <small>Analytics</small>
    </div>

    <div class="sidebar-section">Discovery</div>
    <ul class="sidebar-nav">
      <li class="active">
        <button data-tab="catalog">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span class="nav-label">Catalog</span>
        </button>
      </li>
    </ul>

    <div class="sidebar-section">Analysis</div>
    <ul class="sidebar-nav">
      <li>
        <button data-tab="sessions">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>
          </svg>
          <span class="nav-label">Sessions</span>
        </button>
      </li>
      <li>
        <button data-tab="evidence">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
          </svg>
          <span class="nav-label">Evidence</span>
        </button>
      </li>
      <li>
        <button data-tab="plans">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/>
          </svg>
          <span class="nav-label">Plans</span>
        </button>
      </li>
    </ul>

    <div class="sidebar-section">Execution</div>
    <ul class="sidebar-nav">
      <li>
        <button data-tab="jobs">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
          <span class="nav-label">Jobs</span>
        </button>
      </li>
    </ul>

    <div class="sidebar-footer">
      <a href="/admin">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>Admin UI</span>
      </a>
    </div>
  </aside>

  <!-- ── Content Area ─────────────────────────────────────── -->
  <div class="content-area">
    <div class="content-header">
      <div class="breadcrumb">
        <span>Analytics</span>
        <span class="sep">/</span>
        <span class="current">Catalog</span>
      </div>
    </div>

    <div class="content-body">
      <!-- Catalog -->
      <div class="panel active" id="panel-catalog"></div>
      <!-- Sessions -->
      <div class="panel" id="panel-sessions"></div>
      <!-- Evidence -->
      <div class="panel" id="panel-evidence"></div>
      <!-- Plans -->
      <div class="panel" id="panel-plans"></div>
      <!-- Jobs -->
      <div class="panel" id="panel-jobs"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header" style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--color-border);">
      <h3 id="modal-title"></h3>
      <button class="modal-close" id="modal-close" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--color-text-muted);">&times;</button>
    </div>
    <div class="modal-body" id="modal-body" style="padding:20px;"></div>
    <div class="modal-footer" id="modal-footer" style="padding:12px 20px;border-top:1px solid var(--color-border);display:flex;justify-content:flex-end;gap:8px;"></div>
  </div>
</div>

<script src="/static/shared.js"></script>
<script>
// ── Helpers ────────────────────────────────────────────────
const $ = (sel, ctx = document) => ctx.querySelector(sel);
const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

function parseJSON(s, fallback) { try { return JSON.parse(s); } catch { return fallback; } }

// ── Modal (local wrappers that match old API: title, bodyHtml, footerHtml) ─
function openModal(title, bodyHtml, footerHtml) {
  $('#modal-title').textContent = title;
  $('#modal-body').innerHTML = bodyHtml;
  $('#modal-footer').innerHTML = footerHtml;
  $('#modal-overlay').classList.add('open');
}
function closeModal() { $('#modal-overlay').classList.remove('open'); }
$('#modal-close').onclick = closeModal;
$('#modal-overlay').onclick = (e) => { if (e.target === e.currentTarget) closeModal(); };

// ── API ────────────────────────────────────────────────────
const localApi = {
  async _fetch(path, opts = {}) {
    const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
    if (!res.ok) { const body = await res.json().catch(() => ({})); throw new Error(body.detail || `HTTP ${res.status}`); }
    return res.json();
  },
  // Catalog
  getCatalog: () => localApi._fetch('/catalog'),
  searchCatalog: (q, type) => localApi._fetch('/catalog/search?' + new URLSearchParams({q, ...(type ? {type} : {})})),
  resolveTerm: (name) => localApi._fetch(`/semantic/resolve/${encodeURIComponent(name)}`),
  catalogGraph: (root, depth) => localApi._fetch(`/catalog/graph?root=${encodeURIComponent(root)}&depth=${depth}`),
  // Sessions
  listSessions: (params) => localApi._fetch('/sessions' + (params ? '?' + new URLSearchParams(params) : '')),
  createSession: (d) => localApi._fetch('/sessions', { method: 'POST', body: JSON.stringify(d) }),
  getSession: (id) => localApi._fetch(`/sessions/${id}`),
  runStep: (id, stepType, params) => localApi._fetch(`/sessions/${id}/steps/${stepType}`, { method: 'POST', body: JSON.stringify(params || {}) }),
  // Evidence
  getEvidence: (id) => localApi._fetch(`/sessions/${id}/evidence`),
  // Plans
  listPlans: (sessionId) => localApi._fetch(`/sessions/${sessionId}/plans`),
  getPlan: (sessionId, planId) => localApi._fetch(`/sessions/${sessionId}/plans/${planId}`),
  draftPlan: (sessionId, steps) => localApi._fetch(`/sessions/${sessionId}/plans`, { method: 'POST', body: JSON.stringify({steps}) }),
  validatePlan: (sid, pid) => localApi._fetch(`/sessions/${sid}/plans/${pid}/validate`, { method: 'POST' }),
  approvePlan: (sid, pid) => localApi._fetch(`/sessions/${sid}/plans/${pid}/approve`, { method: 'POST' }),
  executePlan: (sid, pid) => localApi._fetch(`/sessions/${sid}/plans/${pid}/execute`, { method: 'POST' }),
  estimateCosts: (sid, pid) => localApi._fetch(`/sessions/${sid}/plans/${pid}/estimate-costs`, { method: 'POST' }),
  budgetCheck: (sid, pid) => localApi._fetch(`/sessions/${sid}/plans/${pid}/budget-check`),
  explainPlan: (sid, pid) => localApi._fetch(`/sessions/${sid}/plans/${pid}/explain`),
  // Reflection Context (M-11)
  getReflectionContext: (id, planId) => localApi._fetch(`/sessions/${id}/reflection-context` + (planId ? `?plan_id=${encodeURIComponent(planId)}` : '')),
  // Plan Patch (M-11)
  patchPlan: (sid, pid, patch) => localApi._fetch(`/sessions/${sid}/plans/${pid}/patch`, { method: 'POST', body: JSON.stringify(patch) }),
  // Semantic entity patch (G-5d)
  patchEntityProperties: (entityId, properties) => localApi._fetch(`/semantic/entities/${encodeURIComponent(entityId)}/properties`, { method: 'PATCH', body: JSON.stringify({ properties }) }),
  // Jobs
  listJobs: (params) => localApi._fetch('/jobs' + (params ? '?' + new URLSearchParams(params) : '')),
  submitJob: (d) => localApi._fetch('/jobs', { method: 'POST', body: JSON.stringify(d) }),
  getJob: (id) => localApi._fetch(`/jobs/${id}`),
  cancelJob: (id) => localApi._fetch(`/jobs/${id}/cancel`, { method: 'POST' }),
};

// ── Tab switching (use shared initSidebar via DOMContentLoaded) ──
const renderers = {};
window.addEventListener('tab-change', (e) => {
  const tab = e.detail.tab;
  if (renderers[tab]) renderers[tab]();
});

// ── SVG icon helpers ───────────────────────────────────────
function catTypeIcon(type) {
  const t = (type || '').toLowerCase();
  if (t === 'entity') return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>';
  if (t === 'metric') return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>';
  return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><polyline points="16 7 16 2 8 2 8 7"/></svg>';
}

// ════════════════════════════════════════════════════════════
// ── Catalog Tab ────────────────────────────────────────────
// ════════════════════════════════════════════════════════════
renderers.catalog = async () => {
  const panel = $('#panel-catalog');
  panel.innerHTML = `
    <!-- Search bar -->
    <div class="search-bar" id="cat-search-bar">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="cat-search-q" placeholder="Search catalog... (entities, metrics, assets)" autocomplete="off">
      <select id="cat-search-type" style="width:auto;border:none;background:transparent;font-size:var(--font-size-sm);color:var(--color-text-secondary);outline:none;cursor:pointer;">
        <option value="">All types</option>
        <option value="entity">Entities</option>
        <option value="metric">Metrics</option>
        <option value="asset">Assets</option>
      </select>
      <button class="btn btn-primary btn-sm" id="cat-search-btn">Search</button>
    </div>

    <!-- Search results -->
    <div id="cat-search-results"></div>

    <!-- Overview (stat cards + tables) -->
    <div class="card" id="cat-overview-card">
      <h2>Catalog Overview</h2>
      <div id="cat-overview-content"><span class="spinner"></span></div>
    </div>

    <!-- Resolve -->
    <div class="card" id="cat-resolve-card">
      <h2>Resolve Term</h2>
      <div class="inline-form">
        <div class="form-group"><label>Term Name</label><input id="cat-resolve-name" placeholder="e.g. watch_time"></div>
        <button class="btn btn-primary" id="cat-resolve-btn">Resolve</button>
      </div>
      <div id="cat-resolve-results"></div>
    </div>

    <!-- Graph -->
    <div class="card" id="cat-graph-card">
      <h2>Catalog Graph</h2>
      <div class="inline-form">
        <div class="form-group"><label>Root ID</label><input id="cat-graph-root" placeholder="ent_... or met_..."></div>
        <div class="form-group"><label>Depth</label><input id="cat-graph-depth" type="number" value="2" min="1" max="5" style="width:80px;"></div>
        <button class="btn btn-primary" id="cat-graph-btn">Load Graph</button>
      </div>
      <div id="cat-graph-results"></div>
    </div>`;

  // Search handler — enter key support
  $('#cat-search-q').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') $('#cat-search-btn').click();
  });

  // Search handler
  $('#cat-search-btn').onclick = async () => {
    const q = $('#cat-search-q').value.trim();
    if (!q) { toast('Enter a search query', 'error'); return; }
    const type = $('#cat-search-type').value;
    const area = $('#cat-search-results');
    area.innerHTML = '<div style="text-align:center;padding:var(--space-xl);"><span class="spinner"></span></div>';
    try {
      const results = await localApi.searchCatalog(q, type);
      const items = results.results || results;
      if (!items || !items.length) { area.innerHTML = '<div class="card"><p class="empty">No results found.</p></div>'; return; }
      area.innerHTML = items.map(r => {
        const t = (r.type || '').toLowerCase();
        const iconCls = t === 'entity' ? 'type-entity' : t === 'metric' ? 'type-metric' : 'type-asset';
        return `<div class="cat-result-card">
          <div class="cat-result-icon ${iconCls}">${catTypeIcon(r.type)}</div>
          <div class="cat-result-body">
            <div class="cat-name">${esc(r.name)}</div>
            <div class="cat-display">${esc(r.display_name || '')} ${statusBadge(r.type)}</div>
            <div class="cat-desc">${esc(truncate(r.description || '', 120))}</div>
          </div>
        </div>`;
      }).join('');
    } catch (err) { area.innerHTML = ''; toast(err.message, 'error'); }
  };

  // Resolve handler
  $('#cat-resolve-btn').onclick = async () => {
    const name = $('#cat-resolve-name').value.trim();
    if (!name) { toast('Enter a term name', 'error'); return; }
    const area = $('#cat-resolve-results');
    area.innerHTML = '<span class="spinner"></span>';
    try {
      const res = await localApi.resolveTerm(name);
      const sem = res.semantic_object || {};
      let html = '<div class="resolve-grid">';
      // Left: definition
      html += '<div class="card" style="margin-bottom:0;">';
      html += '<h2 style="font-size:var(--font-size-base);">Definition</h2>';
      html += `<dl class="detail-meta">
        <dt>Name</dt><dd>${esc(sem.name || '')}</dd>
        <dt>Display Name</dt><dd>${esc(sem.display_name || '')}</dd>
        <dt>Resolved Type</dt><dd>${statusBadge(res.resolved_type || '')}</dd>
        <dt>Status</dt><dd>${statusBadge(sem.status || '')}</dd>
        <dt>Description</dt><dd>${esc(sem.description || '')}</dd>
        ${sem.definition_sql ? `<dt>Definition SQL</dt><dd><code>${esc(sem.definition_sql)}</code></dd>` : ''}
        ${sem.dimensions ? `<dt>Dimensions</dt><dd>${esc(sem.dimensions.join(', '))}</dd>` : ''}
        ${sem.keys ? `<dt>Keys</dt><dd>${esc(sem.keys.join(', '))}</dd>` : ''}
      </dl>`;
      html += '</div>';
      // Right: engine info
      html += '<div class="card" style="margin-bottom:0;">';
      html += '<h2 style="font-size:var(--font-size-base);">Engine Info</h2>';
      if (res.engine_info) {
        html += jsonPre(res.engine_info);
      } else {
        html += '<p class="empty">No engine info available.</p>';
      }
      html += '</div>';
      html += '</div>'; // end resolve-grid

      // Physical assets (full width below)
      const assets = res.physical_assets || res.assets || [];
      if (assets.length) {
        html += '<div class="card" style="margin-top:var(--space-lg);">';
        html += `<h2 style="font-size:var(--font-size-base);">Physical Assets (${assets.length})</h2>`;
        html += `<table><thead><tr><th>Object ID</th><th>FQN</th><th>Type</th><th>Source</th></tr></thead><tbody>${
          assets.map(a => `<tr>
            <td><code>${esc(a.object_id || '')}</code></td>
            <td>${esc(a.fqn || '')}</td>
            <td>${statusBadge(a.object_type || '')}</td>
            <td><code>${esc(a.source_id || '')}</code></td>
          </tr>`).join('')
        }</tbody></table>`;
        html += '</div>';
      }
      area.innerHTML = html;
    } catch (err) { area.innerHTML = ''; toast(err.message, 'error'); }
  };

  // Graph handler
  $('#cat-graph-btn').onclick = async () => {
    const root = $('#cat-graph-root').value.trim();
    const depth = parseInt($('#cat-graph-depth').value, 10);
    if (!root) { toast('Enter a root ID', 'error'); return; }
    if (isNaN(depth) || depth < 1 || depth > 5) { toast('Depth must be 1-5', 'error'); return; }
    const area = $('#cat-graph-results');
    area.innerHTML = '<span class="spinner"></span>';
    try {
      const graph = await localApi.catalogGraph(root, depth);
      const nodes = graph.nodes || [];
      const edges = graph.edges || [];

      let html = '';
      // Force-directed graph visualization
      if (nodes.length) {
        html += '<div class="graph-container" id="cat-graph-vis"></div>';
      }
      // Tables below the graph
      if (nodes.length) {
        html += `<div class="card" style="margin-top:var(--space-lg);"><h2 style="font-size:var(--font-size-base);">Nodes (${nodes.length})</h2>`;
        html += `<table><thead><tr><th>ID</th><th>Type</th><th>Name</th></tr></thead><tbody>${
          nodes.map(n => `<tr><td><code>${esc(n.id || '')}</code></td><td>${statusBadge(n.type || '')}</td><td>${esc(n.name || '')}</td></tr>`).join('')
        }</tbody></table></div>`;
      }
      if (edges.length) {
        html += `<div class="card"><h2 style="font-size:var(--font-size-base);">Edges (${edges.length})</h2>`;
        html += `<table><thead><tr><th>From</th><th>To</th><th>Type</th></tr></thead><tbody>${
          edges.map(e => `<tr><td><code>${esc(e.from || e.source || '')}</code></td><td><code>${esc(e.to || e.target || '')}</code></td><td>${esc(e.type || e.relation || '')}</td></tr>`).join('')
        }</tbody></table></div>`;
      }
      if (!nodes.length && !edges.length) html = '<p class="empty">Empty graph returned.</p>';
      area.innerHTML = html;

      // Render force graph if container exists
      const graphContainer = $('#cat-graph-vis');
      if (graphContainer && nodes.length) {
        const graphNodes = nodes.map(n => ({ id: n.id, label: n.name || n.id, type: n.type }));
        const graphEdges = edges.map(e => ({ from: e.from || e.source, to: e.to || e.target, label: e.type || e.relation || '' }));
        renderForceGraph(graphContainer, graphNodes, graphEdges);
      }
    } catch (err) { area.innerHTML = ''; toast(err.message, 'error'); }
  };

  // Overview (load on tab open)
  try {
    const catalog = await localApi.getCatalog();
    const area = $('#cat-overview-content');
    const entities = catalog.entities || [];
    const metrics = catalog.metrics || [];
    const assets = catalog.assets || [];

    let html = '';
    // Stat cards
    html += '<div class="stat-grid">';
    html += `<div class="stat-card stat-info"><div class="stat-label">Entities</div><div class="stat-value">${entities.length}</div></div>`;
    html += `<div class="stat-card stat-success"><div class="stat-label">Metrics</div><div class="stat-value">${metrics.length}</div></div>`;
    html += `<div class="stat-card stat-warning"><div class="stat-label">Assets</div><div class="stat-value">${assets.length}</div></div>`;
    html += '</div>';

    if (entities.length) {
      html += `<h3 style="font-size:var(--font-size-base);font-weight:600;margin:0 0 var(--space-sm);">Entities</h3>`;
      html += `<table><thead><tr><th>Name</th><th>Keys</th></tr></thead><tbody>${
        entities.map(e => `<tr>
          <td><strong>${esc(e.name || e.id || '')}</strong></td><td><code>${esc((e.keys || []).join(', '))}</code></td>
        </tr>`).join('')
      }</tbody></table>`;
    }
    if (metrics.length) {
      html += `<h3 style="font-size:var(--font-size-base);font-weight:600;margin:var(--space-lg) 0 var(--space-sm);">Metrics</h3>`;
      html += `<table><thead><tr><th>Name</th><th>Label</th><th>Definition</th><th>Dimensions</th></tr></thead><tbody>${
        metrics.map(m => `<tr>
          <td><strong>${esc(m.name || m.id || '')}</strong></td><td>${esc(m.label || m.display_name || '')}</td><td><code>${esc(m.definition || '')}</code></td><td>${esc((m.dimensions || []).join(', '))}</td>
        </tr>`).join('')
      }</tbody></table>`;
    }
    if (assets.length) {
      html += `<h3 style="font-size:var(--font-size-base);font-weight:600;margin:var(--space-lg) 0 var(--space-sm);">Assets</h3>`;
      html += `<table><thead><tr><th>Name</th><th>Engine</th><th>Kind</th><th>Row Count</th></tr></thead><tbody>${
        assets.map(a => `<tr>
          <td><strong>${esc(a.id || a.name || '')}</strong></td><td>${esc(a.engine || '')}</td><td>${statusBadge(a.kind || a.type || '')}</td><td>${a.row_count != null ? Number(a.row_count).toLocaleString() : 'N/A'}</td>
        </tr>`).join('')
      }</tbody></table>`;
    }
    if (!entities.length && !metrics.length && !assets.length) {
      html = '<p class="empty">Catalog is empty. Create entities and metrics in the Admin UI.</p>';
    }
    area.innerHTML = html;
  } catch (err) { $('#cat-overview-content').innerHTML = `<p class="empty">Failed to load catalog: ${esc(err.message)}</p>`; }
};

renderers.sessions = async () => {
  const panel = $('#panel-sessions');
  panel.innerHTML = `<div class="card">
    <div class="toolbar"><h2>Sessions</h2><button class="btn btn-primary" id="create-session-btn">+ Create Session</button></div>
    <table><thead><tr><th>ID</th><th>Goal</th><th>Status</th><th>Created</th></tr></thead>
    <tbody id="sessions-tbody">${loadingRow(4)}</tbody></table></div>`;

  $('#create-session-btn').onclick = () => {
    openModal('Create Session',
      `<div class="form-group"><label>Goal</label><textarea id="f-sess-goal" placeholder="Investigate the recent watch time decline"></textarea></div>
       <div class="form-group"><label>Constraints (JSON)</label><textarea id="f-sess-constraints">{}</textarea></div>
       <div class="form-group"><label>Budget (JSON)</label><textarea id="f-sess-budget">{}</textarea></div>
       <div class="form-group"><label>Policy (JSON)</label><textarea id="f-sess-policy">{}</textarea></div>`,
      `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="f-sess-submit">Create</button>`);
    $('#f-sess-submit').onclick = async () => {
      try {
        const goal = $('#f-sess-goal').value.trim();
        if (!goal) throw new Error('Goal is required');
        const constraints = parseJSON($('#f-sess-constraints').value, {});
        const budget = parseJSON($('#f-sess-budget').value, null);
        const policy = parseJSON($('#f-sess-policy').value, null);
        const data = { goal, constraints };
        if (budget) data.budget = budget;
        if (policy) data.policy = policy;
        await localApi.createSession(data);
        toast('Session created', 'success');
        closeModal();
        renderers.sessions();
      } catch (err) { toast(err.message, 'error'); }
    };
  };

  try {
    const sessions = await localApi.listSessions();
    const tbody = $('#sessions-tbody');
    if (!sessions.length) { tbody.innerHTML = `<tr><td colspan="4" class="empty">No sessions.</td></tr>`; return; }
    tbody.innerHTML = sessions.map(s => `<tr>
      <td><a href="#" class="sess-link" data-id="${attr(s.session_id)}"><code>${esc(truncate(s.session_id, 20))}</code></a></td>
      <td>${esc(truncate(s.goal || '', 60))}</td>
      <td>${statusBadge(s.status)}</td>
      <td>${fmtDate(s.created_at)}</td>
    </tr>`).join('');
    $$('.sess-link', tbody).forEach(a => a.onclick = (e) => { e.preventDefault(); showSessionDetail(a.dataset.id); });
  } catch (err) { toast(err.message, 'error'); }
};

              <select id="sess-step-type">

}

// ════════════════════════════════════════════════════════════
// ── Step Result Renderer (M-04 Readiness Signal) ───────────
// ════════════════════════════════════════════════════════════

function readinessDimBar(label, value) {
  const pct = Math.round(Math.min(1, Math.max(0, value)) * 100);
  const cls = pct >= 70 ? 'green' : pct >= 30 ? 'yellow' : 'red';
  const cssColor = pct >= 70 ? 'var(--color-success)' : pct >= 30 ? 'var(--color-warning)' : 'var(--color-error)';
  return `<div class="readiness-dim">
    <div class="readiness-dim-label">${esc(label)}</div>
    <div class="progress-bar"><div class="fill ${esc(cls)}" style="width:${pct}%"></div></div>
    <div class="readiness-dim-val" style="color:${cssColor}">${value.toFixed(2)}</div>
  </div>`;
}

function renderReadinessSignal(readiness) {
  const action = readiness.suggested_action || 'continue_exploring';
  const actionCls = action === 'synthesize' ? 'badge-action-synthesize'
    : action === 'stop' ? 'badge-action-stop'
    : action === 'resolve_contradiction' ? 'badge-action-resolve'
    : 'badge-action-explore';
  const actionLabel = action.replace(/_/g, ' ');

  let html = `<div class="readiness-panel">
    <div class="readiness-header">
      <h3>Readiness Signal</h3>
      <span class="badge ${esc(actionCls)}">${esc(actionLabel)}</span>
    </div>`;
  html += readinessDimBar('goal_coverage', readiness.goal_coverage ?? 0);
  html += readinessDimBar('evidence_sufficiency', readiness.evidence_sufficiency ?? 0);
  // contradiction_resolution: 1.0 is good, so invert color logic
  const cr = readiness.contradiction_resolution ?? 1;
  const crPct = Math.round(cr * 100);
  const crCls = crPct >= 100 ? 'green' : crPct >= 50 ? 'yellow' : 'red';
  const crCssColor = crPct >= 100 ? 'var(--color-success)' : crPct >= 50 ? 'var(--color-warning)' : 'var(--color-error)';
  html += `<div class="readiness-dim">
    <div class="readiness-dim-label">contradiction_resolution</div>
    <div class="progress-bar"><div class="fill ${esc(crCls)}" style="width:${crPct}%"></div></div>
    <div class="readiness-dim-val" style="color:${crCssColor}">${cr.toFixed(2)}</div>
  </div>`;
  html += readinessDimBar('budget_remaining', readiness.budget_remaining ?? 1);
  html += readinessDimBar('diminishing_returns', readiness.diminishing_returns ?? 1);
  html += '</div>';
  return html;
}

function renderLiveClaims(claims) {
  if (!claims || !claims.length) return '';
  let html = `<div class="live-claims-panel"><h3>Live Claims (${claims.length})</h3>`;
  html += `<table><thead><tr><th>ID</th><th>Type</th><th>Inference</th><th>Confidence</th><th>Status</th></tr></thead><tbody>`;
  claims.forEach(c => {
    const conf = typeof c.confidence === 'number' ? c.confidence : 0;
    const pct = Math.round(conf * 100);
    const barColor = confidenceColor(conf);
    html += `<tr>
      <td><code>${esc(truncate(c.claim_id || '', 18))}</code></td>
      <td>${statusBadge(c.claim_type || '')}</td>
      <td><span class="badge badge-gray">${esc(c.inference_level || 'L0')}</span></td>
      <td style="min-width:120px;">
        <div style="display:flex;align-items:center;gap:var(--space-xs);">
          <div class="progress-bar" style="flex:1;"><div class="fill ${esc(barColor)}" style="width:${pct}%"></div></div>
          <span style="font-size:var(--font-size-xs);font-weight:600;min-width:30px;">${conf.toFixed(2)}</span>
        </div>
      </td>
      <td>${statusBadge(c.status || '')}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  return html;
}

function renderStepResult(result) {
  let html = '';

  // Readiness signal panel (M-04) — only for non-synthesize steps
  if (result.readiness) {
    html += renderReadinessSignal(result.readiness);
  }

  // Live claims mini-table (M-04)
  if (result.live_claims && result.live_claims.length) {
    html += renderLiveClaims(result.live_claims);
  }

  // Observations summary (if present)
  const observations = result.observations || [];
  if (observations.length) {
    html += `<div class="live-claims-panel"><h3>Observations (${observations.length})</h3>`;
    html += `<table><thead><tr><th>ID</th><th>Type</th><th>Metric</th><th>Slice</th></tr></thead><tbody>`;
    observations.slice(0, 10).forEach(o => {
      const subj = o.subject || {};
      const sliceObj = subj.slice || {};
      const sliceStr = typeof sliceObj === 'string' ? sliceObj : Object.entries(sliceObj).map(([k, v]) => `${k}=${v}`).join(', ');
      html += `<tr>
        <td><code>${esc(truncate(o.observation_id || '', 18))}</code></td>
        <td>${statusBadge(o.type || '')}</td>
        <td>${esc(subj.metric || '')}</td>
        <td>${esc(sliceStr)}</td>
      </tr>`;
    });
    if (observations.length > 10) html += `<tr><td colspan="4" class="empty">... ${observations.length - 10} more</td></tr>`;
    html += '</tbody></table></div>';
  }

  // Raw result (collapsible)
  html += `<div class="card" style="margin-bottom:0;">
    <div class="collapsible-header" id="step-raw-toggle">
      <h3 style="margin:0;font-size:var(--font-size-base);">Raw Result</h3>
      <span class="chevron">&#9654;</span>
    </div>
    <div class="collapsible-body" id="step-raw-body">${jsonPre(result)}</div>
  </div>`;

  return html;
}

// ════════════════════════════════════════════════════════════
// ── Reflection Context Renderer (M-11) ─────────────────────
// ════════════════════════════════════════════════════════════

function renderReflectionContext(area, ctx) {
  let html = '';

  // ── Readiness signal (reuse existing renderer) ────────────
  if (ctx.readiness_signal) {
    html += renderReadinessSignal(ctx.readiness_signal);
  }

  // ── Readiness score ───────────────────────────────────────
  if (ctx.readiness_score != null) {
    const score = ctx.readiness_score;
    const scoreColor = score >= 0.7 ? 'var(--color-success)' : score >= 0.3 ? 'var(--color-warning)' : 'var(--color-error)';
    html += `<div style="margin-bottom:var(--space-md);display:flex;align-items:center;gap:var(--space-md);">
      <span style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">Readiness Score</span>
      <span style="font-size:1.5rem;font-weight:700;color:${scoreColor};">${score.toFixed(2)}</span>
    </div>`;
  }

  // ── Tentative claims ──────────────────────────────────────
  const tentative = ctx.tentative_claims || [];
  html += `<div class="card" style="margin-bottom:var(--space-md);">
    <h3 style="font-size:var(--font-size-base);font-weight:600;margin:0 0 var(--space-sm);">Tentative Claims (${tentative.length})</h3>`;
  if (tentative.length) {
    html += `<table><thead><tr><th>Claim ID</th><th>Inference</th><th>Confidence</th><th>Confounders</th></tr></thead><tbody>`;
    tentative.forEach(c => {
      const conf = typeof c.confidence === 'number' ? c.confidence : 0;
      const pct = Math.round(conf * 100);
      const barColor = confidenceColor(conf);
      const confounders = (c.unresolved_confounders || []).join('; ') || '—';
      html += `<tr>
        <td><code>${esc(truncate(c.claim_id || '', 20))}</code></td>
        <td><span class="badge badge-gray">${esc(c.inference_level || 'L0')}</span></td>
        <td style="min-width:120px;">
          <div style="display:flex;align-items:center;gap:var(--space-xs);">
            <div class="progress-bar" style="flex:1;"><div class="fill ${barColor}" style="width:${pct}%"></div></div>
            <span style="font-size:var(--font-size-xs);font-weight:600;min-width:30px;">${conf.toFixed(2)}</span>
          </div>
        </td>
        <td style="font-size:var(--font-size-xs);color:var(--color-text-muted);">${esc(truncate(confounders, 80))}</td>
      </tr>`;
    });
    html += '</tbody></table>';
  } else {
    html += '<p class="empty">No tentative claims.</p>';
  }
  html += '</div>';

  // ── Evidence gaps ─────────────────────────────────────────
  const gaps = ctx.evidence_gaps || [];
  html += `<div class="card" style="margin-bottom:var(--space-md);">
    <h3 style="font-size:var(--font-size-base);font-weight:600;margin:0 0 var(--space-sm);">Evidence Gaps (${gaps.length})</h3>`;
  if (gaps.length) {
    gaps.forEach(g => {
      const claimsNote = g.affected_claims && g.affected_claims.length
        ? `${g.affected_claims.length} claim${g.affected_claims.length > 1 ? 's' : ''}` : '';
      html += `<div class="gap-row">
        <div class="gap-title"><code>${esc(g.gap_key || '')}</code>${claimsNote ? ` &nbsp;<span class="badge badge-gray">${esc(claimsNote)}</span>` : ''}</div>
        <div class="gap-meta">${esc(g.text || '')}</div>
        ${g.suggested_validation ? `<div class="gap-meta" style="color:var(--color-primary);">Next step: ${esc(g.suggested_validation)}</div>` : ''}
      </div>`;
    });
  } else {
    html += '<p class="empty">No evidence gaps.</p>';
  }
  html += '</div>';

  // ── Available step types ──────────────────────────────────
  const stepTypes = ctx.available_step_types || [];
  if (stepTypes.length) {
    html += `<div class="card" style="margin-bottom:0;">
      <h3 style="font-size:var(--font-size-base);font-weight:600;margin:0 0 var(--space-sm);">Available Step Types</h3>
      <div style="display:flex;flex-wrap:wrap;gap:var(--space-xs);">
        ${stepTypes.map(t => `<span class="badge badge-gray">${esc(t)}</span>`).join('')}
      </div>
    </div>`;
  }

  area.innerHTML = html;
}

  panel.innerHTML = `
    <div class="card">
      <h2>Evidence Dashboard</h2>
      <div class="inline-form">
        <div class="form-group"><label>Session</label><select id="ev-session-select"><option value="">Loading sessions...</option></select></div>
        <button class="btn btn-primary" id="ev-load-btn">Load Evidence</button>
      </div>
    </div>
    <div id="ev-content"></div>`;

    sel.innerHTML = '<option value="">-- select session --</option>' + sessions.map(s =>
      `<option value="${attr(s.session_id)}">${esc(truncate(s.session_id, 16))} - ${esc(truncate(s.goal || '', 40))}</option>`
    ).join('');

function renderEvidence(area, ev) {
  const steps = ev.steps || [];
  const observations = ev.observations || [];
  const claims = ev.claims || [];
  const recommendations = ev.recommendations || [];
  const edges = ev.edges || [];

  let html = '';

  // ── Summary stat bar ─────────────────────────────────────
  html += '<div class="stat-grid">';
  html += `<div class="stat-card stat-info"><div class="stat-label">Steps</div><div class="stat-value">${steps.length}</div></div>`;
  html += `<div class="stat-card stat-warning"><div class="stat-label">Observations</div><div class="stat-value">${observations.length}</div></div>`;
  html += `<div class="stat-card"><div class="stat-label">Claims</div><div class="stat-value">${claims.length}</div></div>`;
  html += `<div class="stat-card stat-success"><div class="stat-label">Confirmed</div><div class="stat-value">${claims.filter(c => c.status === 'confirmed' || c.status === 'supported').length}</div></div>`;
  html += `<div class="stat-card stat-warning"><div class="stat-label">Tentative</div><div class="stat-value">${claims.filter(c => c.status === 'tentative').length}</div></div>`;
  html += `<div class="stat-card stat-success"><div class="stat-label">Recommendations</div><div class="stat-value">${recommendations.length}</div></div>`;
  html += `<div class="stat-card stat-error"><div class="stat-label">Edges</div><div class="stat-value">${edges.length}</div></div>`;
  html += '</div>';

  // ── Confidence donuts for top claims ─────────────────────
  if (claims.length) {
    html += '<div class="card"><h2>Claim Confidence</h2>';
    html += '<div class="ev-donut-row">';
    claims.slice(0, 8).forEach(c => {
      const conf = typeof c.confidence === 'number' ? c.confidence : 0;
      html += `<div class="ev-donut-item">
        ${donutChart(conf)}
        <div class="ev-donut-label" title="${attr(c.claim_text || '')}">${esc(truncate(c.claim_type || c.claim_text || '', 18))}</div>
      </div>`;
    });
    html += '</div></div>';
  }

  // ── Steps ────────────────────────────────────────────────
  html += `<div class="card"><h2>Steps (${steps.length})</h2>`;
  if (steps.length) {
    html += '<div class="timeline">';
    steps.forEach(s => {
      const stClass = s.status === 'completed' ? 'completed' : s.status === 'failed' ? 'failed' : s.status === 'running' ? 'active' : '';
      const prov = s.provenance || s.provenance_json || {};
      html += `<div class="timeline-item ${stClass}">
        <div class="tl-title">${esc(s.step_type || '')} ${statusBadge(s.status || '')}</div>
        <div class="tl-meta">${esc(s.step_id || '')}</div>
        <div class="tl-body"><code style="font-size:var(--font-size-xs);color:var(--color-text-muted);">${esc(truncate(JSON.stringify(prov), 100))}</code></div>
      </div>`;
    });
    html += '</div>';
  } else { html += '<p class="empty">No steps.</p>'; }
  html += '</div>';

  // ── Observations with expandable rows ────────────────────
  html += `<div class="card"><h2>Observations (${observations.length})</h2>`;
  if (observations.length) {
    html += `<table><thead><tr><th></th><th>#</th><th>ID</th><th>Type</th><th>Metric</th><th>Slice</th><th>Window</th><th>Significance</th></tr></thead><tbody>`;
    observations.forEach((o, idx) => {
      const subj = o.subject || {};
      const metric = subj.metric || '';
      const sliceObj = subj.slice || {};
      const sliceStr = typeof sliceObj === 'string' ? sliceObj : Object.entries(sliceObj).map(([k,v]) => `${k}=${v}`).join(', ');
      const sig = o.significance || {};
      const sigStr = sig.practical_significance ? 'significant' : sig.practical_significance === false ? 'not significant' : '';
      const win = o.observed_window;
      const winStr = win ? esc((win.start || '') + ' – ' + (win.end || '')) : '';
      html += `<tr>
        <td><button class="expand-btn" data-expand="obs-${idx}">&#9654;</button></td>
        <td>${o.temporal_order != null ? o.temporal_order : ''}</td>
        <td><code>${esc(truncate(o.observation_id || '', 20))}</code></td>
        <td>${statusBadge(o.type || '')}</td>
        <td>${esc(metric)}</td>
        <td>${esc(sliceStr)}</td>
        <td style="white-space:nowrap;font-size:var(--font-size-xs);">${winStr}</td>
        <td>${statusBadge(sigStr)}</td>
      </tr>`;
      html += `<tr class="expand-row" id="obs-${idx}"><td colspan="8">${jsonPre(o)}</td></tr>`;
    });
    html += '</tbody></table>';
  } else { html += '<p class="empty">No observations.</p>'; }
  html += '</div>';

  // ── Claims with confidence progress bars ─────────────────
  html += `<div class="card"><h2>Claims (${claims.length})</h2>`;
  if (claims.length) {
    html += `<table><thead><tr><th></th><th>ID</th><th>Type</th><th>Text</th><th>Inference</th><th>Confidence</th><th>Status</th></tr></thead><tbody>`;
    claims.forEach((c, idx) => {
      const conf = typeof c.confidence === 'number' ? c.confidence : 0;
      const pct = Math.round(conf * 100);
      const barColor = confidenceColor(conf);
      html += `<tr>
        <td><button class="expand-btn" data-expand="claim-${idx}">&#9654;</button></td>
        <td><code>${esc(truncate(c.claim_id || '', 20))}</code></td>
        <td>${statusBadge(c.claim_type || '')}</td>
        <td>${esc(truncate(c.claim_text || '', 60))}</td>
        <td><span class="badge badge-gray">${esc(c.inference_level || 'L0')}</span></td>
        <td style="min-width:140px;">
          <div style="display:flex;align-items:center;gap:var(--space-sm);">
            <div class="progress-bar" style="flex:1;"><div class="fill ${barColor}" style="width:${pct}%"></div></div>
            <span style="font-size:var(--font-size-xs);font-weight:600;min-width:36px;">${conf.toFixed(2)}</span>
          </div>
        </td>
        <td>${statusBadge(c.status || '')}</td>
      </tr>`;
      html += `<tr class="expand-row" id="claim-${idx}"><td colspan="7">
        <div style="display:flex;gap:var(--space-lg);flex-wrap:wrap;padding:var(--space-sm);">
          <div><strong>Scope:</strong> <code>${esc(JSON.stringify(c.scope || {}))}</code></div>
          <div><strong>Supporting:</strong> ${(c.supporting_observations || []).length} obs</div>
          <div><strong>Contradicting:</strong> ${(c.contradicting_observations || []).length} obs</div>
        </div>
        ${jsonPre({breakdown: c.confidence_breakdown, inference_justification: c.inference_justification})}
      </td></tr>`;
    });
    html += '</tbody></table>';
  } else { html += '<p class="empty">No claims.</p>'; }
  html += '</div>';

  // ── Recommendations with priority cards ──────────────────
  html += `<div class="card"><h2>Recommendations (${recommendations.length})</h2>`;
  if (recommendations.length) {
    recommendations.forEach(r => {
      const p = (r.priority || '').toUpperCase();
      const priClass = p === 'P0' ? 'priority-p0' : p === 'P1' ? 'priority-p1' : p === 'P2' ? 'priority-p2' : 'priority-p3';
      html += `<div class="rec-card ${priClass}">
        <div class="rec-header">
          <div class="rec-action">${esc(r.action || '')}</div>
          ${priorityBadge(r.priority || '')}
        </div>
        <div class="rec-meta">
          <span>ID: <code>${esc(truncate(r.recommendation_id || '', 20))}</code></span>
          <span>Risk: ${esc(r.risk || 'N/A')}</span>
          <span>Impact: ${esc(truncate(r.expected_impact || r.impact || '', 60))}</span>
        </div>
        ${r.validation_metric ? `<div style="margin-top:var(--space-xs);font-size:var(--font-size-xs);color:var(--color-text-muted);">Validation: ${esc(typeof r.validation_metric === 'object' ? (r.validation_metric.primary_metric || '') + (r.validation_metric.secondary_metric ? ' / ' + r.validation_metric.secondary_metric : '') : String(r.validation_metric))}</div>` : ''}
        ${r.causal_basis ? `<div class="causal-basis-block">
          <div class="cb-label">Causal Basis</div>
          <div>Level: <span class="badge badge-gray">${esc(r.causal_basis.inference_level || 'L0')}</span>${r.causal_basis.unresolved_confounders && r.causal_basis.unresolved_confounders.length ? `&nbsp;&middot;&nbsp;Confounders: ${esc(r.causal_basis.unresolved_confounders.map(c => typeof c === 'string' ? c : (c.text || c.key || '')).join('; '))}` : ''}</div>
          ${r.causal_basis.suggested_validation ? `<div style="margin-top:2px;color:var(--color-text-secondary);">Next step: ${esc(r.causal_basis.suggested_validation)}</div>` : ''}
        </div>` : ''}
        ${r.entity_patch ? `<div class="entity-patch-block">
          <div style="font-size:var(--font-size-xs);color:var(--color-text-muted);margin-bottom:4px;">
            Unit hint: <strong>${esc(r.entity_patch.column_name || r.entity_patch.field || '')}</strong>
            &rarr; <code>${esc(String(r.entity_patch.suggested_value || ''))}</code>
            <span class="badge badge-gray">${esc(r.entity_patch.source || 'heuristic')}</span>
            &nbsp;confidence&nbsp;${(r.entity_patch.confidence || 0).toFixed(2)}
          </div>
          <button class="btn btn-sm apply-entity-patch-btn"
            data-entity-id="${esc(r.entity_patch.entity_id || '')}"
            data-column="${esc(r.entity_patch.column_name || '')}"
            data-unit="${esc(String(r.entity_patch.suggested_value || ''))}"
            data-rec-id="${esc(r.recommendation_id || '')}">Apply to entity</button>
        </div>` : ''}
      </div>`;
    });
  } else { html += '<p class="empty">No recommendations.</p>'; }
  html += '</div>';

  // ── Evidence Edges as connection list ─────────────────────
  html += `<div class="card">
    <div class="collapsible-header" id="ev-edges-toggle">
      <h2>Evidence Edges (${edges.length})</h2>
      <span class="chevron">&#9654;</span>
    </div>
    <div class="collapsible-body" id="ev-edges-body">`;
  if (edges.length) {
    edges.forEach(e => {
      const edgeTypeCls = e.edge_type === 'supports' ? 'badge-success'
        : e.edge_type === 'contradicts' ? 'badge-error'
        : e.edge_type === 'justifies' ? 'badge-info'
        : e.edge_type === 'correlates_with' ? 'badge-gray'
        : e.edge_type === 'temporally_precedes' ? 'badge-warning'
        : e.edge_type === 'mechanistically_explains' ? 'badge-success'
        : e.edge_type === 'eliminates_alternative' ? 'badge-info'
        : e.edge_type === 'experimentally_confirms' ? 'badge-success'
        : 'badge-gray';
      html += `<div class="connection-row">
        <code style="font-size:var(--font-size-xs);">${esc(truncate(e.from_id || '', 20))}</code>
        <span class="connection-arrow">&rarr;</span>
        <code style="font-size:var(--font-size-xs);">${esc(truncate(e.to_id || '', 20))}</code>
        <span class="badge ${edgeTypeCls}" style="margin-left:var(--space-sm);">${esc(e.edge_type || '')}</span>
        ${e.weight != null ? `<span style="font-size:var(--font-size-xs);color:var(--color-text-muted);margin-left:var(--space-sm);">w=${esc(e.weight)}</span>` : ''}
      </div>`;
    });
  } else { html += '<p class="empty">No edges.</p>'; }
  html += '</div></div>';

  area.innerHTML = html;

  // Wire up collapsible edges
  const toggle = $('#ev-edges-toggle');
  const body = $('#ev-edges-body');
  if (toggle && body) {
    toggle.onclick = () => {
      toggle.classList.toggle('open');
      body.classList.toggle('open');
    };
  }

  // Wire up expandable observation rows
  $$('.expand-btn', area).forEach(btn => {
    btn.onclick = () => {
      const targetId = btn.dataset.expand;
      const row = document.getElementById(targetId);
      if (row) {
        row.classList.toggle('open');
        btn.innerHTML = row.classList.contains('open') ? '&#9660;' : '&#9654;';
      }
    };
  });

  // Wire up "Apply to entity" buttons (G-5d)
  $$('.apply-entity-patch-btn', area).forEach(btn => {
    btn.onclick = async () => {
      const entityId = btn.dataset.entityId;
      const column = btn.dataset.column;
      const unit = btn.dataset.unit;
      if (!entityId || !column || !unit) { toast('Incomplete patch data', 'error'); return; }
      btn.disabled = true;
      btn.textContent = 'Applying…';
      try {
        await localApi.patchEntityProperties(entityId, { fields: { [column]: { unit } } });
        btn.textContent = 'Applied';
        btn.classList.add('btn-success');
        toast(`Unit "${unit}" applied to ${column} on entity ${entityId}`, 'success');
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Apply to entity';
        toast(err.message, 'error');
      }
    };
  });
}

async function loadPlans(sessionId) {
  const area = $('#plans-content');
  area.innerHTML = '<div class="card" style="text-align:center;padding:var(--space-2xl);"><span class="spinner"></span></div>';
  try {
    const plans = await localApi.listPlans(sessionId);
    if (!plans.length) { area.innerHTML = '<div class="card"><p class="empty">No plans for this session.</p></div>'; return; }
    area.innerHTML = `<div class="card">
      <table><thead><tr><th>Plan ID</th><th>Status</th><th>Steps</th><th>Created</th></tr></thead><tbody>${
        plans.map(p => `<tr>
          <td><a href="#" class="plan-link" data-id="${attr(p.plan_id)}"><code>${esc(truncate(p.plan_id, 20))}</code></a></td>
          <td>${statusBadge(p.status)}</td>
          <td><span class="badge badge-gray">${(p.steps || []).length} steps</span></td>
          <td>${fmtDate(p.created_at)}</td>
        </tr>`).join('')
      }</tbody></table></div>`;
    $$('.plan-link', area).forEach(a => a.onclick = (e) => { e.preventDefault(); showPlanDetail(sessionId, a.dataset.id); });
  } catch (err) { area.innerHTML = ''; toast(err.message, 'error'); }
}

function openDraftPlanModal(sessionId) {
  const stepTypes = ['compare_metric', 'profile_table', 'sample_rows', 'aggregate_query', 'correlate_metrics', 'synthesize_findings'];
  const stepOpts = stepTypes.map(t => `<option value="${t}">${t}</option>`).join('');
  const draftSteps = [];

  openModal('Draft Plan',
    `<div class="form-group"><label>Step Type</label><select id="f-plan-step-type">${stepOpts}</select></div>
     <div class="form-group"><label>Params (JSON)</label><textarea id="f-plan-step-params" style="min-height:60px;">{}</textarea></div>
     <div class="form-group"><label>Dependencies (comma-separated step indices, e.g. 0,1)</label><input id="f-plan-step-deps" placeholder=""></div>
     <button class="btn btn-sm" id="f-plan-add-step" type="button">Add Step</button>
     <div id="f-plan-steps-list" style="margin-top:12px;"></div>`,
    `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="f-plan-submit">Submit Plan</button>`);

  function renderStepsList() {
    const list = $('#f-plan-steps-list');
    if (!draftSteps.length) { list.innerHTML = '<p class="empty">No steps added yet.</p>'; return; }
    list.innerHTML = draftSteps.map((s, i) => {
      const deps = s.dependencies && s.dependencies.length ? ` (deps: ${s.dependencies.join(', ')})` : '';
      return `<div class="step-list-item">
        <span class="step-info"><strong>[${i}]</strong> ${esc(s.step_type)}${deps}${s.params && Object.keys(s.params).length ? ' - ' + esc(truncate(JSON.stringify(s.params), 40)) : ''}</span>
        <span class="step-remove" data-idx="${i}">&times;</span>
      </div>`;
    }).join('');
    $$('.step-remove', list).forEach(btn => {
      btn.onclick = () => { draftSteps.splice(parseInt(btn.dataset.idx, 10), 1); renderStepsList(); };
    });
  }

  renderStepsList();

  $('#f-plan-add-step').onclick = () => {
    const stepType = $('#f-plan-step-type').value;
    const params = parseJSON($('#f-plan-step-params').value, {});
    const depsStr = $('#f-plan-step-deps').value.trim();
    const dependencies = depsStr ? depsStr.split(',').map(d => parseInt(d.trim(), 10)).filter(n => !isNaN(n)) : [];
    const step = { step_type: stepType };
    if (Object.keys(params).length) step.params = params;
    if (dependencies.length) step.dependencies = dependencies;
    draftSteps.push(step);
    renderStepsList();
    // Reset inputs
    $('#f-plan-step-params').value = '{}';
    $('#f-plan-step-deps').value = '';
  };

  $('#f-plan-submit').onclick = async () => {
    if (!draftSteps.length) { toast('Add at least one step', 'error'); return; }
    try {
      await localApi.draftPlan(sessionId, draftSteps);
      toast('Plan drafted', 'success');
      closeModal();
      loadPlans(sessionId);
    } catch (err) { toast(err.message, 'error'); }
  };
}

function renderPlanResultPreview(result) {
  if (!result || typeof result !== 'object') return '';

  let preview = result;
  if (Array.isArray(result.rows)) {
    preview = { rows: result.rows };
    if (Array.isArray(result.observations) && result.observations.length) preview.observations = result.observations;
  } else if (result.profile && typeof result.profile === 'object') {
    preview = { profile: result.profile };
  }

  return `<pre>${esc(JSON.stringify(preview, null, 2))}</pre>`;
}

function renderPlanStepResult(step) {
  const result = step.result;
  if (!result || typeof result !== 'object') return '';

  const meta = [];
  if (result.artifact_id) meta.push(`artifact: <code>${esc(result.artifact_id)}</code>`);

  const previewFlags = [];
  if (result.rows_truncated) previewFlags.push('rows');
  if (result.observations_truncated) previewFlags.push('observations');
  if (result.profile && result.profile.columns_truncated) previewFlags.push('profile columns');

  return `<div class="psc-result">
    <div class="psc-result-label">Result</div>
    ${result.summary ? `<div>${esc(result.summary)}</div>` : ''}
    ${meta.length ? `<div class="psc-result-meta">${meta.join(' · ')}</div>` : ''}
    ${renderPlanResultPreview(result)}
    ${previewFlags.length ? `<div class="psc-result-note">Preview only: ${esc(previewFlags.join(', '))}</div>` : ''}
  </div>`;
}

async function showPlanDetail(sessionId, planId) {
  const area = $('#plans-content');
  area.innerHTML = '<div class="card" style="text-align:center;padding:var(--space-2xl);"><span class="spinner"></span></div>';
  try {
    const plan = await localApi.getPlan(sessionId, planId);
    const steps = plan.steps || [];
    const status = plan.status || '';

    // Plan lifecycle pipeline
    const pipelineStages = ['draft', 'validated', 'approved', 'executing', 'completed'];
    const pipelineHtml = statusPipeline(pipelineStages, status === 'failed' ? 'executing' : status);

    // Build action buttons based on status
    let actionsHtml = '';
    if (status === 'draft') {
      actionsHtml = `<button class="btn btn-primary btn-lg" id="plan-validate-btn">Validate Plan</button>`;
    } else if (status === 'validated') {
      actionsHtml = `<button class="btn btn-success btn-lg" id="plan-approve-btn">Approve Plan</button>`;
    } else if (status === 'approved') {
      actionsHtml = `<button class="btn btn-primary btn-lg" id="plan-execute-btn">Execute Plan</button>
        <button class="btn" id="plan-estimate-btn">Estimate Costs</button>
        <button class="btn" id="plan-budget-btn">Budget Check</button>`;
    } else if (status === 'completed' || status === 'failed') {
      actionsHtml = `<button class="btn" id="plan-explain-btn">Explain</button>`;
    }
    if (['draft', 'validated', 'approved', 'failed', 'partial'].includes(status)) {
      actionsHtml += ` <button class="btn" id="plan-patch-btn">Patch Plan</button>`;
    }

    area.innerHTML = `
      <div class="card">
        <span class="detail-back" id="plan-back">&larr; Back to plans</span>
        <h2>Plan Detail</h2>
        ${pipelineHtml}
        ${status === 'failed' ? '<div style="margin-bottom:var(--space-md);"><span class="badge badge-error">Plan Failed</span></div>' : ''}
        <dl class="detail-meta">
          <dt>Plan ID</dt><dd><code>${esc(plan.plan_id)}</code></dd>
          <dt>Status</dt><dd>${statusBadge(status)}</dd>
          <dt>Created</dt><dd>${fmtDate(plan.created_at)}</dd>
        </dl>
        <div style="display:flex;gap:var(--space-sm);flex-wrap:wrap;margin-bottom:var(--space-lg);">${actionsHtml}</div>
      </div>

      <!-- Plan steps as visual cards -->
      <div class="card">
        <h2>Steps (${steps.length})</h2>
        ${steps.length ? `<div class="plan-step-cards">${
          steps.map((s, i) => {
            const stStatus = s.status || '';
            return `<div class="plan-step-card">
              <div class="psc-header">
                <span class="psc-type">${esc(s.step_type)}</span>
                ${statusBadge(stStatus)}
              </div>
              <div style="font-size:var(--font-size-xs);color:var(--color-text-muted);">Step ${i}</div>
              ${s.params && Object.keys(s.params).length ? `<div style="margin-top:var(--space-sm);"><code style="font-size:var(--font-size-xs);">${esc(truncate(JSON.stringify(s.params), 60))}</code></div>` : ''}
              <div class="psc-deps">${(s.dependencies || []).length ? 'Depends on: ' + (s.dependencies).join(', ') : 'No dependencies'}</div>
              ${renderPlanStepResult(s)}
            </div>`;
          }).join('')
        }</div>` : '<p class="empty">No steps.</p>'}
      </div>
      <div id="plan-action-result"></div>`;

    $('#plan-back').onclick = () => loadPlans(sessionId);

    const resultArea = $('#plan-action-result');

    const validateBtn = $('#plan-validate-btn');
    if (validateBtn) validateBtn.onclick = async () => {
      try { await localApi.validatePlan(sessionId, planId); toast('Plan validated', 'success'); showPlanDetail(sessionId, planId); } catch (err) { toast(err.message, 'error'); }
    };

    const approveBtn = $('#plan-approve-btn');
    if (approveBtn) approveBtn.onclick = async () => {
      try { await localApi.approvePlan(sessionId, planId); toast('Plan approved', 'success'); showPlanDetail(sessionId, planId); } catch (err) { toast(err.message, 'error'); }
    };

    const executeBtn = $('#plan-execute-btn');
    if (executeBtn) executeBtn.onclick = async () => {
      executeBtn.disabled = true;
      executeBtn.textContent = 'Executing...';
      try {
        const r = await localApi.executePlan(sessionId, planId);
        toast('Plan executed', 'success');
        // Show cost breakdown if available
        let resultHtml = '<div class="card"><h2>Execution Result</h2>';
        if (r.step_costs || r.costs) {
          const costs = r.step_costs || r.costs || [];
          if (Array.isArray(costs) && costs.length) {
            resultHtml += '<div style="margin-bottom:var(--space-md);">' + miniBarChart(costs.map(c => c.estimated_rows || c.cost || 0)) + '</div>';
          }
        }
        resultHtml += jsonPre(r) + '</div>';
        resultArea.innerHTML = resultHtml;
        showPlanDetail(sessionId, planId);
      } catch (err) {
        toast(err.message, 'error');
        executeBtn.disabled = false;
        executeBtn.textContent = 'Execute Plan';
      }
    };

    const estimateBtn = $('#plan-estimate-btn');
    if (estimateBtn) estimateBtn.onclick = async () => {
      try {
        const r = await localApi.estimateCosts(sessionId, planId);
        let costHtml = '<div class="card"><h2>Cost Estimate</h2>';
        // Render bar chart of step costs
        if (r.steps && Array.isArray(r.steps)) {
          const costValues = r.steps.map(s => s.estimated_rows || s.estimated_cost || 0);
          if (costValues.some(v => v > 0)) {
            costHtml += '<div style="margin-bottom:var(--space-md);">' + miniBarChart(costValues, 60) + '</div>';
            costHtml += '<table><thead><tr><th>Step</th><th>Estimated Rows</th></tr></thead><tbody>';
            r.steps.forEach(s => {
              costHtml += `<tr><td>${esc(s.step_type || '')}</td><td>${esc(s.estimated_rows || s.estimated_cost || 0)}</td></tr>`;
            });
            costHtml += '</tbody></table>';
          }
        }
        costHtml += jsonPre(r) + '</div>';
        resultArea.innerHTML = costHtml;
      } catch (err) { toast(err.message, 'error'); }
    };

    const budgetBtn = $('#plan-budget-btn');
    if (budgetBtn) budgetBtn.onclick = async () => {
      try { const r = await localApi.budgetCheck(sessionId, planId); resultArea.innerHTML = '<div class="card"><h2>Budget Check</h2>' + jsonPre(r) + '</div>'; } catch (err) { toast(err.message, 'error'); }
    };

    const explainBtn = $('#plan-explain-btn');
    if (explainBtn) explainBtn.onclick = async () => {
      try { const r = await localApi.explainPlan(sessionId, planId); resultArea.innerHTML = '<div class="card"><h2>Plan Explanation</h2>' + jsonPre(r) + '</div>'; } catch (err) { toast(err.message, 'error'); }
    };

    const patchBtn = $('#plan-patch-btn');
    if (patchBtn) patchBtn.onclick = () => openPatchPlanModal(sessionId, planId);
  } catch (err) { area.innerHTML = ''; toast(err.message, 'error'); }
}

function openPatchPlanModal(sessionId, planId) {
  openModal('Patch Plan',
    `<div class="form-group">
      <label>Add Steps <span style="font-size:var(--font-size-xs);color:var(--color-text-muted);">(JSON array of step dicts, e.g. [{"step_type":"profile_table","params":{}}])</span></label>
      <textarea id="f-patch-add" style="min-height:80px;font-family:var(--font-mono);font-size:var(--font-size-xs);">[]</textarea>
    </div>
    <div class="form-group">
      <label>Modify Steps <span style="font-size:var(--font-size-xs);color:var(--color-text-muted);">(JSON array of {index, params} to merge, e.g. [{"index":0,"params":{"limit":5}}])</span></label>
      <textarea id="f-patch-modify" style="min-height:60px;font-family:var(--font-mono);font-size:var(--font-size-xs);">[]</textarea>
    </div>
    <div class="form-group">
      <label>Skip Steps <span style="font-size:var(--font-size-xs);color:var(--color-text-muted);">(comma-separated step indices, e.g. 1,2)</span></label>
      <input id="f-patch-skip" placeholder="">
    </div>`,
    `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="f-patch-submit">Apply Patch</button>`);

  $('#f-patch-submit').onclick = async () => {
    try {
      const add_steps = parseJSON($('#f-patch-add').value, []);
      const modify_steps = parseJSON($('#f-patch-modify').value, []);
      const skipStr = $('#f-patch-skip').value.trim();
      const skip_steps = skipStr ? skipStr.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n)) : [];
      const patch = { add_steps, modify_steps, skip_steps };
      await localApi.patchPlan(sessionId, planId, patch);
      toast('Patch applied', 'success');
      closeModal();
      showPlanDetail(sessionId, planId);
    } catch (err) { toast(err.message, 'error'); }
  };
}

// ════════════════════════════════════════════════════════════
// ── Jobs Tab ───────────────────────────────────────────────
// ════════════════════════════════════════════════════════════
let jobsAutoRefreshTimer = null;
let jobsCountdown = 5;
let jobsCountdownTimer = null;

renderers.jobs = async () => {
  if (jobsAutoRefreshTimer) { clearInterval(jobsAutoRefreshTimer); jobsAutoRefreshTimer = null; }
  if (jobsCountdownTimer) { clearInterval(jobsCountdownTimer); jobsCountdownTimer = null; }

  const panel = $('#panel-jobs');
  panel.innerHTML = `
    <div class="card">
      <div class="toolbar">
        <h2>Jobs</h2>
        <div style="display:flex;gap:var(--space-sm);align-items:center;">
          <label class="checkbox-label">
            <input type="checkbox" id="jobs-auto-refresh"> Auto-refresh
            <span class="refresh-indicator" id="jobs-refresh-indicator" style="display:none;">
              <span class="pulse-dot"></span>
              <span id="jobs-countdown">5s</span>
            </span>
          </label>
          <button class="btn btn-primary" id="jobs-submit-btn">+ Submit Job</button>
        </div>
      </div>
      <div class="inline-form">
        <div class="form-group"><label>Status</label>
          <select id="jobs-filter-status">
            <option value="">All</option>
            <option value="pending">pending</option>
            <option value="running">running</option>
            <option value="completed">completed</option>
            <option value="failed">failed</option>
            <option value="cancelled">cancelled</option>
          </select>
        </div>
        <div class="form-group"><label>Session ID</label><input id="jobs-filter-session" placeholder="sess_..." style="width:200px;"></div>
        <button class="btn" id="jobs-filter-btn">Filter</button>
      </div>
      <table><thead><tr><th>Job ID</th><th>Session</th><th>Type</th><th>Status</th><th>Submitted</th><th>Actions</th></tr></thead>
      <tbody id="jobs-tbody">${loadingRow(6)}</tbody></table>
    </div>`;

  async function loadJobs() {
    const params = {};
    const status = $('#jobs-filter-status').value;
    const sessionId = $('#jobs-filter-session').value.trim();
    if (status) params.status = status;
    if (sessionId) params.session_id = sessionId;
    const tbody = $('#jobs-tbody');
    try {
      const jobs = await localApi.listJobs(Object.keys(params).length ? params : null);
      if (!jobs.length) { tbody.innerHTML = `<tr><td colspan="6" class="empty">No jobs found.</td></tr>`; return; }
      tbody.innerHTML = jobs.map(j => {
        const canCancel = j.status === 'pending' || j.status === 'running';
        const isRunning = j.status === 'running';
        const dotColor = j.status === 'completed' ? 'green' : j.status === 'failed' ? 'red' : j.status === 'running' ? 'blue' : j.status === 'cancelled' ? 'gray' : 'yellow';
        return `<tr>
          <td><a href="#" class="job-link" data-id="${attr(j.job_id)}"><code>${esc(truncate(j.job_id || '', 20))}</code></a></td>
          <td><code>${esc(truncate(j.session_id || '', 16))}</code></td>
          <td>${esc(j.job_type || '')}</td>
          <td><span class="status-dot ${dotColor} ${isRunning ? 'pulse' : ''}"></span>${statusBadge(j.status || '')}</td>
          <td>${fmtDate(j.submitted_at || j.created_at)}</td>
          <td>${canCancel ? `<button class="btn btn-sm btn-danger cancel-job" data-id="${attr(j.job_id)}">Cancel</button>` : ''}</td>
        </tr>`;
      }).join('');
      $$('.cancel-job', tbody).forEach(btn => btn.onclick = async () => {
        try { await localApi.cancelJob(btn.dataset.id); toast('Job cancelled', 'success'); loadJobs(); } catch (err) { toast(err.message, 'error'); }
      });
      $$('.job-link', tbody).forEach(a => a.onclick = async (e) => {
        e.preventDefault();
        try {
          const job = await localApi.getJob(a.dataset.id);
          openModal('Job Detail', jsonPre(job), `<button class="btn" onclick="closeModal()">Close</button>`);
        } catch (err) { toast(err.message, 'error'); }
      });
    } catch (err) { tbody.innerHTML = `<tr><td colspan="6" class="empty">Error: ${esc(err.message)}</td></tr>`; }
  }

  $('#jobs-filter-btn').onclick = loadJobs;

  // Auto-refresh toggle with countdown
  $('#jobs-auto-refresh').onchange = (e) => {
    const indicator = $('#jobs-refresh-indicator');
    if (e.target.checked) {
      indicator.style.display = '';
      jobsCountdown = 5;
      jobsAutoRefreshTimer = setInterval(() => {
        jobsCountdown = 5;
        loadJobs();
      }, 5000);
      jobsCountdownTimer = setInterval(() => {
        jobsCountdown = Math.max(0, jobsCountdown - 1);
        const cdEl = $('#jobs-countdown');
        if (cdEl) cdEl.textContent = jobsCountdown + 's';
      }, 1000);
    } else {
      indicator.style.display = 'none';
      if (jobsAutoRefreshTimer) { clearInterval(jobsAutoRefreshTimer); jobsAutoRefreshTimer = null; }
      if (jobsCountdownTimer) { clearInterval(jobsCountdownTimer); jobsCountdownTimer = null; }
    }
  };

  // Submit Job modal
  $('#jobs-submit-btn').onclick = () => {
    openModal('Submit Job',
      `<div class="form-group"><label>Session ID</label><input id="f-job-session" placeholder="sess_..."></div>
       <div class="form-group"><label>Job Type</label>
         <select id="f-job-type">
           <option value="step">step</option>
           <option value="plan">plan</option>
         </select>
       </div>
       <div class="form-group"><label>Payload (JSON)</label><textarea id="f-job-payload">{}</textarea></div>`,
      `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="f-job-submit">Submit</button>`);
    $('#f-job-submit').onclick = async () => {
      try {
        const session_id = $('#f-job-session').value.trim();
        if (!session_id) throw new Error('Session ID is required');
        const job_type = $('#f-job-type').value;
        const payload = parseJSON($('#f-job-payload').value, {});
        await localApi.submitJob({ session_id, job_type, payload });
        toast('Job submitted', 'success');
        closeModal();
        loadJobs();
      } catch (err) { toast(err.message, 'error'); }
    };
  };

  // Initial load
  loadJobs();
};

// ── Boot ───────────────────────────────────────────────────
renderers.catalog();
</script>
</body>
</html>
