<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factum Query Workbench</title>
<link rel="stylesheet" href="/static/shared.css">
<style>
.page-intro {
  margin-bottom: var(--space-xl);
}

.page-intro h2 {
  margin-bottom: var(--space-sm);
  font-size: var(--font-size-xl);
}

.page-intro p {
  max-width: 760px;
  color: var(--color-text-secondary);
}

.shell-grid {
  display: grid;
  gap: var(--space-lg);
}

.shell-card-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
}

.shell-card-title h3 {
  margin: 0;
  font-size: var(--font-size-md);
}

.shell-chip {
  display: inline-flex;
  align-items: center;
  padding: 2px 10px;
  border-radius: var(--radius-full);
  background: var(--color-info-bg);
  color: var(--color-info);
  font-size: var(--font-size-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.shell-controls,
.shell-results {
  display: grid;
  gap: var(--space-md);
}

.shell-control {
  padding: var(--space-md);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: var(--color-bg);
}

.shell-control-label {
  margin-bottom: 4px;
  font-size: var(--font-size-sm);
  font-weight: 600;
}

.shell-control-copy,
.shell-results-copy {
  color: var(--color-text-secondary);
}

.shell-status-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: var(--space-md);
}

.shell-status {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: var(--color-surface);
  padding: var(--space-md);
}

.shell-status strong {
  display: block;
  margin-bottom: 4px;
  font-size: var(--font-size-sm);
}

.sessions-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.7fr) minmax(320px, 1fr);
  gap: var(--space-lg);
}

.sessions-stack {
  display: grid;
  gap: var(--space-lg);
}

.sessions-filters {
  display: grid;
  grid-template-columns: minmax(160px, 220px) minmax(220px, 1fr) auto auto;
  gap: var(--space-md);
  align-items: end;
}

.sessions-table-wrap {
  overflow-x: auto;
}

.sessions-table tr.is-selected td {
  background: var(--color-primary-light);
}

.sessions-table td.actions-cell {
  white-space: nowrap;
}

.sessions-table .btn {
  margin-right: var(--space-xs);
  margin-bottom: var(--space-xs);
}

.state-layout {
  display: grid;
  gap: var(--space-lg);
}

.state-filters {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: var(--space-md);
  align-items: end;
}

.state-summary-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.7fr) minmax(320px, 1fr);
  gap: var(--space-lg);
}

.state-results-stack,
.state-sidebar {
  display: grid;
  gap: var(--space-lg);
}

.state-sidebar-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-bottom: var(--space-md);
}

.state-sidebar-tabs .btn.is-active {
  border-color: var(--color-primary);
  background: var(--color-primary-light);
  color: var(--color-primary);
}

.subject-chip-list {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
}

.subject-chip {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: var(--radius-full);
  background: #ecfeff;
  color: #155e75;
  font-size: var(--font-size-xs);
  font-weight: 600;
}

.state-meta-note {
  margin-top: var(--space-sm);
  color: var(--color-text-secondary);
  font-size: var(--font-size-sm);
}

.state-table-wrap {
  overflow-x: auto;
}

.state-table td.actions-cell {
  white-space: nowrap;
}

.state-table tr.is-selected td {
  background: var(--color-primary-light);
}

.state-subject {
  display: grid;
  gap: 4px;
}

.state-subject-main {
  font-weight: 600;
}

.state-subject-meta {
  color: var(--color-text-secondary);
  font-size: var(--font-size-xs);
}

.state-empty,
.state-error {
  border: 1px dashed var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  background: var(--color-bg);
  color: var(--color-text-secondary);
}

.state-error {
  border-color: #fecaca;
  background: var(--color-error-bg);
  color: #991b1b;
}

.state-detail-list {
  display: grid;
  gap: var(--space-md);
}

.state-detail-item {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-md);
  background: var(--color-bg);
}

.state-detail-item h4 {
  margin-bottom: var(--space-xs);
  font-size: var(--font-size-sm);
}

.panel-note {
  margin-top: var(--space-sm);
  color: var(--color-text-secondary);
  font-size: var(--font-size-sm);
}

.inline-code {
  display: inline-block;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  background: #eef2ff;
  color: #3730a3;
  font-family: var(--font-mono);
  font-size: var(--font-size-xs);
}

.detail-grid {
  display: grid;
  gap: var(--space-md);
}

.detail-group {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-md);
  background: var(--color-bg);
}

.detail-group h4 {
  margin-bottom: var(--space-xs);
  font-size: var(--font-size-sm);
}

.detail-actions {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-top: var(--space-md);
}

.detail-empty,
.detail-error,
.list-empty,
.list-error {
  border: 1px dashed var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  background: var(--color-bg);
  color: var(--color-text-secondary);
}

.detail-error,
.list-error {
  border-color: #fecaca;
  background: var(--color-error-bg);
  color: #991b1b;
}

.list-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-md);
  margin-bottom: var(--space-md);
}

.results-count {
  color: var(--color-text-secondary);
  font-size: var(--font-size-sm);
}

.session-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-md);
  margin-bottom: var(--space-md);
}

.session-header h3 {
  margin: 0;
  font-size: var(--font-size-lg);
}

.session-meta {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-top: var(--space-sm);
}

.json-pre {
  margin: 0;
  font-family: var(--font-mono);
  font-size: var(--font-size-xs);
  white-space: pre-wrap;
  word-break: break-word;
}

.context-layout,
.context-stack,
.context-grid {
  display: grid;
  gap: var(--space-lg);
}

.context-grid {
  grid-template-columns: minmax(0, 1.4fr) minmax(320px, 1fr);
}

.context-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-md);
}

.context-header h3 {
  margin: 0;
  font-size: var(--font-size-lg);
}

.context-meta {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-top: var(--space-sm);
}

.context-section-list {
  display: grid;
  gap: var(--space-md);
}

.context-section-item {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-md);
  background: var(--color-bg);
}

.context-section-item h4 {
  margin-bottom: var(--space-xs);
  font-size: var(--font-size-sm);
}

.context-inline-meta {
  margin-top: var(--space-sm);
  color: var(--color-text-secondary);
  font-size: var(--font-size-sm);
}

@media (max-width: 768px) {
  .shell-card-title {
    align-items: flex-start;
    flex-direction: column;
  }

  .sessions-layout {
    grid-template-columns: 1fr;
  }

  .state-summary-grid {
    grid-template-columns: 1fr;
  }

  .context-grid {
    grid-template-columns: 1fr;
  }

  .state-filters {
    grid-template-columns: 1fr;
  }

  .sessions-filters {
    grid-template-columns: 1fr;
  }

  .list-meta,
  .session-header {
    flex-direction: column;
    align-items: stretch;
  }
}
</style>
</head>

<script src="/static/shared.js"></script>
<script>
const SHELL_PAGE_CONFIG = {
  sessions: {
    title: 'Sessions',
    summary: 'Browse existing analysis sessions and move into canonical or runtime read surfaces without creating or changing analysis state from this page.',
    controls: [
      ['Session Filters', 'Status and session lookup controls will land here in T3.'],
      ['Navigation', 'Session-driven links into State, Runtime, Grounding, and Jobs will be added in T3.'],
    ],
    resultTitle: 'Session Query Surface',
    resultCopy: 'This workbench is read-only. T3 will replace this placeholder with session list, detail, and drill-in views.',
    statuses: [
      ['Empty State', 'No analysis sessions are available to inspect yet.'],
      ['Error State', 'Session listing and detail lookup failures will render here.'],
    ],
  },
  state: {
    title: 'State',
    summary: 'Inspect externally visible canonical state for a selected session without mixing in runtime queue or retry details.',
    controls: [
      ['Canonical Filters', 'Metric, entity, assessment, origin, and limit controls will land here in T4.'],
      ['Primary Result', 'Active propositions remain the main reading surface.'],
    ],
    resultTitle: 'Canonical State Surface',
    resultCopy: 'T4 will attach focus subjects, proposition rows, findings references, and gap detail to this panel.',
    statuses: [
      ['Empty State', 'No externally visible propositions for the selected session.'],
      ['Error State', 'State query validation and transport failures will render here.'],
    ],
  },
  context: {
    title: 'Context',
    summary: 'Inspect one proposition at a time to understand canonical evidence, gaps, assessment state, and dependencies.',
    controls: [
      ['Locator', 'Session and proposition selectors will land here in T5.'],
      ['Drill-in Boundary', 'This page stays focused on one proposition rather than broader runtime flow.'],
    ],
    resultTitle: 'Proposition Context Surface',
    resultCopy: 'T5 will replace this placeholder with proposition details, findings, gaps, inference records, and artifact references.',
    statuses: [
      ['Empty State', 'Select a proposition to inspect canonical context.'],
      ['Error State', 'Missing proposition references or lookup failures will render here.'],
    ],
  },
  runtime: {
    title: 'Runtime',
    summary: 'Use runtime status views to explain missing, delayed, or blocked outputs without exposing control actions in the query workbench.',
    controls: [
      ['Runtime Scope', 'Session, proposition, and artifact runtime selectors will land here in T6.'],
      ['Operational Filters', 'Runtime stage and status filters will be added once the runtime surface is wired.'],
    ],
    resultTitle: 'Runtime Status Surface',
    resultCopy: 'T6 will attach stage summaries, failure signals, and runtime drill-ins to this area.',
    statuses: [
      ['Empty State', 'No runtime object is selected yet.'],
      ['Error State', 'Runtime lookup failures will render here.'],
    ],
  },
  grounding: {
    title: 'Grounding',
    summary: 'Open supporting catalog and semantic helper views that explain what the session referenced while keeping them secondary to the main read path.',
    controls: [
      ['Helper Views', 'Catalog search, semantic resolve, graph, and planner-context helpers will land here in T7.'],
      ['Session Context', 'Grounding views may receive active session context from Sessions or State.'],
    ],
    resultTitle: 'Grounding Helper Surface',
    resultCopy: 'T7 will replace this placeholder with supporting lookup tools for semantic and catalog grounding.',
    statuses: [
      ['Empty State', 'No helper query has been run yet.'],
      ['Error State', 'Grounding helper lookup failures will render here.'],
    ],
  },
  jobs: {
    title: 'Jobs',
    summary: 'Inspect background job status related to analysis sessions without exposing submit, cancel, or retry controls in the main UI.',
    controls: [
      ['Job Filters', 'Status and session filters will land here in T8.'],
      ['Read-only Boundary', 'This page remains observational inside the query workbench.'],
    ],
    resultTitle: 'Job Status Surface',
    resultCopy: 'T8 will replace this placeholder with job listings and read-only detail inspection.',
    statuses: [
      ['Empty State', 'No jobs are available for the current filter set.'],
      ['Error State', 'Job listing and detail lookup failures will render here.'],
    ],
  },
};

const SESSION_PAGE_LIMIT = 25;
const VALID_TABS = Object.keys(SHELL_PAGE_CONFIG);
const DEFAULT_ROUTE = {
  tab: 'sessions',
  sessionId: '',
  propositionId: '',
  runtimeScope: '',
  status: '',
  sessionQuery: '',
};

let currentRoute = { ...DEFAULT_ROUTE };
let sessionsViewState = {
  loadingList: false,
  listError: '',
  items: [],
  nextPageToken: null,
  loadingDetail: false,
  detailError: '',
  selectedSession: null,
};
let stateViewState = {
  loading: false,
  error: '',
  selectedDetailTab: 'findings',
  result: null,
  filters: {
    metric: '',
    entity: '',
    assessmentPresence: '',
    assessmentStatuses: '',
    hasBlockingGaps: '',
    originKinds: '',
    propositionTypes: '',
    limit: '50',
  },
};
let contextViewState = {
  loading: false,
  error: '',
  result: null,
};
let suppressTabSync = false;

const uiApi = {
  async fetchJson(path) {
    const response = await fetch(path, {
      headers: { 'Content-Type': 'application/json' },
    });
    let payload = null;
    try {
      payload = await response.json();
    } catch (error) {
      payload = null;
    }
    if (!response.ok) {
      const message = payload && typeof payload.detail === 'string'
        ? payload.detail
        : `Request failed with status ${response.status}`;
      const err = new Error(message);
      err.status = response.status;
      throw err;
    }
    return payload;
  },
  listSessions(route, pageToken = null) {
    const params = new URLSearchParams();
    if (route.status) params.set('status', route.status);
    if (route.sessionQuery) params.set('session_id', route.sessionQuery);
    params.set('limit', String(SESSION_PAGE_LIMIT));
    if (pageToken) params.set('page_token', pageToken);
    return this.fetchJson(`/sessions?${params.toString()}`);
  },
  getSession(sessionId) {
    return this.fetchJson(`/sessions/${encodeURIComponent(sessionId)}`);
  },
  getSessionState(sessionId, filters) {
    const params = new URLSearchParams();
    if (filters.metric) params.set('metric', filters.metric);
    if (filters.entity) params.set('entity', filters.entity);
    splitMultiValue(filters.propositionTypes).forEach((value) => {
      params.append('proposition_type', value);
    });
    splitMultiValue(filters.originKinds).forEach((value) => {
      params.append('origin_kind', value);
    });
    if (filters.assessmentPresence) params.set('assessment_presence', filters.assessmentPresence);
    splitMultiValue(filters.assessmentStatuses).forEach((value) => {
      params.append('assessment_status', value);
    });
    if (filters.hasBlockingGaps === 'true' || filters.hasBlockingGaps === 'false') {
      params.set('has_blocking_gaps', filters.hasBlockingGaps);
    }
    const normalizedLimit = Number.parseInt(filters.limit || '50', 10);
    if (!Number.isNaN(normalizedLimit) && normalizedLimit > 0) {
      params.set('limit', String(normalizedLimit));
    }
    return this.fetchJson(`/sessions/${encodeURIComponent(sessionId)}/state?${params.toString()}`);
  },
  getPropositionContext(sessionId, propositionId) {
    return this.fetchJson(
      `/sessions/${encodeURIComponent(sessionId)}/propositions/${encodeURIComponent(propositionId)}/context`
    );
  },
};

function renderShellPlaceholder(tab) {
  const panel = document.getElementById('panel-' + tab);
  const config = SHELL_PAGE_CONFIG[tab];
  if (!panel || !config) {
    return;
  }

  panel.innerHTML = `
    <div class="page-intro">
      <h2>${esc(config.title)}</h2>
      <p>${esc(config.summary)}</p>
    </div>
    <div class="shell-grid">
      <div class="card">
        <div class="shell-card-title">
          <h3>Query / Filters</h3>
          <span class="shell-chip">Read-only</span>
        </div>
        <div class="shell-controls">
          ${config.controls.map(([label, copy]) => `
            <div class="shell-control">
              <div class="shell-control-label">${esc(label)}</div>
              <div class="shell-control-copy">${esc(copy)}</div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="card">
        <div class="shell-card-title">
          <h3>${esc(config.resultTitle)}</h3>
          <span class="shell-chip">Placeholder</span>
        </div>
        <div class="shell-results">
          <p class="shell-results-copy">${esc(config.resultCopy)}</p>
        </div>
      </div>
      <div class="shell-status-grid">
        ${config.statuses.map(([label, copy]) => `
          <div class="shell-status">
            <strong>${esc(label)}</strong>
            <span>${esc(copy)}</span>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function normalizeRoute(nextRoute) {
  const route = {
    tab: VALID_TABS.includes(nextRoute.tab) ? nextRoute.tab : DEFAULT_ROUTE.tab,
    sessionId: nextRoute.sessionId || '',
    propositionId: nextRoute.propositionId || '',
    runtimeScope: nextRoute.runtimeScope || '',
    status: nextRoute.status || '',
    sessionQuery: (nextRoute.sessionQuery || '').trim(),
  };
  if (!['session', 'proposition', 'artifact'].includes(route.runtimeScope)) {
    route.runtimeScope = '';
  }
  return route;
}

function routeFromLocation() {
  const params = new URLSearchParams(window.location.search);
  return normalizeRoute({
    tab: params.get('tab') || DEFAULT_ROUTE.tab,
    sessionId: params.get('session_id') || '',
    propositionId: params.get('proposition_id') || '',
    runtimeScope: params.get('runtime_scope') || '',
    status: params.get('status') || '',
    sessionQuery: params.get('session_query') || '',
  });
}

function writeRoute(route, historyMode = 'push') {
  const params = new URLSearchParams();
  if (route.tab && route.tab !== DEFAULT_ROUTE.tab) params.set('tab', route.tab);
  if (route.sessionId) params.set('session_id', route.sessionId);
  if (route.propositionId) params.set('proposition_id', route.propositionId);
  if (route.runtimeScope) params.set('runtime_scope', route.runtimeScope);
  if (route.status) params.set('status', route.status);
  if (route.sessionQuery) params.set('session_query', route.sessionQuery);
  const nextUrl = params.toString() ? `?${params.toString()}` : window.location.pathname;
  const method = historyMode === 'replace' ? 'replaceState' : 'pushState';
  window.history[method](null, '', nextUrl);
}

function formatPretty(value) {
  if (value == null) return '<span class="empty">None</span>';
  if (typeof value === 'string') return `<span>${esc(value)}</span>`;
  return jsonPre(value);
}

function sessionStatus(session) {
  return session?.lifecycle?.status || 'unknown';
}

function splitMultiValue(value) {
  return String(value || '')
    .split(',')
    .map((item) => item.trim())
    .filter(Boolean);
}

function formatSubjectSummary(subject) {
  if (!subject || typeof subject !== 'object') {
    return '<span class="empty">No subject</span>';
  }
  const titleParts = [subject.metric, subject.entity, subject.grain].filter(Boolean);
  const sliceSummary = subject.slice && typeof subject.slice === 'object'
    ? Object.entries(subject.slice).map(([key, value]) => `${key}=${value}`).join(', ')
    : '';
  return `
    <div class="state-subject">
      <div class="state-subject-main">${esc(titleParts.join(' / ') || 'Unspecified subject')}</div>
      <div class="state-subject-meta">${esc(sliceSummary || 'No slice')}</div>
    </div>
  `;
}

function getPropositionSubject(proposition) {
  return proposition?.subject_json || proposition?.subject || null;
}

function renderContextStructuredValue(value, emptyLabel = 'None') {
  if (value == null) {
    return `<span class="empty">${esc(emptyLabel)}</span>`;
  }
  if (typeof value === 'string' || typeof value === 'number' || typeof value === 'boolean') {
    return `<span>${esc(String(value))}</span>`;
  }
  return jsonPre(value);
}

function renderContextCollection(title, items, renderItem, emptyCopy) {
  const body = Array.isArray(items) && items.length > 0
    ? items.map((item, index) => renderItem(item, index)).join('')
    : `<div class="detail-empty">${esc(emptyCopy)}</div>`;
  return `
    <div class="card">
      <div class="shell-card-title">
        <h3>${esc(title)}</h3>
        <span class="shell-chip">${esc(Array.isArray(items) ? `${items.length} item(s)` : 'None')}</span>
      </div>
      <div class="context-section-list">${body}</div>
    </div>
  `;
}

function renderStateRows(entries) {
  if (stateViewState.loading) {
    return loadingRow(7);
  }
  if (!Array.isArray(entries) || entries.length === 0) {
    const hasFilters = Object.entries(stateViewState.filters)
      .some(([key, value]) => key !== 'limit' && String(value || '').trim() !== '');
    const emptyCopy = hasFilters ? '当前筛选条件下无命中' : '当前 session 没有对外可见 proposition';
    return `<tr><td colspan="7" class="empty">${esc(emptyCopy)}</td></tr>`;
  }

  return entries.map((entry) => {
    const proposition = entry.proposition || {};
    const propositionId = proposition.proposition_id || '';
    const assessment = entry.latest_assessment;
    const blockingCount = Array.isArray(entry.blocking_gap_refs) ? entry.blocking_gap_refs.length : null;
    const selectedClass = propositionId === currentRoute.propositionId ? 'is-selected' : '';
    return `
      <tr class="${selectedClass}">

        <td>${esc(proposition.proposition_type || '-')}</td>

        <td>${assessment ? statusBadge(assessment.status) : '<span class="empty">Unassessed</span>'}</td>

      entity: String(formData.get('entity') || '').trim(),

    <div class="context-layout">
      <div class="card">
        <div class="shell-card-title">
          <h3>Context Locator</h3>
          <span class="shell-chip">Read-only</span>
        </div>
        <div class="detail-grid">
          <div class="detail-group">
            <h4>session_id</h4>
            ${renderContextStructuredValue(currentRoute.sessionId, 'Select from Sessions or State')}
          </div>
          <div class="detail-group">
            <h4>proposition_id</h4>
            ${renderContextStructuredValue(currentRoute.propositionId, 'Select from State')}
          </div>
          <div class="detail-group">
            <h4>HTTP Contract</h4>
            <span class="inline-code">GET /sessions/{session_id}/propositions/{proposition_id}/context</span>
          </div>
        </div>
        <p class="panel-note">Context stays on canonical truth. It does not explain queue, retry, claim, attempt, or backlog state. Use Check Proposition Runtime for that boundary.</p>
      </div>
      ${mainContent}
    </div>
  `;

  bindContextEvents();
}

function renderSessionActionButtons(sessionId) {
  return `
    <button class="btn btn-sm session-nav-btn" data-target-tab="state" data-session-id="${attr(sessionId)}">View State</button>
    <button class="btn btn-sm session-nav-btn" data-target-tab="runtime" data-session-id="${attr(sessionId)}">View Runtime</button>
    <button class="btn btn-sm session-nav-btn" data-target-tab="jobs" data-session-id="${attr(sessionId)}">View Jobs</button>
    <button class="btn btn-sm session-nav-btn" data-target-tab="grounding" data-session-id="${attr(sessionId)}">Open Grounding Helper</button>
  `;
}

function renderSessionRows() {
  if (sessionsViewState.loadingList) {
    return loadingRow(6);
  }
  if (sessionsViewState.items.length === 0) {
    return `<tr><td colspan="7" class="empty">当前没有可查看的分析会话</td></tr>`;
  }
  return sessionsViewState.items.map((session) => {
    const selectedClass = session.session_id === currentRoute.sessionId ? 'is-selected' : '';
    return `
      <tr class="${selectedClass}">
        <td><button class="btn btn-sm session-select-btn" data-session-id="${attr(session.session_id)}">Open</button></td>
        <td><span class="inline-code">${esc(session.session_id)}</span></td>
        <td>${esc(session.goal?.question || '-')}</td>
        <td>${statusBadge(sessionStatus(session))}</td>
        <td>${esc(fmtDate(session.created_at))}</td>
        <td>${esc(fmtDate(session.updated_at))}</td>
        <td class="actions-cell">
          ${renderSessionActionButtons(session.session_id)}
        </td>
      </tr>
    `;
  }).join('');
}

function renderSessionsDetail() {
  if (sessionsViewState.loadingDetail) {
    return '<div class="detail-empty">Loading session detail...</div>';
  }
  if (sessionsViewState.detailError) {
    return `<div class="detail-error">${esc(sessionsViewState.detailError)}</div>`;
  }
  const session = sessionsViewState.selectedSession;
  if (!session) {
    return '<div class="detail-empty">Select a session to inspect canonical session root details and drill into downstream read surfaces.</div>';
  }
  return `
    <div class="session-header">
      <div>
        <h3>${esc(session.goal?.question || 'Untitled session')}</h3>
        <div class="session-meta">
          <span class="inline-code">${esc(session.session_id)}</span>
          ${statusBadge(sessionStatus(session))}
          <span>Created ${esc(fmtDate(session.created_at))}</span>
          <span>Updated ${esc(fmtDate(session.updated_at))}</span>
        </div>
      </div>
    </div>
    <div class="detail-grid">
      <div class="detail-group">
        <h4>Constraints</h4>
        ${formatPretty(session.scope?.constraints)}
      </div>
      <div class="detail-group">
        <h4>Budget</h4>
        ${formatPretty(session.governance?.budget)}
      </div>
      <div class="detail-group">
        <h4>Policy</h4>
        ${formatPretty(session.governance?.policy_refs)}
      </div>
      <div class="detail-group">
        <h4>Terminal Reason</h4>
        ${formatPretty(session.lifecycle?.terminal_reason)}
      </div>
      <div class="detail-group">
        <h4>Rollover From Session</h4>
        ${formatPretty(session.lifecycle?.rollover_from_session_id)}
      </div>
    </div>
    <div class="detail-actions">
      ${renderSessionActionButtons(session.session_id)}
    </div>
  `;
}

function bindSessionsEvents() {
  const panel = document.getElementById('panel-sessions');
  if (!panel) return;

  const filterForm = panel.querySelector('[data-role="session-filters"]');
  if (filterForm) {
    filterForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const formData = new FormData(filterForm);
      applyRoute({
        ...currentRoute,
        tab: 'sessions',
        status: String(formData.get('status') || ''),
        sessionQuery: String(formData.get('session_query') || ''),
        sessionId: '',
      });
    });
  }

  panel.querySelector('[data-role="reset-filters"]')?.addEventListener('click', () => {
    applyRoute({ ...DEFAULT_ROUTE, tab: 'sessions' });
  });

  panel.querySelectorAll('.session-select-btn').forEach((button) => {
    button.addEventListener('click', () => {
      applyRoute({
        ...currentRoute,
        tab: 'sessions',
        sessionId: button.dataset.sessionId || '',
      });
    });
  });

  panel.querySelectorAll('.session-nav-btn').forEach((button) => {
    button.addEventListener('click', () => {
      applyRoute({
        ...currentRoute,
        tab: button.dataset.targetTab || 'sessions',
        sessionId: button.dataset.sessionId || '',
        propositionId: '',
        runtimeScope: button.dataset.targetTab === 'runtime' ? 'session' : '',
      });
    });
  });
}

function renderSessionsPage() {
  const panel = document.getElementById('panel-sessions');
  if (!panel) return;

  panel.innerHTML = `
    <div class="page-intro">
      <h2>Sessions</h2>
      <p>Browse existing analysis sessions, inspect canonical session root detail, and jump into State, Runtime, Jobs, or Grounding without exposing any write controls.</p>
    </div>
    <div class="sessions-layout">
      <div class="sessions-stack">
        <div class="card">
          <div class="shell-card-title">
            <h3>Session Filters</h3>
            <span class="shell-chip">Read-only</span>
          </div>
          <form class="sessions-filters" data-role="session-filters">
            <div class="form-group">
              <label for="session-status-filter">Status</label>
              <select id="session-status-filter" name="status">
                <option value="">All statuses</option>
                <option value="open" ${currentRoute.status === 'open' ? 'selected' : ''}>open</option>
                <option value="closed" ${currentRoute.status === 'closed' ? 'selected' : ''}>closed</option>
                <option value="aborted" ${currentRoute.status === 'aborted' ? 'selected' : ''}>aborted</option>
              </select>
            </div>
            <div class="form-group">
              <label for="session-id-filter">Search by session_id</label>
              <input id="session-id-filter" type="text" name="session_query" value="${attr(currentRoute.sessionQuery)}" placeholder="sess_..." />
            </div>
            <button class="btn btn-primary" type="submit">Filter</button>
            <button class="btn" type="button" data-role="reset-filters">Reset</button>
          </form>
          <p class="panel-note">Results use the canonical session root read surface. Filtering is limited to lifecycle status and session identifier lookup.</p>
        </div>
        <div class="card">
          <div class="list-meta">
            <div>
              <h2>Recent Sessions</h2>
              <div class="results-count">${sessionsViewState.loadingList ? 'Loading sessions...' : `${sessionsViewState.items.length} session(s)`}</div>
            </div>
          </div>
          ${sessionsViewState.listError ? `<div class="list-error">${esc(sessionsViewState.listError)}</div>` : `
            <div class="sessions-table-wrap">
              <table class="sessions-table">
                <thead>
                  <tr>
                    <th>Detail</th>
                    <th>session_id</th>
                    <th>goal</th>
                    <th>status</th>
                    <th>created_at</th>
                    <th>updated_at</th>
                    <th>actions</th>
                  </tr>
                </thead>
                <tbody>${renderSessionRows()}</tbody>
              </table>
            </div>
          `}
        </div>
      </div>
      <div class="card">
        <div class="shell-card-title">
          <h3>Session Detail</h3>
          <span class="shell-chip">${currentRoute.sessionId ? 'Selected' : 'Idle'}</span>
        </div>
        ${renderSessionsDetail()}
      </div>
    </div>
  `;

  bindSessionsEvents();
}

async function loadSessions() {
  sessionsViewState.loadingList = true;
  sessionsViewState.listError = '';
  renderSessionsPage();
  try {
    const payload = await uiApi.listSessions(currentRoute);
    sessionsViewState.items = Array.isArray(payload.items) ? payload.items : [];
    sessionsViewState.nextPageToken = payload.next_page_token || null;
  } catch (error) {
    sessionsViewState.items = [];
    sessionsViewState.nextPageToken = null;
    sessionsViewState.listError = error.message || 'Failed to load sessions.';
  } finally {
    sessionsViewState.loadingList = false;
    renderSessionsPage();
  }
}

async function loadSessionDetail() {
  if (!currentRoute.sessionId) {
    sessionsViewState.selectedSession = null;
    sessionsViewState.loadingDetail = false;
    sessionsViewState.detailError = '';
    renderSessionsPage();
    return;
  }

  sessionsViewState.loadingDetail = true;
  sessionsViewState.detailError = '';
  renderSessionsPage();
  try {
    const session = await uiApi.getSession(currentRoute.sessionId);
    sessionsViewState.selectedSession = session;
  } catch (error) {
    sessionsViewState.selectedSession = null;
    if (error.status === 404) {
      sessionsViewState.detailError = '404 session not found. Returned to session list.';
      toast('404 session not found. Returned to session list.', 'error');
      applyRoute({ ...currentRoute, tab: 'sessions', sessionId: '' }, 'replace');
      return;
    }
    sessionsViewState.detailError = error.message || 'Failed to load session detail.';
  } finally {
    sessionsViewState.loadingDetail = false;
    renderSessionsPage();
  }
}

async function loadStateView() {
  if (!currentRoute.sessionId) {
    stateViewState.loading = false;
    stateViewState.error = '';
    stateViewState.result = null;
    renderStatePage();
    return;
  }

  stateViewState.loading = true;
  stateViewState.error = '';
  renderStatePage();
  try {
    const payload = await uiApi.getSessionState(currentRoute.sessionId, stateViewState.filters);
    stateViewState.result = payload;
  } catch (error) {
    stateViewState.result = null;
    if (error.status === 404) {
      stateViewState.error = '404 session not found. Returned to session list.';
      toast('404 session not found. Returned to session list.', 'error');
      applyRoute(
        { ...currentRoute, tab: 'sessions', sessionId: '', propositionId: '', runtimeScope: '' },
        'replace'
      );
      return;
    }
    stateViewState.error = error.message || 'State query failed.';
  } finally {
    stateViewState.loading = false;
    renderStatePage();
  }
}

async function loadContextView() {
  if (!currentRoute.sessionId || !currentRoute.propositionId) {
    contextViewState.loading = false;
    contextViewState.error = '';
    contextViewState.result = null;
    renderContextPage();
    return;
  }

  contextViewState.loading = true;
  contextViewState.error = '';
  renderContextPage();
  try {
    const payload = await uiApi.getPropositionContext(
      currentRoute.sessionId,
      currentRoute.propositionId
    );
    contextViewState.result = payload;
  } catch (error) {
    contextViewState.result = null;
    if (error.status === 404) {
      contextViewState.error = '404 proposition not found. Returned to State.';
      toast('404 proposition not found. Returned to State.', 'error');
      applyRoute(
        { ...currentRoute, tab: 'state', propositionId: '', runtimeScope: '' },
        'replace'
      );
      return;
    }
    contextViewState.error = error.message || 'Context lookup failed.';
  } finally {
    contextViewState.loading = false;
    renderContextPage();
  }
}

async function refreshForRoute() {
  if (currentRoute.tab === 'sessions') {
    renderSessionsPage();
    await loadSessions();
    await loadSessionDetail();
    return;
  }
  if (currentRoute.tab === 'state') {
    renderStatePage();
    await loadStateView();
    return;
  }
  if (currentRoute.tab === 'context') {
    renderContextPage();
    await loadContextView();
    return;
  }
  renderShellPlaceholder(currentRoute.tab);
}

function applyRoute(nextRoute, historyMode = 'push') {
  currentRoute = normalizeRoute(nextRoute);
  writeRoute(currentRoute, historyMode);
  suppressTabSync = true;
  setActiveTab(currentRoute.tab);
  suppressTabSync = false;
  void refreshForRoute();
}

document.addEventListener('DOMContentLoaded', () => {
  initSidebar();
  Object.keys(SHELL_PAGE_CONFIG).forEach((tab) => {
    if (tab !== 'sessions') renderShellPlaceholder(tab);
  });
  currentRoute = routeFromLocation();
  window.addEventListener('tab-change', (event) => {
    if (suppressTabSync) return;
    applyRoute({ ...currentRoute, tab: event.detail?.tab || DEFAULT_ROUTE.tab });
  });
  window.addEventListener('popstate', () => {
    currentRoute = routeFromLocation();
    suppressTabSync = true;
    setActiveTab(currentRoute.tab);
    suppressTabSync = false;
    void refreshForRoute();
  });
  suppressTabSync = true;
  setActiveTab(currentRoute.tab);
  suppressTabSync = false;
  void refreshForRoute();
});
</script>
</body>
</html>
