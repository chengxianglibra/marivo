<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marivo Query Workbench</title>
<link rel="stylesheet" href="/static/shared.css">
<style>
.page-intro {
  margin-bottom: var(--space-xl);
}

.page-intro h2 {
  margin-bottom: var(--space-sm);
  font-size: var(--font-size-xl);
}

.page-intro p {
  max-width: 760px;
  color: var(--color-text-secondary);
}

.shell-grid {
  display: grid;
  gap: var(--space-lg);
}

.shell-card-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-md);
  margin-bottom: var(--space-lg);
}

.shell-card-title h3 {
  margin: 0;
  font-size: var(--font-size-md);
}

.shell-chip {
  display: inline-flex;
  align-items: center;
  padding: 2px 10px;
  border-radius: var(--radius-full);
  background: var(--color-info-bg);
  color: var(--color-info);
  font-size: var(--font-size-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.shell-controls,
.shell-results {
  display: grid;
  gap: var(--space-md);
}

.shell-control {
  padding: var(--space-md);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: var(--color-bg);
}

.shell-control-label {
  margin-bottom: 4px;
  font-size: var(--font-size-sm);
  font-weight: 600;
}

.shell-control-copy,
.shell-results-copy {
  color: var(--color-text-secondary);
}

.shell-status-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: var(--space-md);
}

.shell-status {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: var(--color-surface);
  padding: var(--space-md);
}

.shell-status strong {
  display: block;
  margin-bottom: 4px;
  font-size: var(--font-size-sm);
}

.sessions-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.7fr) minmax(320px, 1fr);
  gap: var(--space-lg);
}

.sessions-stack {
  display: grid;
  gap: var(--space-lg);
}

.sessions-filters {
  display: grid;
  grid-template-columns: minmax(160px, 220px) minmax(220px, 1fr) auto auto;
  gap: var(--space-md);
  align-items: end;
}

.sessions-table-wrap {
  overflow-x: auto;
}

.sessions-table tr.is-selected td {
  background: var(--color-primary-light);
}

.sessions-table td.actions-cell {
  white-space: nowrap;
}

.sessions-table .btn {
  margin-right: var(--space-xs);
  margin-bottom: var(--space-xs);
}

.state-layout {
  display: grid;
  gap: var(--space-lg);
}

.state-filters {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: var(--space-md);
  align-items: end;
}

.state-summary-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.7fr) minmax(320px, 1fr);
  gap: var(--space-lg);
}

.state-results-stack,
.state-sidebar {
  display: grid;
  gap: var(--space-lg);
}

.state-sidebar-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-bottom: var(--space-md);
}

.state-sidebar-tabs .btn.is-active {
  border-color: var(--color-primary);
  background: var(--color-primary-light);
  color: var(--color-primary);
}

.subject-chip-list {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
}

.subject-chip {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: var(--radius-full);
  background: #ecfeff;
  color: #155e75;
  font-size: var(--font-size-xs);
  font-weight: 600;
}

.state-meta-note {
  margin-top: var(--space-sm);
  color: var(--color-text-secondary);
  font-size: var(--font-size-sm);
}

.state-table-wrap {
  overflow-x: auto;
}

.state-table td.actions-cell {
  white-space: nowrap;
}

.state-table tr.is-selected td {
  background: var(--color-primary-light);
}

.state-subject {
  display: grid;
  gap: 4px;
}

.state-subject-main {
  font-weight: 600;
}

.state-subject-meta {
  color: var(--color-text-secondary);
  font-size: var(--font-size-xs);
}

.state-empty,
.state-error {
  border: 1px dashed var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  background: var(--color-bg);
  color: var(--color-text-secondary);
}

.state-error {
  border-color: #fecaca;
  background: var(--color-error-bg);
  color: #991b1b;
}

.state-detail-list {
  display: grid;
  gap: var(--space-md);
}

.state-detail-item {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-md);
  background: var(--color-bg);
}

.state-detail-item h4 {
  margin-bottom: var(--space-xs);
  font-size: var(--font-size-sm);
}

.panel-note {
  margin-top: var(--space-sm);
  color: var(--color-text-secondary);
  font-size: var(--font-size-sm);
}

.inline-code {
  display: inline-block;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  background: #eef2ff;
  color: #3730a3;
  font-family: var(--font-mono);
  font-size: var(--font-size-xs);
}

.detail-grid {
  display: grid;
  gap: var(--space-md);
}

.detail-group {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-md);
  background: var(--color-bg);
}

.detail-group h4 {
  margin-bottom: var(--space-xs);
  font-size: var(--font-size-sm);
}

.detail-actions {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-top: var(--space-md);
}

.detail-empty,
.detail-error,
.list-empty,
.list-error {
  border: 1px dashed var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  background: var(--color-bg);
  color: var(--color-text-secondary);
}

.detail-error,
.list-error {
  border-color: #fecaca;
  background: var(--color-error-bg);
  color: #991b1b;
}

.list-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-md);
  margin-bottom: var(--space-md);
}

.results-count {
  color: var(--color-text-secondary);
  font-size: var(--font-size-sm);
}

.session-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-md);
  margin-bottom: var(--space-md);
}

.session-header h3 {
  margin: 0;
  font-size: var(--font-size-lg);
}

.session-meta {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-top: var(--space-sm);
}

.json-pre {
  margin: 0;
  font-family: var(--font-mono);
  font-size: var(--font-size-xs);
  white-space: pre-wrap;
  word-break: break-word;
}

.context-layout,
.context-stack,
.context-grid {
  display: grid;
  gap: var(--space-lg);
}

.context-grid {
  grid-template-columns: minmax(0, 1.4fr) minmax(320px, 1fr);
}

.context-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-md);
}

.context-header h3 {
  margin: 0;
  font-size: var(--font-size-lg);
}

.context-meta {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-top: var(--space-sm);
}

.context-section-list {
  display: grid;
  gap: var(--space-md);
}

.context-section-item {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-md);
  background: var(--color-bg);
}

.context-section-item h4 {
  margin-bottom: var(--space-xs);
  font-size: var(--font-size-sm);
}

.context-inline-meta {
  margin-top: var(--space-sm);
  color: var(--color-text-secondary);
  font-size: var(--font-size-sm);
}

.runtime-layout,
.runtime-stack,
.runtime-grid {
  display: grid;
  gap: var(--space-lg);
}

.runtime-grid {
  grid-template-columns: minmax(0, 1.35fr) minmax(320px, 1fr);
}

.runtime-summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: var(--space-md);
}

.runtime-summary-card {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-md);
  background: var(--color-bg);
}

.runtime-summary-card h4 {
  margin-bottom: var(--space-xs);
  font-size: var(--font-size-sm);
}

.runtime-meta-grid {
  display: grid;
  gap: var(--space-md);
}

.grounding-layout,
.grounding-stack,
.grounding-sidebar {
  display: grid;
  gap: var(--space-lg);
}

.grounding-layout {
  grid-template-columns: minmax(320px, 380px) minmax(0, 1fr);
}

.grounding-search-form {
  display: grid;
  gap: var(--space-md);
}

.grounding-search-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(140px, 180px);
  gap: var(--space-md);
  align-items: end;
}

.grounding-result-list {
  display: grid;
  gap: var(--space-sm);
}

.grounding-result-item {
  width: 100%;
  padding: var(--space-md);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: var(--color-bg);
  text-align: left;
  cursor: pointer;
}

.grounding-result-item.is-selected {
  border-color: var(--color-primary);
  background: var(--color-primary-light);
}

.grounding-result-item h4 {
  margin-bottom: var(--space-xs);
  font-size: var(--font-size-sm);
}

.grounding-result-meta {
  display: grid;
  gap: 4px;
  color: var(--color-text-secondary);
  font-size: var(--font-size-xs);
}

.grounding-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-md);
}

.grounding-card-header h3 {
  margin: 0;
  font-size: var(--font-size-md);
}

@media (max-width: 768px) {
  .shell-card-title {
    align-items: flex-start;
    flex-direction: column;
  }

  .sessions-layout {
    grid-template-columns: 1fr;
  }

  .state-summary-grid {
    grid-template-columns: 1fr;
  }

  .context-grid {
    grid-template-columns: 1fr;
  }

  .runtime-grid {
    grid-template-columns: 1fr;
  }

  .grounding-layout,
  .grounding-search-grid {
    grid-template-columns: 1fr;
  }

  .state-filters {
    grid-template-columns: 1fr;
  }

  .sessions-filters {
    grid-template-columns: 1fr;
  }

  .list-meta,
  .session-header {
    flex-direction: column;
    align-items: stretch;
  }
}
</style>
</head>

<script>
const SHELL_PAGE_CONFIG = {

    resultCopy: 'T6 will attach stage summaries, failure signals, and runtime drill-ins to this area.',

const SESSION_PAGE_LIMIT = 25;
const VALID_TABS = Object.keys(SHELL_PAGE_CONFIG);
const DEFAULT_ROUTE = {
  tab: 'sessions',
  sessionId: '',
  propositionId: '',
  artifactId: '',

const UI_EMPTY_COPY = {

const uiApi = {
  async fetchJson(path) {
    const response = await fetch(path, {
      headers: { 'Content-Type': 'application/json' },
    });
    let payload = null;
    try {
      payload = await response.json();
    } catch (error) {
      payload = null;
    }
    if (!response.ok) {
      const detail = payload && Object.prototype.hasOwnProperty.call(payload, 'detail')
        ? payload.detail
        : payload;
      const message = detail && typeof detail === 'object' && typeof detail.message === 'string'
        ? detail.message
        : (typeof detail === 'string' ? detail : `Request failed with status ${response.status}`);
      const err = new Error(message);
      err.status = response.status;
      err.detail = detail;
      throw err;
    }
    return payload;
  },
  listSessions(route, pageToken = null) {
    const params = new URLSearchParams();
    if (route.status) params.set('status', route.status);
    if (route.sessionQuery) params.set('session_id', route.sessionQuery);
    params.set('limit', String(SESSION_PAGE_LIMIT));
    if (pageToken) params.set('page_token', pageToken);
    return this.fetchJson(`/sessions?${params.toString()}`);
  },
  getSession(sessionId) {
    return this.fetchJson(`/sessions/${encodeURIComponent(sessionId)}`);
  },
  getSessionState(sessionId, filters) {
    const params = new URLSearchParams();
    if (filters.metric) params.set('metric', filters.metric);
    if (filters.entity) params.set('entity', filters.entity);
    splitMultiValue(filters.propositionTypes).forEach((value) => {
      params.append('proposition_type', value);
    });
    splitMultiValue(filters.originKinds).forEach((value) => {
      params.append('origin_kind', value);
    });
    if (filters.assessmentPresence) params.set('assessment_presence', filters.assessmentPresence);
    splitMultiValue(filters.assessmentStatuses).forEach((value) => {
      params.append('assessment_status', value);
    });
    if (filters.hasBlockingGaps === 'true' || filters.hasBlockingGaps === 'false') {
      params.set('has_blocking_gaps', filters.hasBlockingGaps);
    }
    const normalizedLimit = Number.parseInt(filters.limit || '50', 10);
    if (!Number.isNaN(normalizedLimit) && normalizedLimit > 0) {
      params.set('limit', String(normalizedLimit));
    }
    return this.fetchJson(`/sessions/${encodeURIComponent(sessionId)}/state?${params.toString()}`);
  },
  getPropositionContext(sessionId, propositionId) {
    return this.fetchJson(
      `/sessions/${encodeURIComponent(sessionId)}/propositions/${encodeURIComponent(propositionId)}/context`
    );
  },
  getSessionRuntimeStatus(sessionId) {
    return this.fetchJson(`/sessions/${encodeURIComponent(sessionId)}/runtime-status`);
  },
  getPropositionRuntimeStatus(sessionId, propositionId) {
    return this.fetchJson(
      `/sessions/${encodeURIComponent(sessionId)}/propositions/${encodeURIComponent(propositionId)}/runtime-status`
    );
  },
  getArtifactRuntimeStatus(sessionId, artifactId) {
    return this.fetchJson(
      `/sessions/${encodeURIComponent(sessionId)}/artifacts/${encodeURIComponent(artifactId)}/runtime-status`
    );
  },
  searchCatalog(query, objectType, readiness = 'ready') {
    const params = new URLSearchParams();
    params.set('q', query);
    if (objectType) params.set('type', objectType);
    if (readiness) params.set('readiness', readiness);
    return this.fetchJson(`/catalog/search?${params.toString()}`);
  },
  getCatalogObjectDetail(objectKind, objectId) {
    return this.fetchJson(
      `/catalog/objects/${encodeURIComponent(objectKind)}/${encodeURIComponent(objectId)}`
    );
  },
  resolveSemanticTerm(name) {
    return this.fetchJson(`/semantic/resolve/${encodeURIComponent(name)}`);
  },
  getCatalogGraph(root, depth) {
    const params = new URLSearchParams();
    params.set('root', root);
    params.set('depth', String(depth));
    return this.fetchJson(`/catalog/graph?${params.toString()}`);
  },
  getPlannerContext(sessionId) {
    return this.fetchJson(`/sessions/${encodeURIComponent(sessionId)}/planner-context`);
  },
  listJobs(filters) {
    const params = new URLSearchParams();
    if (filters.sessionId) params.set('session_id', filters.sessionId);
    if (filters.status) params.set('status', filters.status);
    const query = params.toString();
    return this.fetchJson(query ? `/jobs?${query}` : '/jobs');
  },
  getJob(jobId) {
    return this.fetchJson(`/jobs/${encodeURIComponent(jobId)}`);
  },
};

function normalizeRoute(nextRoute) {
  const route = {
    tab: VALID_TABS.includes(nextRoute.tab) ? nextRoute.tab : DEFAULT_ROUTE.tab,
    sessionId: nextRoute.sessionId || '',
    propositionId: nextRoute.propositionId || '',
    artifactId: nextRoute.artifactId || '',
    runtimeScope: nextRoute.runtimeScope || '',
    status: nextRoute.status || '',
    sessionQuery: (nextRoute.sessionQuery || '').trim(),
  };
  if (!['session', 'proposition', 'artifact'].includes(route.runtimeScope)) {
    route.runtimeScope = '';
  }
  if (route.tab !== 'runtime') {
    route.runtimeScope = '';
  }
  if (route.runtimeScope !== 'artifact') {
    route.artifactId = '';
  }
  return route;
}

function routeFromLocation() {
  const params = new URLSearchParams(window.location.search);
  return normalizeRoute({
    tab: params.get('tab') || DEFAULT_ROUTE.tab,
    sessionId: params.get('session_id') || '',
    propositionId: params.get('proposition_id') || '',
    artifactId: params.get('artifact_id') || '',
    runtimeScope: params.get('runtime_scope') || '',
    status: params.get('status') || '',
    sessionQuery: params.get('session_query') || '',
  });
}

function writeRoute(route, historyMode = 'push') {
  const params = new URLSearchParams();
  if (route.tab && route.tab !== DEFAULT_ROUTE.tab) params.set('tab', route.tab);
  if (route.sessionId) params.set('session_id', route.sessionId);
  if (route.propositionId) params.set('proposition_id', route.propositionId);
  if (route.artifactId) params.set('artifact_id', route.artifactId);
  if (route.runtimeScope) params.set('runtime_scope', route.runtimeScope);
  if (route.status) params.set('status', route.status);
  if (route.sessionQuery) params.set('session_query', route.sessionQuery);
  const nextUrl = params.toString() ? `?${params.toString()}` : window.location.pathname;
  const method = historyMode === 'replace' ? 'replaceState' : 'pushState';
  window.history[method](null, '', nextUrl);
}

function formatPretty(value) {
  if (value == null) return '<span class="empty">None</span>';
  if (typeof value === 'string') return `<span>${esc(value)}</span>`;
  return jsonPre(value);
}

function sessionStatus(session) {
  return session?.lifecycle?.status || 'unknown';
}

function splitMultiValue(value) {
  return String(value || '')
    .split(',')
    .map((item) => item.trim())
    .filter(Boolean);
}

function formatSubjectSummary(subject) {
  if (!subject || typeof subject !== 'object') {
    return '<span class="empty">No subject</span>';
  }
  const titleParts = [subject.metric, subject.entity, subject.grain].filter(Boolean);
  const sliceSummary = subject.slice && typeof subject.slice === 'object'
    ? Object.entries(subject.slice).map(([key, value]) => `${key}=${value}`).join(', ')
    : '';
  return `
    <div class="state-subject">
      <div class="state-subject-main">${esc(titleParts.join(' / ') || 'Unspecified subject')}</div>
      <div class="state-subject-meta">${esc(sliceSummary || 'No slice')}</div>
    </div>
  `;
}

function getPropositionSubject(proposition) {
  return proposition?.subject_json || proposition?.subject || null;
}

function renderContextStructuredValue(value, emptyLabel = 'None') {
  if (value == null) {
    return `<span class="empty">${esc(emptyLabel)}</span>`;
  }
  if (typeof value === 'string' || typeof value === 'number' || typeof value === 'boolean') {
    return `<span>${esc(String(value))}</span>`;
  }
  return jsonPre(value);
}

function renderContextCollection(title, items, renderItem, emptyCopy) {

  return `

        <span class="shell-chip">${esc(Array.isArray(items) ? `${items.length} item(s)` : 'None')}</span>

      .some(([key, value]) => key !== 'limit' && String(value || '').trim() !== '');

function bindStateEvents() {
  const panel = document.getElementById('panel-state');
  if (!panel) return;

  panel.querySelector('[data-role="state-filters"]')?.addEventListener('submit', (event) => {
    event.preventDefault();
    const formData = new FormData(event.currentTarget);
    stateViewState.filters = {
      metric: String(formData.get('metric') || '').trim(),
      entity: String(formData.get('entity') || '').trim(),
      assessmentPresence: String(formData.get('assessment_presence') || '').trim(),
      assessmentStatuses: String(formData.get('assessment_status') || '').trim(),
      hasBlockingGaps: String(formData.get('has_blocking_gaps') || '').trim(),
      originKinds: String(formData.get('origin_kind') || '').trim(),
      propositionTypes: String(formData.get('proposition_type') || '').trim(),
      limit: String(formData.get('limit') || '50').trim() || '50',
    };
    void loadStateView();
  });

  panel.querySelector('[data-role="reset-state-filters"]')?.addEventListener('click', () => {
    stateViewState.filters = {
      metric: '',
      entity: '',
      assessmentPresence: '',
      assessmentStatuses: '',
      hasBlockingGaps: '',
      originKinds: '',
      propositionTypes: '',
      limit: '50',
    };
    void loadStateView();
  });

  panel.querySelectorAll('.state-detail-tab').forEach((button) => {
    button.addEventListener('click', () => {
      stateViewState.selectedDetailTab = button.dataset.detailTab || 'findings';
      renderStatePage();
    });
  });

  panel.querySelectorAll('.state-open-context-btn').forEach((button) => {
    button.addEventListener('click', () => {
      goToContext(currentRoute.sessionId, button.dataset.propositionId || '');
    });
  });

  panel.querySelectorAll('.state-open-runtime-btn').forEach((button) => {
    button.addEventListener('click', () => {
      goToPropositionRuntime(currentRoute.sessionId, button.dataset.propositionId || '');
    });
  });

  panel.querySelector('[data-role="go-to-sessions"]')?.addEventListener('click', () => {
    goToSessions();
  });
}

function bindContextEvents() {
  const panel = document.getElementById('panel-context');
  if (!panel) return;

  panel.querySelector('[data-role="context-open-sessions"]')?.addEventListener('click', () => {
    goToSessions(currentRoute.sessionId);
  });

  panel.querySelectorAll('[data-role="context-open-state"]').forEach((button) => {
    button.addEventListener('click', () => {
      goToState(currentRoute.sessionId, currentRoute.propositionId);
    });
  });

  panel.querySelectorAll('[data-role="context-open-proposition-runtime"]').forEach((button) => {
    button.addEventListener('click', () => {
      goToPropositionRuntime(currentRoute.sessionId, currentRoute.propositionId);
    });
  });

  panel.querySelectorAll('.context-open-artifact-runtime-btn').forEach((button) => {
    button.addEventListener('click', () => {
      const artifactId = button.dataset.artifactId || '';
      if (artifactId) {
        toast(`Opening Artifact Runtime for ${artifactId} in the Runtime workbench.`, 'info');
      }
      goToArtifactRuntime(currentRoute.sessionId, artifactId, currentRoute.propositionId);
    });
  });
}

function runtimeScopeLabel(scope) {
  const labels = {
    session: 'Session Runtime',
    proposition: 'Proposition Runtime',
    artifact: 'Artifact Runtime',
  };
  return labels[scope] || 'Runtime';
}

function runtimeLocatorCopy() {
  if (currentRoute.runtimeScope === 'session') {
    return currentRoute.sessionId
      ? 'Session runtime explains overall progress, backlog, and blocking for the selected session.'
      : 'Select a session from Sessions to inspect session runtime.';
  }
  if (currentRoute.runtimeScope === 'proposition') {
    return currentRoute.propositionId
      ? 'Proposition runtime explains whether assessment, proposal refresh, or publish visibility is pending.'
      : 'Open Proposition Runtime from State or Context to inspect one proposition.';
  }
  if (currentRoute.runtimeScope === 'artifact') {
    return currentRoute.artifactId
      ? 'Artifact runtime explains extractor progress and seeding handoff for the selected artifact.'
      : 'Open Artifact Runtime from Context artifact_refs to inspect one artifact.';
  }
  return 'Choose a runtime scope from linked canonical pages to inspect operator-facing runtime truth.';
}

function renderRuntimeStructuredValue(value, emptyLabel = 'None') {
  if (value == null) {
    return `<span class="empty">${esc(emptyLabel)}</span>`;
  }
  if (typeof value === 'string') {
    return `<span>${esc(value)}</span>`;
  }
  return jsonPre(value);
}

function renderRuntimeSummaryCards(items) {
  return `
    <div class="runtime-summary-grid">
      ${items.map(([label, value, kind]) => `
        <div class="runtime-summary-card">
          <h4>${esc(label)}</h4>
          ${kind === 'status' && value ? statusBadge(value) : renderRuntimeStructuredValue(value)}
        </div>
      `).join('')}
    </div>
  `;
}

function renderRuntimeMainContent() {
  if (!currentRoute.runtimeScope) {
    return `
      <div class="detail-empty">

        </div>
      </div>
    `;
  }

  const missingLocator = (
    (currentRoute.runtimeScope === 'session' && !currentRoute.sessionId) ||
    (currentRoute.runtimeScope === 'proposition' && (!currentRoute.sessionId || !currentRoute.propositionId)) ||
    (currentRoute.runtimeScope === 'artifact' && (!currentRoute.sessionId || !currentRoute.artifactId))

  if (missingLocator) {
    return `
      <div class="detail-empty">
        当前 runtime locator 不完整，无法发起查询。
        <div class="detail-actions">
          <button class="btn btn-sm" type="button" data-role="runtime-open-sessions">Open Sessions</button>
          ${currentRoute.sessionId ? '<button class="btn btn-sm" type="button" data-role="runtime-open-state">Open State</button>' : ''}
          ${currentRoute.propositionId ? '<button class="btn btn-sm" type="button" data-role="runtime-open-context">Open Context</button>' : ''}
        </div>
      </div>
    `;
  }

  if (runtimeViewState.loading) {
    return '<div class="detail-empty">Loading runtime status...</div>';
  }

  if (runtimeViewState.error) {
    return `
      <div class="detail-error">${esc(runtimeViewState.error)}</div>
      <div class="detail-actions">
        <button class="btn btn-sm" type="button" data-role="runtime-open-sessions">Open Session</button>
        ${currentRoute.sessionId ? '<button class="btn btn-sm" type="button" data-role="runtime-open-state">Open State</button>' : ''}
        ${currentRoute.propositionId ? '<button class="btn btn-sm" type="button" data-role="runtime-open-context">Open Context</button>' : ''}
        ${currentRoute.sessionId ? '<button class="btn btn-sm" type="button" data-role="runtime-open-jobs">Open Jobs</button>' : ''}
      </div>

  }

    return '<div class="detail-empty">No runtime status loaded yet.</div>';
  }

  const scope = currentRoute.runtimeScope;
  let summaryCards = '';
  let detailCards = '';
  let linkButtons = `
    <button class="btn btn-sm" type="button" data-role="runtime-open-sessions">Open Session</button>
    ${currentRoute.sessionId ? '<button class="btn btn-sm" type="button" data-role="runtime-open-state">Open State</button>' : ''}
    ${currentRoute.sessionId ? '<button class="btn btn-sm" type="button" data-role="runtime-open-jobs">Open Jobs</button>' : ''}
  `;

  if (scope === 'session') {
    summaryCards = renderRuntimeSummaryCards([
      ['overall_status', result.overall_status, 'status'],
      ['last_successful_stage', result.last_successful_stage, 'text'],
      ['blocked_reason', result.blocked_reason, 'text'],
      ['updated_at', result.updated_at, 'text'],
    ]);

      <div class="card">
        <div class="shell-card-title">
          <h3>Backlog Summary</h3>
          <span class="shell-chip">Session Runtime</span>
        </div>
        ${renderRuntimeStructuredValue(result.backlog_summary, 'No backlog summary')}
      </div>
      <div class="card">
        <div class="shell-card-title">
          <h3>Runtime Boundary</h3>
          <span class="shell-chip">Operator-facing</span>
        </div>
        <p class="panel-note">Session Runtime explains overall progress and backlog only. It does not restate canonical proposition assessments or findings.</p>
      </div>
    `;
  } else if (scope === 'proposition') {
    summaryCards = renderRuntimeSummaryCards([
      ['current_stage', result.current_stage, 'status'],
      ['last_successful_stage', result.last_successful_stage, 'text'],
      ['current_assessment_id', result.current_assessment_id, 'text'],
      ['backlog_state', result.backlog_state, 'text'],
    ]);
    detailCards = `
      <div class="card">
        <div class="shell-card-title">
          <h3>Attempt / Failure</h3>
          <span class="shell-chip">Proposition Runtime</span>
        </div>
        <div class="runtime-meta-grid">
          <div class="runtime-summary-card">
            <h4>current_attempt</h4>
            ${renderRuntimeStructuredValue(result.current_attempt, 'No active attempt')}
          </div>
          <div class="runtime-summary-card">
            <h4>last_failure_reason</h4>
            ${renderRuntimeStructuredValue(result.last_failure_reason, 'none')}
          </div>
          <div class="runtime-summary-card">
            <h4>last_failure_at</h4>
            ${renderRuntimeStructuredValue(result.last_failure_at, 'None')}
          </div>
        </div>
      </div>
      <div class="card">
        <div class="shell-card-title">
          <h3>Runtime Boundary</h3>
          <span class="shell-chip">Canonical Separation</span>
        </div>
        <p class="panel-note">Use Proposition Runtime to distinguish queued, publish_ready, externally_visible, or failed execution states. Return to Context for canonical evidence closure.</p>
      </div>
    `;
    linkButtons = `
      <button class="btn btn-sm" type="button" data-role="runtime-open-sessions">Open Session</button>
      <button class="btn btn-sm" type="button" data-role="runtime-open-state">Open State</button>
      <button class="btn btn-sm" type="button" data-role="runtime-open-context">Open Context</button>
    `;
  } else if (scope === 'artifact') {
    summaryCards = renderRuntimeSummaryCards([
      ['artifact_stage', result.artifact_stage, 'status'],
      ['correlation_id', result.correlation_id, 'text'],
      ['attempt_id', result.attempt_id, 'text'],
      ['last_failure_reason', result.last_failure_reason, 'text'],
    ]);
    detailCards = `
      <div class="card">
        <div class="shell-card-title">
          <h3>Extractor / Failure</h3>
          <span class="shell-chip">Artifact Runtime</span>
        </div>
        <div class="runtime-meta-grid">
          <div class="runtime-summary-card">
            <h4>extractor_key</h4>
            ${renderRuntimeStructuredValue(result.extractor_key, 'No extractor key')}
          </div>
          <div class="runtime-summary-card">
            <h4>last_failure_at</h4>
            ${renderRuntimeStructuredValue(result.last_failure_at, 'None')}
          </div>
        </div>
      </div>
      <div class="card">
        <div class="shell-card-title">
          <h3>Runtime Boundary</h3>
          <span class="shell-chip">Artifact Flow</span>
        </div>
        <p class="panel-note">Artifact Runtime explains extractor progress and seeding handoff only. Return to Context or State for canonical proposition meaning.</p>
      </div>
    `;
    linkButtons = `
      <button class="btn btn-sm" type="button" data-role="runtime-open-sessions">Open Session</button>
      ${currentRoute.propositionId ? '<button class="btn btn-sm" type="button" data-role="runtime-open-context">Open Context</button>' : ''}
    `;
  }

  return `
    <div class="runtime-stack">
      <div class="card">
        <div class="context-header">
          <div>
            <h3>${esc(runtimeScopeLabel(scope))}</h3>
            <div class="context-meta">
              <span class="inline-code">${esc(currentRoute.sessionId || 'session_id')}</span>
              ${scope === 'proposition' ? `<span class="inline-code">${esc(currentRoute.propositionId || 'proposition_id')}</span>` : ''}
              ${scope === 'artifact' ? `<span class="inline-code">${esc(currentRoute.artifactId || 'artifact_id')}</span>` : ''}
            </div>
          </div>
          <div class="detail-actions">
            ${linkButtons}
          </div>
        </div>
        ${summaryCards}
      </div>
      <div class="runtime-grid">
        <div class="runtime-stack">
          ${detailCards}
        </div>
        <div class="runtime-stack">
          <div class="card">
            <div class="shell-card-title">
              <h3>Raw Runtime Payload</h3>
              <span class="shell-chip">${esc(result.schema_version || 'runtime')}</span>
            </div>
            ${jsonPre(result)}
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderGroundingStructuredValue(value, emptyLabel = 'None') {
  if (value == null || value === '') {
    return `<span class="empty">${esc(emptyLabel)}</span>`;
  }
  if (typeof value === 'string' || typeof value === 'number' || typeof value === 'boolean') {
    return `<span>${esc(String(value))}</span>`;
  }
  return jsonPre(value);
}

function renderJobPayloadSummary(payload) {
  if (!payload || typeof payload !== 'object') {
    return '<span class="empty">No payload summary</span>';
  }
  const parts = [];
  if (payload.step_type) {
    parts.push(`step_type=${payload.step_type}`);
  }
  if (payload.params && typeof payload.params === 'object') {
    parts.push(`params=${Object.keys(payload.params).length}`);
  }
  return `<span>${esc(parts.join(' | ') || 'Structured payload')}</span>`;
}

function bindJobsEvents() {
  const panel = document.getElementById('panel-jobs');
  if (!panel) return;

  panel.querySelector('[data-role="jobs-filter-form"]')?.addEventListener('submit', (event) => {
    event.preventDefault();
    const formData = new FormData(event.currentTarget);
    goToJobs(
      String(formData.get('session_id') || '').trim(),
      String(formData.get('status') || '').trim()
    );
  });

  panel.querySelector('[data-role="jobs-reset-filters"]')?.addEventListener('click', () => {
    goToJobs();
  });

  panel.querySelectorAll('.jobs-open-detail-btn').forEach((button) => {
    button.addEventListener('click', () => {
      jobsViewState.selectedJobId = button.dataset.jobId || '';
      void loadJobDetail();
    });
  });

  panel.querySelectorAll('[data-role="jobs-open-session"]').forEach((button) => {
    button.addEventListener('click', () => {
      goToSessions(button.dataset.sessionId || '');
    });
  });
}

async function loadJobsList() {
  jobsViewState.loadingList = true;
  jobsViewState.listError = '';
  jobsViewState.detailError = '';
  jobsViewState.selectedJob = null;
  renderJobsPage();
  try {
    const payload = await uiApi.listJobs(currentRoute);
    jobsViewState.items = Array.isArray(payload) ? payload : [];
    if (!jobsViewState.selectedJobId || !jobsViewState.items.some((job) => job.job_id === jobsViewState.selectedJobId)) {
      jobsViewState.selectedJobId = jobsViewState.items[0]?.job_id || '';
    }
    if (!jobsViewState.selectedJobId) {
      jobsViewState.selectedJob = null;
    }
  } catch (error) {
    jobsViewState.items = [];
    jobsViewState.selectedJobId = '';
    jobsViewState.selectedJob = null;
    jobsViewState.listError = error.message || 'Job listing failed.';
  } finally {
    jobsViewState.loadingList = false;
    renderJobsPage();
  }
}

async function loadJobDetail() {
  if (!jobsViewState.selectedJobId) {
    jobsViewState.loadingDetail = false;
    jobsViewState.detailError = '';
    jobsViewState.selectedJob = null;
    renderJobsPage();
    return;
  }

  jobsViewState.loadingDetail = true;
  jobsViewState.detailError = '';
  renderJobsPage();
  try {
    jobsViewState.selectedJob = await uiApi.getJob(jobsViewState.selectedJobId);
  } catch (error) {
    jobsViewState.selectedJob = null;
    jobsViewState.detailError = error.status === 404
      ? '404 job not found. Select another job from the list.'
      : (error.message || 'Job detail lookup failed.');
  } finally {
    jobsViewState.loadingDetail = false;
    renderJobsPage();
  }
}

async function loadJobsView() {
  renderJobsPage();
  await loadJobsList();
  await loadJobDetail();
}

function isSemanticGroundingResult(item) {
  return item && item.object_kind && item.object_kind !== 'asset';
}

function renderGroundingBadges(item) {
  if (!isSemanticGroundingResult(item)) {
    return statusBadge(item?.status || item?.object_type || 'unknown');
  }
  return `
    ${statusBadge(item.lifecycle_status || item.status || 'unknown')}
    ${statusBadge(item.readiness_status || 'unknown')}
  `;
}

function summarizeGroundingBlockers(item) {
  if (!isSemanticGroundingResult(item)) {
    return '';
  }
  const blockers = Array.isArray(item.blocking_requirements_preview)
    ? item.blocking_requirements_preview
    : [];
  if (blockers.length === 0) {
    return item.readiness_status === 'ready'
      ? 'Ready for default use.'
      : 'Unavailable object without blocker detail.';
  }
  const preview = blockers
    .map((blocker) => blocker?.message || blocker?.code || 'Unknown blocker')
    .filter(Boolean)
    .join(' | ');
  const remaining = Math.max((item.blocker_count || 0) - blockers.length, 0);
  return remaining > 0 ? `${preview} | +${remaining} more blocker(s)` : preview;
}

function summarizeGroundingCapabilities(item) {
  if (!isSemanticGroundingResult(item)) {
    return '';
  }
  const capabilities = item.capabilities_summary || {};
  const limits = [];
  if (item.object_kind === 'metric' && capabilities.supports_validate === false) {
    limits.push('validate unavailable');
  }
  if (item.object_kind === 'process' && capabilities.inferential_ready === false) {
    limits.push('inferential runtime unavailable');
  }
  if (limits.length > 0) {
    return limits.join(' | ');
  }
  const enabled = Object.entries(capabilities)
    .filter(([, value]) => value === true)
    .slice(0, 2)
    .map(([key]) => key);
  return enabled.length > 0 ? `Capabilities: ${enabled.join(', ')}` : '';
}

function bindGroundingEvents() {
  const panel = document.getElementById('panel-grounding');
  if (!panel) return;

  panel.querySelector('[data-role="grounding-search-form"]')?.addEventListener('submit', (event) => {
    event.preventDefault();
    const formData = new FormData(event.currentTarget);
    groundingViewState.searchQuery = String(formData.get('q') || '').trim();
    groundingViewState.searchType = String(formData.get('type') || '').trim();
    groundingViewState.showUnavailable = formData.get('show_unavailable') === 'on';
    groundingViewState.selectedObjectId = '';
    groundingViewState.selectedObjectKind = '';
    groundingViewState.selectedRef = '';
    groundingViewState.detailError = '';
    groundingViewState.detailResult = null;
    groundingViewState.resolveError = '';
    groundingViewState.resolveWhyNotReady = null;
    groundingViewState.resolveResult = null;
    groundingViewState.graphError = '';
    groundingViewState.graphResult = null;
    void loadGroundingSearch();
  });

  panel.querySelector('[data-role="grounding-reset-search"]')?.addEventListener('click', () => {
    groundingViewState.searchQuery = '';

    groundingViewState.searchResults = [];
    renderGroundingPage();
    return;

  groundingViewState.searchLoading = true;
  groundingViewState.searchError = '';
  renderGroundingPage();
  try {
    const payload = await uiApi.searchCatalog(
      groundingViewState.searchQuery,
      groundingViewState.searchType,
      groundingSearchReadinessMode()
    );
    groundingViewState.searchResults = Array.isArray(payload) ? payload : [];
  } catch (error) {
    groundingViewState.searchResults = [];
    groundingViewState.searchError = error.message || 'Catalog search failed.';
  } finally {
    groundingViewState.searchLoading = false;

async function loadGroundingDetail() {

    renderGroundingPage();

  groundingViewState.detailLoading = true;
  groundingViewState.detailError = '';

  } finally {

}

async function loadGroundingResolve() {
  const ref = groundingViewState.selectedRef;
  if (!ref || groundingViewState.selectedObjectKind === 'asset') {
    groundingViewState.resolveLoading = false;
    groundingViewState.resolveError = '';
    groundingViewState.resolveWhyNotReady = null;
    groundingViewState.resolveResult = null;
    renderGroundingPage();
    return;
  }

  groundingViewState.resolveLoading = true;
  groundingViewState.resolveError = '';
  groundingViewState.resolveWhyNotReady = null;
  renderGroundingPage();
  try {
    groundingViewState.resolveResult = await uiApi.resolveSemanticTerm(ref);
  } catch (error) {
    groundingViewState.resolveResult = null;
    if (error.status === 409 && error.detail && error.detail.code === 'semantic_not_ready') {
      groundingViewState.resolveWhyNotReady = error.detail;
      groundingViewState.resolveError = '';
    } else {
      groundingViewState.resolveError = error.message || 'Semantic resolve failed.';
    }
  } finally {
    groundingViewState.resolveLoading = false;
    renderGroundingPage();
  }
}

function bindSessionsEvents() {
  const panel = document.getElementById('panel-sessions');
  if (!panel) return;

  const filterForm = panel.querySelector('[data-role="session-filters"]');
  if (filterForm) {
    filterForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const formData = new FormData(filterForm);
      applyRoute({
        ...currentRoute,
        tab: 'sessions',
        status: String(formData.get('status') || ''),
        sessionQuery: String(formData.get('session_query') || ''),
        sessionId: '',
        artifactId: '',
      });
    });
  }

  panel.querySelector('[data-role="reset-filters"]')?.addEventListener('click', () => {
    goToSessions();
  });

  panel.querySelectorAll('.session-select-btn').forEach((button) => {
    button.addEventListener('click', () => {
      applyRoute({
        ...currentRoute,
        tab: 'sessions',
        sessionId: button.dataset.sessionId || '',
      });
    });
  });

  panel.querySelectorAll('.session-nav-btn').forEach((button) => {
    button.addEventListener('click', () => {
      const targetTab = button.dataset.targetTab || 'sessions';
      const sessionId = button.dataset.sessionId || '';
      if (targetTab === 'state') {
        goToState(sessionId);
        return;
      }
      if (targetTab === 'runtime') {
        goToSessionRuntime(sessionId);
        return;
      }
      if (targetTab === 'jobs') {
        goToJobs(sessionId);
        return;
      }
      if (targetTab === 'grounding') {
        goToGrounding(sessionId);
        return;
      }
      goToSessions(sessionId);
    });
  });
}

    }
    contextViewState.error = error.message || 'Context lookup failed.';
  } finally {
    contextViewState.loading = false;
    renderContextPage();
  }
}

async function loadRuntimeView() {
  const scope = currentRoute.runtimeScope;
  const hasLocator = (
    (scope === 'session' && currentRoute.sessionId) ||
    (scope === 'proposition' && currentRoute.sessionId && currentRoute.propositionId) ||
    (scope === 'artifact' && currentRoute.sessionId && currentRoute.artifactId)
  );

  if (!scope || !hasLocator) {
    runtimeViewState.loading = false;
    runtimeViewState.error = '';
    runtimeViewState.result = null;
    renderRuntimePage();
    return;
  }

  runtimeViewState.loading = true;
  runtimeViewState.error = '';
  renderRuntimePage();
  try {
    let payload = null;
    if (scope === 'session') {
      payload = await uiApi.getSessionRuntimeStatus(currentRoute.sessionId);
    } else if (scope === 'proposition') {
      payload = await uiApi.getPropositionRuntimeStatus(
        currentRoute.sessionId,
        currentRoute.propositionId
      );
    } else {
      payload = await uiApi.getArtifactRuntimeStatus(currentRoute.sessionId, currentRoute.artifactId);
    }
    runtimeViewState.result = payload;
  } catch (error) {
    runtimeViewState.result = null;
    if (error.status === 404) {
      const labels = {
        session: '404 session runtime resource not found.',
        proposition: '404 proposition runtime resource not found.',
        artifact: '404 artifact runtime resource not found.',
      };
      runtimeViewState.error = labels[scope] || '404 runtime resource not found.';
      toast(runtimeViewState.error, 'error');
    } else {
      runtimeViewState.error = error.message || 'Runtime lookup failed.';
    }
  } finally {
    runtimeViewState.loading = false;
    renderRuntimePage();
  }
}

async function refreshForRoute() {
  if (currentRoute.tab === 'sessions') {
    renderSessionsPage();
    await loadSessions();
    await loadSessionDetail();
    return;
  }
  if (currentRoute.tab === 'state') {
    renderStatePage();
    await loadStateView();
    return;
  }
  if (currentRoute.tab === 'context') {
    renderContextPage();
    await loadContextView();
    return;
  }
  if (currentRoute.tab === 'runtime') {
    renderRuntimePage();
    await loadRuntimeView();
    return;
  }
  if (currentRoute.tab === 'grounding') {
    renderGroundingPage();
    await loadGroundingView();
    return;
  }
  if (currentRoute.tab === 'jobs') {
    renderJobsPage();
    await loadJobsView();
    return;
  }
  renderShellPlaceholder(currentRoute.tab);
}

function applyRoute(nextRoute, historyMode = 'push') {
  currentRoute = normalizeRoute(nextRoute);
  writeRoute(currentRoute, historyMode);
  suppressTabSync = true;
  setActiveTab(currentRoute.tab);
  suppressTabSync = false;
  void refreshForRoute();
}

document.addEventListener('DOMContentLoaded', () => {
  initSidebar();
  Object.keys(SHELL_PAGE_CONFIG).forEach((tab) => {
    if (tab !== 'sessions') renderShellPlaceholder(tab);
  });
  currentRoute = routeFromLocation();
  window.addEventListener('tab-change', (event) => {
    if (suppressTabSync) return;
    const targetTab = event.detail?.tab || DEFAULT_ROUTE.tab;
    applyRoute({
      ...currentRoute,
      tab: targetTab,
      status: targetTab === currentRoute.tab ? currentRoute.status : '',
    });
  });
  window.addEventListener('popstate', () => {
    currentRoute = routeFromLocation();
    suppressTabSync = true;
    setActiveTab(currentRoute.tab);
    suppressTabSync = false;
    void refreshForRoute();
  });
  suppressTabSync = true;
  setActiveTab(currentRoute.tab);
  suppressTabSync = false;
  void refreshForRoute();
});
</script>
</body>
</html>
