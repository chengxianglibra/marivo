<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factum Admin</title>
<link rel="stylesheet" href="/static/shared.css">
<style>
.admin-shell-copy {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}

.admin-shell-copy h1 {
  margin-bottom: 0;
}

.admin-shell-copy p {
  margin: 0;
  color: var(--color-text-secondary);
}

.admin-shell-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: var(--space-lg);
  margin-bottom: var(--space-xl);
}

.admin-shell-meta {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
}

.admin-shell-grid {
  display: grid;
  grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
  gap: var(--space-lg);
}

.admin-shell-section {
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
}

.admin-shell-card {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: var(--color-surface);
  padding: var(--space-lg);
  box-shadow: var(--shadow-sm);
}

.admin-shell-card h3,
.admin-shell-card h4 {
  margin-bottom: var(--space-sm);
}

.admin-shell-card p:last-child,
.admin-shell-card ul:last-child,
.admin-shell-card dl:last-child {
  margin-bottom: 0;
}

.admin-shell-card ul {
  margin: 0;
  padding-left: 1.1rem;
  color: var(--color-text-secondary);
}

.admin-shell-card li + li {
  margin-top: 6px;
}

.admin-shell-link-grid {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
}

.admin-subnav {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-bottom: var(--space-lg);
}

.admin-subnav-btn.is-active {
  border-color: var(--color-primary);
  color: var(--color-primary);
  background: color-mix(in srgb, var(--color-primary) 8%, white);
}

.admin-route-grid {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: var(--space-xs) var(--space-md);
  margin: 0;
}

.admin-route-grid dt {
  color: var(--color-text-secondary);
  font-weight: 500;
}

.admin-route-grid dd {
  margin: 0;
  word-break: break-word;
}

.shell-chip-group {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
}

.shell-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 1px solid var(--color-border);
  border-radius: 999px;
  padding: 6px 10px;
  background: var(--color-surface-muted, #f8fafc);
  color: var(--color-text-secondary);
  font-size: var(--font-size-sm);
}

.shell-chip strong {
  color: var(--color-text);
}

@media (max-width: 960px) {
  .admin-shell-header {
    flex-direction: column;
  }

  .admin-shell-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      Factum
      <small>Administration</small>
    </div>

    <div class="sidebar-section">Admin Console</div>
    <ul class="sidebar-nav">
      <li class="active">
        <button data-tab="overview">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12l9-9 9 9"/>
            <path d="M9 21V9h6v12"/>
          </svg>
          <span class="nav-label">Overview</span>
        </button>
      </li>
      <li>
        <button data-tab="data-sources">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <ellipse cx="12" cy="5" rx="9" ry="3"/>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
          </svg>
          <span class="nav-label">Data Sources</span>
        </button>
      </li>
      <li>
        <button data-tab="execution-engines">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="4" width="16" height="16" rx="2"/>
            <rect x="9" y="9" width="6" height="6"/>
            <path d="M9 1v3"/><path d="M15 1v3"/><path d="M9 20v3"/><path d="M15 20v3"/>
            <path d="M20 9h3"/><path d="M20 14h3"/><path d="M1 9h3"/><path d="M1 14h3"/>
          </svg>
          <span class="nav-label">Execution Engines</span>
        </button>
      </li>
      <li>
        <button data-tab="semantic-catalog">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
          <span class="nav-label">Semantic Catalog</span>
        </button>
      </li>
      <li>
        <button data-tab="analysis-ops">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v18h18"/>
            <path d="m19 9-5 5-4-4-3 3"/>
          </svg>
          <span class="nav-label">Analysis Ops</span>
        </button>
      </li>
      <li>
        <button data-tab="runtime-jobs">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2 3 14h7l-1 8 10-12h-7z"/>
          </svg>
          <span class="nav-label">Runtime &amp; Jobs</span>
        </button>
      </li>
      <li>
        <button data-tab="governance">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <span class="nav-label">Governance</span>
          <span class="nav-badge" id="approvals-badge" style="display:none;">0</span>
        </button>
      </li>
      <li>
        <button data-tab="observability">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <span class="nav-label">Observability</span>
        </button>
      </li>
    </ul>

    <div class="sidebar-footer">
      <a href="/ui">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/>
        </svg>
        <span>Analytics UI</span>
      </a>
    </div>
  </aside>

  <div class="content-area">
    <div class="content-header">
      <div class="breadcrumb">
        <span>Admin</span>
        <span class="sep">/</span>
        <span class="current">Overview</span>
      </div>
    </div>

    <div class="content-body">
      <div class="panel active" id="panel-overview"></div>
      <div class="panel" id="panel-data-sources"></div>
      <div class="panel" id="panel-execution-engines"></div>
      <div class="panel" id="panel-semantic-catalog"></div>
      <div class="panel" id="panel-analysis-ops"></div>
      <div class="panel" id="panel-runtime-jobs"></div>
      <div class="panel" id="panel-governance"></div>
      <div class="panel" id="panel-observability"></div>
    </div>
  </div>
</div>

<script src="/static/shared.js"></script>
<script>
const $ = (sel, ctx = document) => ctx.querySelector(sel);

const ADMIN_TABS = [
  'overview',
  'data-sources',
  'execution-engines',
  'semantic-catalog',
  'analysis-ops',
  'runtime-jobs',
  'governance',
  'observability',
];

const DEFAULT_ADMIN_ROUTE = {
  tab: 'overview',
  subtab: '',
  sourceId: '',
  engineId: '',
  bindingId: '',
  sessionId: '',
  jobId: '',
};

const ADMIN_TAB_META = {
  overview: {
    label: 'Overview',
    subtitle: 'Unified entrypoint for configuration and operator workflows.',
    objectLabel: '',
    subtabConfig: [],
    summary: [
      'Use this page as the default landing shell for the redesigned admin console.',
      'Overview will later host summary cards for sources, engines, semantic lifecycle, sessions, governance, and health.',
      'This shell intentionally avoids authoring, intent submission, or plan execution controls.'
    ],
    routeFocus: ['tab'],
    uiLinks: [{ label: 'Open Sessions in /ui', route: { tab: 'sessions' } }],
  },
  'data-sources': {
    label: 'Data Sources',
    subtitle: 'Configuration area for source lifecycle, catalog selections, and sync entrypoints.',
    objectLabel: 'source_id',
    subtabConfig: [],
    summary: [
      'T1 only establishes the page shell and source-oriented URL state.',
      'Future tasks will attach source lists, details, catalog browsing, and sync controls here.',
      'Semantic contract authoring remains outside this page.'
    ],
    routeFocus: ['tab', 'source_id'],
    uiLinks: [],
  },
  'execution-engines': {
    label: 'Execution Engines',
    subtitle: 'Shell for engine inventory and source-engine binding management.',
    objectLabel: 'engine_id',
    subtabConfig: [],
    summary: [
      'T1 reserves a stable page slug for engine and binding administration.',
      'Execution contract details and mutation forms land in later tasks.',
      'The URL contract already supports both engine_id and binding_id for future drill-ins.'
    ],
    routeFocus: ['tab', 'engine_id', 'binding_id'],
    uiLinks: [],
  },
  'semantic-catalog': {
    label: 'Semantic Catalog',
    subtitle: 'Centralized shell for typed semantic objects, bindings, and compatibility profiles.',
    objectLabel: 'binding_id',
    subtabConfig: [
      { value: 'entities', label: 'Entities' },
      { value: 'metrics', label: 'Metrics' },
      { value: 'process-objects', label: 'Process Objects' },
      { value: 'dimensions', label: 'Dimensions' },
      { value: 'time', label: 'Time' },
      { value: 'enum-sets', label: 'Enum Sets' },
      { value: 'typed-bindings', label: 'Typed Bindings' },
      { value: 'compatibility-profiles', label: 'Compatibility Profiles' },
    ],
    summary: [
      'The first delivery only locks the semantic catalog shell and subtab model.',
      'Typed Bindings and Compatibility Profiles are first-class subtabs, not hidden helper areas.',
      'Published vs draft lifecycle rendering will be added on top of this shell in T6 and T7.'
    ],
    routeFocus: ['tab', 'subtab', 'binding_id'],
    uiLinks: [],
  },
  'analysis-ops': {
    label: 'Analysis Ops',
    subtitle: 'Session operations shell for operator actions and jumps into canonical read surfaces.',
    objectLabel: 'session_id',
    subtabConfig: [],
    summary: [
      'This page is reserved for session list, filters, and terminate controls.',
      'Canonical session reading stays in /ui instead of being reimplemented in /admin.',
      'The route model already supports session_id-based deep links.'
    ],
    routeFocus: ['tab', 'session_id'],
    uiLinks: [
      { label: 'Open Sessions in /ui', route: { tab: 'sessions' } },
      { label: 'Open State in /ui', route: { tab: 'state' } },
      { label: 'Open Runtime in /ui', route: { tab: 'runtime' } },
      { label: 'Open Jobs in /ui', route: { tab: 'jobs' } },
    ],
  },
  'runtime-jobs': {
    label: 'Runtime & Jobs',
    subtitle: 'Read-only operator shell for runtime truth and job troubleshooting.',
    objectLabel: 'job_id',
    subtabConfig: [
      { value: 'session-runtime', label: 'Session Runtime' },
      { value: 'proposition-runtime', label: 'Proposition Runtime' },
      { value: 'artifact-runtime', label: 'Artifact Runtime' },
      { value: 'jobs', label: 'Jobs' },
    ],
    summary: [
      'This shell is explicitly for runtime truth, not canonical result reading.',
      'The page reserves subtab routing for runtime scopes and jobs before data widgets land.',
      'Future implementation will map runtime and job IDs into structured detail panes.'
    ],
    routeFocus: ['tab', 'subtab', 'session_id', 'job_id'],
    uiLinks: [
      { label: 'Open Runtime in /ui', route: { tab: 'runtime' } },
      { label: 'Open Jobs in /ui', route: { tab: 'jobs' } },
      { label: 'Open State in /ui', route: { tab: 'state' } },
    ],
  },
  governance: {
    label: 'Governance',
    subtitle: 'Shell for policy, quality, approval, and helper workflows.',
    objectLabel: 'session_id',
    subtabConfig: [
      { value: 'policies', label: 'Policies' },
      { value: 'quality-rules', label: 'Quality Rules' },
      { value: 'approvals', label: 'Approvals' },
      { value: 'governance-helpers', label: 'Governance Helpers' },
    ],
    summary: [
      'T1 preserves a single governance entrypoint while moving old approvals navigation into subtabs.',
      'The global approvals badge remains attached to the governance nav item.',
      'Governance Helpers stay explicitly auxiliary instead of becoming the default task flow.'
    ],
    routeFocus: ['tab', 'subtab', 'session_id'],
    uiLinks: [],
  },
  observability: {
    label: 'Observability',
    subtitle: 'Read-only shell for health and metrics summaries.',
    objectLabel: '',
    subtabConfig: [],
    summary: [
      'This page remains intentionally read-only and operational.',
      'Auto-refresh, JSON panes, and degraded metric rendering will be layered in later tasks.',
      'T1 only establishes the page shell and route stability.'
    ],
    routeFocus: ['tab'],
    uiLinks: [],
  },
};

let currentAdminRoute = { ...DEFAULT_ADMIN_ROUTE };
let suppressAdminTabSync = false;

function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function normalizeAdminRoute(nextRoute) {
  const normalized = {
    tab: ADMIN_TABS.includes(nextRoute.tab) ? nextRoute.tab : DEFAULT_ADMIN_ROUTE.tab,
    subtab: String(nextRoute.subtab || '').trim(),
    sourceId: String(nextRoute.sourceId || '').trim(),
    engineId: String(nextRoute.engineId || '').trim(),
    bindingId: String(nextRoute.bindingId || '').trim(),
    sessionId: String(nextRoute.sessionId || '').trim(),
    jobId: String(nextRoute.jobId || '').trim(),
  };

  const tabMeta = ADMIN_TAB_META[normalized.tab];
  const validSubtabs = tabMeta.subtabConfig.map((item) => item.value);
  if (!validSubtabs.includes(normalized.subtab)) {
    normalized.subtab = validSubtabs[0] || '';
  }

  if (normalized.tab !== 'data-sources') {
    normalized.sourceId = '';
  }
  if (normalized.tab !== 'execution-engines') {
    normalized.engineId = '';
  }
  if (!['execution-engines', 'semantic-catalog'].includes(normalized.tab)) {
    normalized.bindingId = '';
  }
  if (!['analysis-ops', 'runtime-jobs', 'governance'].includes(normalized.tab)) {
    normalized.sessionId = '';
  }
  if (normalized.tab !== 'runtime-jobs') {
    normalized.jobId = '';
  }

  return normalized;
}

function adminRouteFromLocation() {
  const params = new URLSearchParams(window.location.search);
  return normalizeAdminRoute({
    tab: params.get('tab') || DEFAULT_ADMIN_ROUTE.tab,
    subtab: params.get('subtab') || '',
    sourceId: params.get('source_id') || '',
    engineId: params.get('engine_id') || '',
    bindingId: params.get('binding_id') || '',
    sessionId: params.get('session_id') || '',
    jobId: params.get('job_id') || '',
  });
}

function writeAdminRoute(route, historyMode = 'push') {
  const params = new URLSearchParams();
  if (route.tab && route.tab !== DEFAULT_ADMIN_ROUTE.tab) params.set('tab', route.tab);
  if (route.subtab) params.set('subtab', route.subtab);
  if (route.sourceId) params.set('source_id', route.sourceId);
  if (route.engineId) params.set('engine_id', route.engineId);
  if (route.bindingId) params.set('binding_id', route.bindingId);
  if (route.sessionId) params.set('session_id', route.sessionId);
  if (route.jobId) params.set('job_id', route.jobId);
  const nextUrl = params.toString() ? `?${params.toString()}` : window.location.pathname;
  const method = historyMode === 'replace' ? 'replaceState' : 'pushState';
  window.history[method](null, '', nextUrl);
}

function adminObjectLocator(route) {
  if (route.tab === 'data-sources') return route.sourceId;
  if (route.tab === 'execution-engines') return route.engineId || route.bindingId;
  if (route.tab === 'semantic-catalog') return route.bindingId;
  if (route.tab === 'analysis-ops') return route.sessionId;
  if (route.tab === 'runtime-jobs') return route.jobId || route.sessionId;
  if (route.tab === 'governance') return route.sessionId;
  return '';
}

function updateAdminBreadcrumb(route) {
  const breadcrumb = $('.breadcrumb');
  if (!breadcrumb) return;
  const tabMeta = ADMIN_TAB_META[route.tab];
  const segments = ['Admin', tabMeta.label];
  if (route.subtab) {
    const subtabMeta = tabMeta.subtabConfig.find((item) => item.value === route.subtab);
    if (subtabMeta) segments.push(subtabMeta.label);
  }
  const locator = adminObjectLocator(route);
  if (locator) segments.push(locator);
  breadcrumb.innerHTML = segments.map((segment, index) => {
    if (index === segments.length - 1) {
      return `<span class="current">${esc(segment)}</span>`;
    }
    return `<span>${esc(segment)}</span><span class="sep">/</span>`;
  }).join('');
}

function renderAdminSubnav(route, tabMeta) {
  if (!tabMeta.subtabConfig.length) return '';
  return `
    <div class="admin-subnav">
      ${tabMeta.subtabConfig.map((item) => `
        <button
          class="btn btn-sm admin-subnav-btn ${route.subtab === item.value ? 'is-active' : ''}"
          type="button"
          data-subtab="${item.value}"
        >${esc(item.label)}</button>
      `).join('')}
    </div>
  `;
}

function renderRouteSummary(route, tabMeta) {
  const locator = adminObjectLocator(route);
  const deepLinks = adminUiDeepLinks({
    sessionId: route.sessionId,
    propositionId: route.propositionId,
    artifactId: route.artifactId,
    runtimeScope: route.runtimeScope,
    status: route.status,
    sessionQuery: route.sessionQuery,
  });
  const linkMap = {
    'Open Sessions in /ui': deepLinks.sessions,
    'Open State in /ui': deepLinks.state,
    'Open Runtime in /ui': deepLinks.runtime,
    'Open Jobs in /ui': deepLinks.jobs,
  };
  const uiLinks = tabMeta.uiLinks.map((link) => {
    const href = linkMap[link.label] || buildFactumUiUrl(link.route || {});
    return `<a class="btn btn-sm" href="${esc(href)}">${esc(link.label)}</a>`;
  }).join('');

  return renderAdminDetailCard({
    title: 'Shared Route Summary',
    statusHtml: '<span class="shell-chip">shareable-link</span>',
    note: 'Shared deep-link and error helpers are centralized in shared.js so later admin pages do not inline query-string assembly.',
    bodyHtml: `
      ${renderDetailList([
        { label: 'tab', value: route.tab },
        { label: 'subtab', value: route.subtab || '-' },
        { label: 'source_id', value: route.sourceId || '-' },
        { label: 'engine_id', value: route.engineId || '-' },
        { label: 'binding_id', value: route.bindingId || '-' },
        { label: 'session_id', value: route.sessionId || '-' },
        { label: 'job_id', value: route.jobId || '-' },
      ])}
      <div class="detail-actions">
        ${uiLinks || '<span class="shell-chip">No /ui deep links for this page yet.</span>'}
      </div>
      ${renderJsonPanel(
        'Route JSON',
        {
          tab: route.tab,
          subtab: route.subtab || null,
          source_id: route.sourceId || null,
          engine_id: route.engineId || null,
          binding_id: route.bindingId || null,
          session_id: route.sessionId || null,
          job_id: route.jobId || null,
          locator: locator || null,
          deep_links: deepLinks,
        },
        'No route state.'
      )}
    `,
  });
}

function renderOverviewSummaryCard(title, detail, route) {
  const deepLinks = adminUiDeepLinks({ sessionId: route.sessionId });
  return `
    <div class="stat-card stat-info">
      <div class="stat-label">${esc(title)}</div>
      <div class="stat-value">${esc(detail.value)}</div>
      <div class="stat-detail">${esc(detail.copy)}</div>
      <div class="detail-actions">
        <a class="btn btn-sm" href="${esc(detail.href || deepLinks.sessions)}">${esc(detail.actionLabel)}</a>
      </div>
    </div>
  `;
}

function renderOverviewFoundation(route) {
  const deepLinks = adminUiDeepLinks({ sessionId: route.sessionId });
  const overviewCards = [
    {
      title: 'Sources',
      value: 'List shell',
      copy: 'Shared list/detail structure is ready for source inventory, selection management, and sync entrypoints.',
      actionLabel: 'Open Data Sources',
      href: '?tab=data-sources',
    },
    {
      title: 'Semantic',
      value: 'JSON first',
      copy: 'Structured fields stay in detail panes while raw payloads live behind a shared JSON viewer.',
      actionLabel: 'Open Semantic Catalog',
      href: '?tab=semantic-catalog&subtab=entities',
    },
    {
      title: 'Analysis Ops',
      value: 'Deep link',
      copy: 'Shared helpers now generate `/ui?tab=sessions`, `/ui?tab=state&session_id=...`, and related canonical drill-ins.',
      actionLabel: 'Open /ui Sessions',
      href: deepLinks.sessions,
    },
    {
      title: 'Governance',
      value: 'Confirm modal',
      copy: 'Delete, publish, and terminate flows can reuse one danger-confirm structure with object, impact scope, and reversibility copy.',
      actionLabel: 'Open Governance',
      href: '?tab=governance&subtab=approvals',
    },
  ];

  const primaryHtml = renderAdminTableCard({
    title: 'Shared Foundation Checklist',
    count: overviewCards.length,
    countLabel: 'component(s)',
    note: 'Overview now uses the shared list/detail shell that later tasks will reuse for Data Sources, Execution Engines, Semantic Catalog, Analysis Ops, Runtime & Jobs, Governance, and Observability.',
    columns: ['Capability', 'Shared Contract', 'Status', 'Why It Exists'],
    rowsHtml: `
      <tr>
        <td>List + Detail Pane</td>
        <td><span class="inline-code">renderAdminListDetailLayout</span></td>
        <td>${statusBadge('published')}</td>
        <td class="is-quiet">All admin list pages can reuse a consistent two-column shell.</td>
      </tr>
      <tr>
        <td>Structured Errors</td>
        <td><span class="inline-code">renderStructuredError</span></td>
        <td>${statusBadge('published')}</td>
        <td class="is-quiet">List, detail, and write failures can show transport, message, and structured details.</td>
      </tr>
      <tr>
        <td>JSON Viewer</td>
        <td><span class="inline-code">renderJsonPanel</span></td>
        <td>${statusBadge('published')}</td>
        <td class="is-quiet">Complex payloads stay secondary instead of dominating table cells.</td>
      </tr>
      <tr>
        <td>/admin to /ui Links</td>
        <td><span class="inline-code">adminUiDeepLinks</span></td>
        <td>${statusBadge('published')}</td>
        <td class="is-quiet">Canonical read surfaces remain in /ui while /admin stays operator-focused.</td>
      </tr>
      <tr>
        <td>Danger Confirm</td>
        <td><span class="inline-code">openDangerConfirm</span></td>
        <td>${statusBadge('published')}</td>
        <td class="is-quiet">Delete Source, Delete Binding, Publish, and Terminate share one confirmation contract.</td>
      </tr>
    `,
    actionsHtml: '<span class="shell-chip">T2 foundation</span>',
  });

  const secondaryHtml = `
    <div class="stat-grid">
      ${overviewCards.map((card) => renderOverviewSummaryCard(card.title, card, route)).join('')}
    </div>
    ${renderAdminTableCard({
      title: 'Structured Error Contract',
      count: 3,
      countLabel: 'state(s)',
      note: 'The shared error layer distinguishes loading, empty, and failure instead of collapsing everything into a generic toast.',
      columns: ['State', 'Shared Container', 'Contract'],
      rowsHtml: `
        <tr>
          <td>Loading</td>
          <td><span class="inline-code">renderLoadingState</span></td>
          <td class="is-quiet">Keeps current filters and selection context visible while data is in-flight.</td>
        </tr>
        <tr>
          <td>Empty</td>
          <td><span class="inline-code">renderEmptyState</span></td>
          <td class="is-quiet">Tells operators what is missing and what next action is available.</td>
        </tr>
        <tr>
          <td>Failure</td>
          <td><span class="inline-code">renderStructuredError</span></td>
          <td class="is-quiet">Shows transport/message and leaves room for backend details instead of a dead page.</td>
        </tr>
      `,
    })}
  `;

  const dangerPreview = renderAdminDetailCard({
    title: 'Danger Confirm Preview',
    statusHtml: '<span class="shell-chip">operation object / impact scope / reversible</span>',
    note: 'This preview exercises the shared danger confirm contract without introducing a real destructive action in T2.',
    bodyHtml: `
      ${renderDetailList([
        { label: 'Operation Object', value: 'binding.bind_checkout_redesign' },
        { label: 'Impact Scope', value: 'Would remove one source-engine binding from operator routing.' },
        { label: 'Reversible', value: 'No. Re-create the binding manually after deletion.' },
      ])}
      <div class="detail-actions">
        <button class="btn btn-danger" type="button" data-role="preview-danger-confirm">Preview Delete Binding confirmation</button>
      </div>
    `,
  });

  const routeSummary = renderRouteSummary(route, ADMIN_TAB_META.overview);
  const detailHtml = `
    ${dangerPreview}
    ${routeSummary}
    ${renderAdminDetailCard({
      title: 'Shared JSON /ui Deep Link Matrix',
      statusHtml: '<span class="shell-chip">canonical drill-ins</span>',
      note: 'These helpers keep `/admin` query-driven while routing canonical reading back to `/ui`.',
      bodyHtml: renderJsonPanel(
        'adminUiDeepLinks(route)',
        deepLinks,
        'No deep links generated.'
      ),
    })}
  `;

  return renderAdminListDetailLayout({
    primaryHtml,
    secondaryHtml,
    detailHtml,
  });
}

function renderAdminPanel(route) {
  const panel = document.getElementById(`panel-${route.tab}`);
  if (!panel) return;
  const tabMeta = ADMIN_TAB_META[route.tab];
  const routeFocus = tabMeta.routeFocus.map((item) => `<span class="shell-chip"><strong>${esc(item)}</strong></span>`).join('');
  const isOverview = route.tab === 'overview';
  const mainContent = isOverview
    ? renderOverviewFoundation(route)
    : renderAdminListDetailLayout({
        primaryHtml: `
          <div class="admin-shell-card">
            <h3>Page Scope</h3>
            <ul>
              ${tabMeta.summary.map((item) => `<li>${esc(item)}</li>`).join('')}
            </ul>
          </div>
          <div class="admin-shell-card">
            <h3>Implementation Boundary</h3>
            <p>T2 provides shared list/detail, JSON, error, and danger-confirm primitives. This page still waits for its task-specific data sources and write flows.</p>
          </div>
        `,
        secondaryHtml: renderAdminTableCard({
          title: 'Upcoming Page Integration',
          count: tabMeta.routeFocus.length,
          countLabel: 'route signal(s)',
          note: 'Later tasks will plug this page into real list queries and detail panes without re-implementing table shells or `/ui` deep links.',
          columns: ['Signal', 'Why it matters'],
          rowsHtml: tabMeta.routeFocus.map((item) => `
            <tr>
              <td><span class="inline-code">${esc(item)}</span></td>
              <td class="is-quiet">Shared renderers keep ${esc(item)} in the URL contract and out of ad-hoc client state.</td>
            </tr>
          `).join(''),
        }),
        detailHtml: renderRouteSummary(route, tabMeta),
      });

  panel.innerHTML = `
    <div class="admin-shell-header">
      <div class="admin-shell-copy">
        <h1>${esc(tabMeta.label)}</h1>
        <p>${esc(tabMeta.subtitle)}</p>
        <div class="shell-chip-group">
          ${routeFocus}
          <span class="shell-chip"><strong>refresh-safe</strong></span>
          <span class="shell-chip"><strong>shareable-link</strong></span>
        </div>
      </div>
      <div class="admin-shell-meta">
        <a class="btn btn-sm" href="/admin">Reset to Overview</a>
        <a class="btn btn-sm" href="${esc(buildUiSessionsUrl(route.sessionId || ''))}">Open /ui</a>
      </div>
    </div>
    ${renderAdminSubnav(route, tabMeta)}
    ${mainContent}
  `;

  panel.querySelectorAll('[data-subtab]').forEach((button) => {
    button.addEventListener('click', () => {
      applyAdminRoute({
        ...currentAdminRoute,
        tab: route.tab,
        subtab: button.dataset.subtab || '',
      });
    });
  });

  panel.querySelector('[data-role="preview-danger-confirm"]')?.addEventListener('click', () => {
    openDangerConfirm({
      title: 'Delete Binding',
      objectLabel: 'binding.bind_checkout_redesign',
      impactScope: 'Removes one source-engine binding from operator routing and breaks dependent publish flows until recreated.',
      reversible: 'No. Re-create the binding manually after deletion.',
      confirmLabel: 'Delete Binding',
      detailsHtml: renderStructuredError(
        {
          status: 409,
          message: 'Publish semantic object failed.',
          detail: 'Dependent runtime carriers still reference this binding.',
          transport: 'structured backend error',
        },
        'Delete preview only.'
      ),
      onConfirm: () => toast('Preview only: no destructive request was sent.', 'info'),
    });
  });
}

function applyAdminRoute(nextRoute, historyMode = 'push') {
  currentAdminRoute = normalizeAdminRoute(nextRoute);
  writeAdminRoute(currentAdminRoute, historyMode);
  updateAdminBreadcrumb(currentAdminRoute);
  suppressAdminTabSync = true;
  setActiveTab(currentAdminRoute.tab);
  suppressAdminTabSync = false;
  renderAdminPanel(currentAdminRoute);
}

const adminApi = {
  async listApprovals(params) {
    const query = params ? `?${new URLSearchParams(params)}` : '';
    const response = await fetch(`/approvals${query}`, {
      headers: { 'Content-Type': 'application/json' },
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return response.json();
  },
};

async function updateApprovalsBadge() {
  try {
    const approvals = await adminApi.listApprovals({ status: 'pending' });
    const badge = $('#approvals-badge');
    if (!badge) return;
    if (Array.isArray(approvals) && approvals.length > 0) {
      badge.textContent = String(approvals.length);
      badge.style.display = '';
    } else {
      badge.style.display = 'none';
    }
  } catch {
    const badge = $('#approvals-badge');
    if (badge) badge.style.display = 'none';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  initSidebar();
  currentAdminRoute = adminRouteFromLocation();
  window.addEventListener('tab-change', (event) => {
    if (suppressAdminTabSync) return;
    applyAdminRoute({
      ...currentAdminRoute,
      tab: event.detail?.tab || DEFAULT_ADMIN_ROUTE.tab,
    });
  });
  window.addEventListener('popstate', () => {
    currentAdminRoute = adminRouteFromLocation();
    updateAdminBreadcrumb(currentAdminRoute);
    suppressAdminTabSync = true;
    setActiveTab(currentAdminRoute.tab);
    suppressAdminTabSync = false;
    renderAdminPanel(currentAdminRoute);
  });
  updateAdminBreadcrumb(currentAdminRoute);
  suppressAdminTabSync = true;
  setActiveTab(currentAdminRoute.tab);
  suppressAdminTabSync = false;
  renderAdminPanel(currentAdminRoute);
  void updateApprovalsBadge();
});
</script>
</body>
</html>
