<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factum Admin</title>
<link rel="stylesheet" href="/static/shared.css">
<style>
.admin-shell-copy {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}

.admin-shell-copy h1 {
  margin-bottom: 0;
}

.admin-shell-copy p {
  margin: 0;
  color: var(--color-text-secondary);
}

.admin-shell-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: var(--space-lg);
  margin-bottom: var(--space-xl);
}

.admin-shell-meta {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
}

.admin-shell-grid {
  display: grid;
  grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
  gap: var(--space-lg);
}

.admin-shell-section {
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
}

.admin-shell-card {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: var(--color-surface);
  padding: var(--space-lg);
  box-shadow: var(--shadow-sm);
}

.admin-shell-card h3,
.admin-shell-card h4 {
  margin-bottom: var(--space-sm);
}

.admin-shell-card p:last-child,
.admin-shell-card ul:last-child,
.admin-shell-card dl:last-child {
  margin-bottom: 0;
}

.admin-shell-card ul {
  margin: 0;
  padding-left: 1.1rem;
  color: var(--color-text-secondary);
}

.admin-shell-card li + li {
  margin-top: 6px;
}

.admin-shell-link-grid {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
}

.admin-subnav {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-bottom: var(--space-lg);
}

.admin-subnav-btn.is-active {
  border-color: var(--color-primary);
  color: var(--color-primary);
  background: color-mix(in srgb, var(--color-primary) 8%, white);
}

.admin-route-grid {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: var(--space-xs) var(--space-md);
  margin: 0;
}

.admin-route-grid dt {
  color: var(--color-text-secondary);
  font-weight: 500;
}

.admin-route-grid dd {
  margin: 0;
  word-break: break-word;
}

.shell-chip-group {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
}

.shell-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 1px solid var(--color-border);
  border-radius: 999px;
  padding: 6px 10px;
  background: var(--color-surface-muted, #f8fafc);
  color: var(--color-text-secondary);
  font-size: var(--font-size-sm);
}

.shell-chip strong {
  color: var(--color-text);
}

.overview-page {
  display: flex;
  flex-direction: column;
  gap: var(--space-xl);
}

.overview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: var(--space-lg);
}

.overview-summary-card {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background: var(--color-surface);
  box-shadow: var(--shadow-sm);
  padding: var(--space-lg);
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
  min-height: 240px;
}

.overview-summary-card.is-alert {
  border-color: color-mix(in srgb, var(--color-error) 35%, var(--color-border));
  background: linear-gradient(180deg, color-mix(in srgb, var(--color-error) 6%, white), white);
}

.overview-summary-card.is-warning {
  border-color: color-mix(in srgb, var(--color-warning) 35%, var(--color-border));
  background: linear-gradient(180deg, color-mix(in srgb, var(--color-warning) 8%, white), white);
}

.overview-card-header,
.overview-card-footer {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-md);
}

.overview-card-header h3,
.overview-card-footer h4 {
  margin: 0;
}

.overview-card-kpis {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--space-sm);
}

.overview-kpi {
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius-md);
  background: #f8fafc;
  padding: var(--space-md);
}

.overview-kpi-label {
  color: var(--color-text-muted);
  font-size: var(--font-size-xs);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.overview-kpi-value {
  margin-top: 4px;
  font-size: var(--font-size-lg);
  font-weight: 700;
}

.overview-card-copy {
  color: var(--color-text-secondary);
  font-size: var(--font-size-sm);
}

.overview-card-links {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-top: auto;
}

.overview-card-meta {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}

.overview-card-contracts {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
}

.overview-ops-grid {
  display: grid;
  grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
  gap: var(--space-lg);
}

.overview-mini-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}

.overview-mini-item {
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius-md);
  background: #f8fafc;
  padding: var(--space-md);
}

.overview-mini-item strong {
  display: block;
  margin-bottom: 4px;
}

.overview-card-error .detail-error,
.overview-card-empty .detail-empty,
.overview-card-loading .detail-empty {
  margin: 0;
}

.data-sources-page {
  display: flex;
  flex-direction: column;
  gap: var(--space-lg);
}

.data-sources-header-actions {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
}

.data-sources-detail-stack {
  display: flex;
  flex-direction: column;
  gap: var(--space-lg);
}

.source-object-summary {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
}

.modal-card-stack .panel-note {
  margin-top: 0;
}

@media (max-width: 960px) {
  .overview-ops-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 960px) {
  .admin-shell-header {
    flex-direction: column;
  }

  .admin-shell-grid {
    grid-template-columns: 1fr;
  }

  .catalog-browser-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      Factum
      <small>Administration</small>
    </div>

    <div class="sidebar-section">Admin Console</div>
    <ul class="sidebar-nav">
      <li class="active">
        <button data-tab="overview">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12l9-9 9 9"/>
            <path d="M9 21V9h6v12"/>
          </svg>
          <span class="nav-label">Overview</span>
        </button>
      </li>
      <li>
        <button data-tab="data-sources">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <ellipse cx="12" cy="5" rx="9" ry="3"/>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
          </svg>
          <span class="nav-label">Data Sources</span>
        </button>
      </li>
      <li>
        <button data-tab="execution-engines">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="4" width="16" height="16" rx="2"/>
            <rect x="9" y="9" width="6" height="6"/>
            <path d="M9 1v3"/><path d="M15 1v3"/><path d="M9 20v3"/><path d="M15 20v3"/>
            <path d="M20 9h3"/><path d="M20 14h3"/><path d="M1 9h3"/><path d="M1 14h3"/>
          </svg>
          <span class="nav-label">Execution Engines</span>
        </button>
      </li>
      <li>
        <button data-tab="semantic-catalog">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
          <span class="nav-label">Semantic Catalog</span>
        </button>
      </li>
      <li>
        <button data-tab="analysis-ops">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v18h18"/>
            <path d="m19 9-5 5-4-4-3 3"/>
          </svg>
          <span class="nav-label">Analysis Ops</span>
        </button>
      </li>
      <li>
        <button data-tab="runtime-jobs">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2 3 14h7l-1 8 10-12h-7z"/>
          </svg>
          <span class="nav-label">Runtime &amp; Jobs</span>
        </button>
      </li>
      <li>
        <button data-tab="governance">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <span class="nav-label">Governance</span>
          <span class="nav-badge" id="approvals-badge" style="display:none;">0</span>
        </button>
      </li>
      <li>
        <button data-tab="observability">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <span class="nav-label">Observability</span>
        </button>
      </li>
    </ul>

    <div class="sidebar-footer">
      <a href="/ui">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/>
        </svg>
        <span>Analytics UI</span>
      </a>
    </div>
  </aside>

  <div class="content-area">
    <div class="content-header">
      <div class="breadcrumb">
        <span>Admin</span>
        <span class="sep">/</span>
        <span class="current">Overview</span>
      </div>
    </div>

    <div class="content-body">
      <div class="panel active" id="panel-overview"></div>
      <div class="panel" id="panel-data-sources"></div>
      <div class="panel" id="panel-execution-engines"></div>
      <div class="panel" id="panel-semantic-catalog"></div>
      <div class="panel" id="panel-analysis-ops"></div>
      <div class="panel" id="panel-runtime-jobs"></div>
      <div class="panel" id="panel-governance"></div>
      <div class="panel" id="panel-observability"></div>
    </div>
  </div>
</div>

<script src="/static/shared.js"></script>
<script>
const $ = (sel, ctx = document) => ctx.querySelector(sel);

const ADMIN_TABS = [
  'overview',
  'data-sources',
  'execution-engines',
  'semantic-catalog',
  'analysis-ops',
  'runtime-jobs',
  'governance',
  'observability',
];

const DEFAULT_ADMIN_ROUTE = {
  tab: 'overview',
  subtab: '',
  sourceId: '',
  engineId: '',
  bindingId: '',
  sessionId: '',
  jobId: '',
};

const ADMIN_TAB_META = {
  overview: {
    label: 'Overview',
    subtitle: 'Unified entrypoint for configuration and operator workflows.',
    objectLabel: '',
    subtabConfig: [],
    summary: [
      'Use this page as the default landing shell for the redesigned admin console.',
      'Overview will later host summary cards for sources, engines, semantic lifecycle, sessions, governance, and health.',
      'This shell intentionally avoids authoring, intent submission, or plan execution controls.'
    ],
    routeFocus: ['tab'],
    uiLinks: [{ label: 'Open Sessions in /ui', route: { tab: 'sessions' } }],
  },
  'data-sources': {
    label: 'Data Sources',
    subtitle: 'Configuration area for source lifecycle, catalog selections, and sync entrypoints.',
    objectLabel: 'source_id',
    subtabConfig: [],
    summary: [
      'T1 only establishes the page shell and source-oriented URL state.',
      'Future tasks will attach source lists, details, catalog browsing, and sync controls here.',
      'Semantic contract authoring remains outside this page.'
    ],
    routeFocus: ['tab', 'source_id'],
    uiLinks: [],
  },
  'execution-engines': {
    label: 'Execution Engines',
    subtitle: 'Shell for engine inventory and source-engine binding management.',
    objectLabel: 'engine_id',
    subtabConfig: [],
    summary: [
      'T1 reserves a stable page slug for engine and binding administration.',
      'Execution contract details and mutation forms land in later tasks.',
      'The URL contract already supports both engine_id and binding_id for future drill-ins.'
    ],
    routeFocus: ['tab', 'engine_id', 'binding_id'],
    uiLinks: [],
  },
  'semantic-catalog': {
    label: 'Semantic Catalog',
    subtitle: 'Centralized shell for typed semantic objects, bindings, and compatibility profiles.',
    objectLabel: 'binding_id',
    subtabConfig: [
      { value: 'entities', label: 'Entities' },
      { value: 'metrics', label: 'Metrics' },
      { value: 'process-objects', label: 'Process Objects' },
      { value: 'dimensions', label: 'Dimensions' },
      { value: 'time', label: 'Time' },
      { value: 'enum-sets', label: 'Enum Sets' },
      { value: 'typed-bindings', label: 'Typed Bindings' },
      { value: 'compatibility-profiles', label: 'Compatibility Profiles' },
    ],
    summary: [
      'The first delivery only locks the semantic catalog shell and subtab model.',
      'Typed Bindings and Compatibility Profiles are first-class subtabs, not hidden helper areas.',
      'Published vs draft lifecycle rendering will be added on top of this shell in T6 and T7.'
    ],
    routeFocus: ['tab', 'subtab', 'binding_id'],
    uiLinks: [],
  },
  'analysis-ops': {
    label: 'Analysis Ops',
    subtitle: 'Session operations shell for operator actions and jumps into canonical read surfaces.',
    objectLabel: 'session_id',
    subtabConfig: [],
    summary: [
      'This page is reserved for session list, filters, and terminate controls.',
      'Canonical session reading stays in /ui instead of being reimplemented in /admin.',
      'The route model already supports session_id-based deep links.'
    ],
    routeFocus: ['tab', 'session_id'],
    uiLinks: [
      { label: 'Open Sessions in /ui', route: { tab: 'sessions' } },
      { label: 'Open State in /ui', route: { tab: 'state' } },
      { label: 'Open Runtime in /ui', route: { tab: 'runtime' } },
      { label: 'Open Jobs in /ui', route: { tab: 'jobs' } },
    ],
  },
  'runtime-jobs': {
    label: 'Runtime & Jobs',
    subtitle: 'Read-only operator shell for runtime truth and job troubleshooting.',
    objectLabel: 'job_id',
    subtabConfig: [
      { value: 'session-runtime', label: 'Session Runtime' },
      { value: 'proposition-runtime', label: 'Proposition Runtime' },
      { value: 'artifact-runtime', label: 'Artifact Runtime' },
      { value: 'jobs', label: 'Jobs' },
    ],
    summary: [
      'This shell is explicitly for runtime truth, not canonical result reading.',
      'The page reserves subtab routing for runtime scopes and jobs before data widgets land.',
      'Future implementation will map runtime and job IDs into structured detail panes.'
    ],
    routeFocus: ['tab', 'subtab', 'session_id', 'job_id'],
    uiLinks: [
      { label: 'Open Runtime in /ui', route: { tab: 'runtime' } },
      { label: 'Open Jobs in /ui', route: { tab: 'jobs' } },
      { label: 'Open State in /ui', route: { tab: 'state' } },
    ],
  },
  governance: {
    label: 'Governance',
    subtitle: 'Shell for policy, quality, approval, and helper workflows.',
    objectLabel: 'session_id',
    subtabConfig: [
      { value: 'policies', label: 'Policies' },
      { value: 'quality-rules', label: 'Quality Rules' },
      { value: 'approvals', label: 'Approvals' },
      { value: 'governance-helpers', label: 'Governance Helpers' },
    ],
    summary: [
      'T1 preserves a single governance entrypoint while moving old approvals navigation into subtabs.',
      'The global approvals badge remains attached to the governance nav item.',
      'Governance Helpers stay explicitly auxiliary instead of becoming the default task flow.'
    ],
    routeFocus: ['tab', 'subtab', 'session_id'],
    uiLinks: [],
  },
  observability: {
    label: 'Observability',
    subtitle: 'Read-only shell for health and metrics summaries.',
    objectLabel: '',
    subtabConfig: [],
    summary: [
      'This page remains intentionally read-only and operational.',
      'Auto-refresh, JSON panes, and degraded metric rendering will be layered in later tasks.',
      'T1 only establishes the page shell and route stability.'
    ],
    routeFocus: ['tab'],
    uiLinks: [],
  },
};

let currentAdminRoute = { ...DEFAULT_ADMIN_ROUTE };
let suppressAdminTabSync = false;

function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function normalizeAdminRoute(nextRoute) {
  const normalized = {
    tab: ADMIN_TABS.includes(nextRoute.tab) ? nextRoute.tab : DEFAULT_ADMIN_ROUTE.tab,
    subtab: String(nextRoute.subtab || '').trim(),
    sourceId: String(nextRoute.sourceId || '').trim(),
    engineId: String(nextRoute.engineId || '').trim(),
    bindingId: String(nextRoute.bindingId || '').trim(),
    sessionId: String(nextRoute.sessionId || '').trim(),
    jobId: String(nextRoute.jobId || '').trim(),
  };

  const tabMeta = ADMIN_TAB_META[normalized.tab];
  const validSubtabs = tabMeta.subtabConfig.map((item) => item.value);
  if (!validSubtabs.includes(normalized.subtab)) {
    normalized.subtab = validSubtabs[0] || '';
  }

  if (normalized.tab !== 'data-sources') {
    normalized.sourceId = '';
  }
  if (normalized.tab !== 'execution-engines') {
    normalized.engineId = '';
  }
  if (!['execution-engines', 'semantic-catalog'].includes(normalized.tab)) {
    normalized.bindingId = '';
  }
  if (!['analysis-ops', 'runtime-jobs', 'governance'].includes(normalized.tab)) {
    normalized.sessionId = '';
  }
  if (normalized.tab !== 'runtime-jobs') {
    normalized.jobId = '';
  }

  return normalized;
}

function adminRouteFromLocation() {
  const params = new URLSearchParams(window.location.search);
  return normalizeAdminRoute({
    tab: params.get('tab') || DEFAULT_ADMIN_ROUTE.tab,
    subtab: params.get('subtab') || '',
    sourceId: params.get('source_id') || '',
    engineId: params.get('engine_id') || '',
    bindingId: params.get('binding_id') || '',
    sessionId: params.get('session_id') || '',
    jobId: params.get('job_id') || '',
  });
}

function writeAdminRoute(route, historyMode = 'push') {
  const params = new URLSearchParams();
  if (route.tab && route.tab !== DEFAULT_ADMIN_ROUTE.tab) params.set('tab', route.tab);
  if (route.subtab) params.set('subtab', route.subtab);
  if (route.sourceId) params.set('source_id', route.sourceId);
  if (route.engineId) params.set('engine_id', route.engineId);
  if (route.bindingId) params.set('binding_id', route.bindingId);
  if (route.sessionId) params.set('session_id', route.sessionId);
  if (route.jobId) params.set('job_id', route.jobId);
  const nextUrl = params.toString() ? `?${params.toString()}` : window.location.pathname;
  const method = historyMode === 'replace' ? 'replaceState' : 'pushState';
  window.history[method](null, '', nextUrl);
}

function adminObjectLocator(route) {
  if (route.tab === 'data-sources') return route.sourceId;
  if (route.tab === 'execution-engines') return route.engineId || route.bindingId;
  if (route.tab === 'semantic-catalog') return route.bindingId;
  if (route.tab === 'analysis-ops') return route.sessionId;
  if (route.tab === 'runtime-jobs') return route.jobId || route.sessionId;
  if (route.tab === 'governance') return route.sessionId;
  return '';
}

function updateAdminBreadcrumb(route) {
  const breadcrumb = $('.breadcrumb');
  if (!breadcrumb) return;
  const tabMeta = ADMIN_TAB_META[route.tab];
  const segments = ['Admin', tabMeta.label];
  if (route.subtab) {
    const subtabMeta = tabMeta.subtabConfig.find((item) => item.value === route.subtab);
    if (subtabMeta) segments.push(subtabMeta.label);
  }
  const locator = adminObjectLocator(route);
  if (locator) segments.push(locator);
  breadcrumb.innerHTML = segments.map((segment, index) => {
    if (index === segments.length - 1) {
      return `<span class="current">${esc(segment)}</span>`;
    }
    return `<span>${esc(segment)}</span><span class="sep">/</span>`;
  }).join('');
}

function renderAdminSubnav(route, tabMeta) {
  if (!tabMeta.subtabConfig.length) return '';
  return `
    <div class="admin-subnav">
      ${tabMeta.subtabConfig.map((item) => `
        <button
          class="btn btn-sm admin-subnav-btn ${route.subtab === item.value ? 'is-active' : ''}"
          type="button"
          data-subtab="${item.value}"
        >${esc(item.label)}</button>
      `).join('')}
    </div>
  `;
}

function renderRouteSummary(route, tabMeta) {
  const locator = adminObjectLocator(route);
  const deepLinks = adminUiDeepLinks({
    sessionId: route.sessionId,
    propositionId: route.propositionId,
    artifactId: route.artifactId,
    runtimeScope: route.runtimeScope,
    status: route.status,
    sessionQuery: route.sessionQuery,
  });
  const linkMap = {
    'Open Sessions in /ui': deepLinks.sessions,
    'Open State in /ui': deepLinks.state,
    'Open Runtime in /ui': deepLinks.runtime,
    'Open Jobs in /ui': deepLinks.jobs,
  };
  const uiLinks = tabMeta.uiLinks.map((link) => {
    const href = linkMap[link.label] || buildFactumUiUrl(link.route || {});
    return `<a class="btn btn-sm" href="${esc(href)}">${esc(link.label)}</a>`;
  }).join('');

  return renderAdminDetailCard({
    title: 'Shared Route Summary',
    statusHtml: '<span class="shell-chip">shareable-link</span>',
    note: 'Shared deep-link and error helpers are centralized in shared.js so later admin pages do not inline query-string assembly.',
    bodyHtml: `
      ${renderDetailList([
        { label: 'tab', value: route.tab },

function parseResponseError(response, fallbackMessage) {
  return response.text().then((text) => ({
    status: response.status,
    message: fallbackMessage,
    detail: text || response.statusText || fallbackMessage,
    transport: `HTTP ${response.status}`,
  }));
}

async function requestJson(path, fallbackMessage) {
  const response = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
  });
  if (!response.ok) {
    throw await parseResponseError(response, fallbackMessage);
  }
  return response.json();
}

async function sendJson(path, method, payload, fallbackMessage) {
  const response = await fetch(path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: payload == null ? null : JSON.stringify(payload),
  });
  if (!response.ok) {
    throw await parseResponseError(response, fallbackMessage);
  }
  if (response.status === 204) return null;
  return response.json();
}

async function sendDelete(path, fallbackMessage) {
  const response = await fetch(path, { method: 'DELETE' });
  if (!response.ok) {
    throw await parseResponseError(response, fallbackMessage);
  }
  if (response.status === 204) return null;
  return response.json();
}

function countStatuses(items) {
  return (items || []).reduce((acc, item) => {
    const status = String(item?.status || 'unknown').toLowerCase();
    acc[status] = (acc[status] || 0) + 1;
    return acc;
  }, {});
}

function pickLatest(items, keys = ['updated_at', 'ended_at', 'created_at']) {
  return (items || []).reduce((latest, item) => {
    const currentValue = keys.map((key) => item?.[key]).find(Boolean);
    if (!currentValue) return latest;
    if (!latest) return item;
    const latestValue = keys.map((key) => latest?.[key]).find(Boolean);
    return String(currentValue) > String(latestValue || '') ? item : latest;
  }, null);
}

function formatMaybeDate(value) {
  return value ? fmtDate(value) : '-';
}

function extractItems(payload) {
  if (Array.isArray(payload)) return payload;
  if (Array.isArray(payload?.items)) return payload.items;
  return [];
}

    return { empty: 'No data sources configured yet.' };

  const statusCounts = countStatuses(sources);
  const activeCount = statusCounts.active || 0;
  const syncEnabledCount = sources.filter((item) => item?.sync_mode && item.sync_mode !== 'none').length;
  const latest = pickLatest(sources);
  return {
    kpis: [
      { label: 'Total Sources', value: String(sources.length) },
      { label: 'Active', value: String(activeCount) },
      { label: 'Sync Enabled', value: String(syncEnabledCount) },

}

}

function summarizeSemantic(payloads) {
  const groups = [
    ['Entities', extractItems(payloads.entities)],
    ['Metrics', extractItems(payloads.metrics)],
    ['Process Objects', extractItems(payloads.processObjects)],
    ['Dimensions', extractItems(payloads.dimensions)],
    ['Time', extractItems(payloads.time)],
    ['Enum Sets', extractItems(payloads.enumSets)],
    ['Typed Bindings', extractItems(payloads.typedBindings)],
    ['Compatibility Profiles', extractItems(payloads.compatibilityProfiles)],
  ];
  const allItems = groups.flatMap(([, items]) => items);
  if (!allItems.length) {
    return { empty: 'No semantic contracts, typed bindings, or compatibility profiles published yet.' };
  }
  const statusCounts = countStatuses(allItems);
  const groupSummary = groups
    .filter(([, items]) => items.length > 0)
    .slice(0, 3)
    .map(([label, items]) => `<span class="shell-chip">${esc(label)} ${esc(String(items.length))}</span>`)
    .join('');
  return {
    kpis: [
      { label: 'Contracts', value: String(allItems.length) },
      { label: 'Draft', value: String(statusCounts.draft || 0) },
      { label: 'Published', value: String(statusCounts.published || 0) },
      { label: 'Typed Bindings', value: String(extractItems(payloads.typedBindings).length) },
    ],
    copy: 'Typed semantic lifecycle across contracts, bindings, and compatibility profiles.',
    metaHtml: `<div class="overview-card-contracts">${groupSummary || '<span class="shell-chip">semantic inventory</span>'}</div>`,
    tone: (statusCounts.draft || 0) > 0 ? 'is-warning' : '',
  };
}

function summarizeSessions(payload) {
  const sessions = extractItems(payload);
  if (!sessions.length) {
    return { empty: 'No analysis sessions available yet.' };
  }
  const statusCounts = countStatuses(sessions);
  const openCount = statusCounts.open || 0;
  const terminalCount = sessions.length - openCount;
  const latest = pickLatest(sessions);
  const deepLinks = adminUiDeepLinks({ sessionId: latest?.session_id || '' });
  return {
    kpis: [
      { label: 'Open Sessions', value: String(openCount) },
      { label: 'Terminal Sessions', value: String(terminalCount) },
      { label: 'Latest Session', value: latest?.session_id || '-' },
      { label: 'Updated', value: formatMaybeDate(latest?.updated_at) },
    ],
    copy: 'Session operations summary for terminate workflows and canonical drill-ins.',
    secondaryLink: { href: deepLinks.sessions, label: 'Open /ui Sessions' },
    metaHtml: `<div class="overview-card-contracts"><span class="shell-chip">GET /sessions</span></div>`,
    tone: openCount > 0 ? 'is-warning' : '',
  };
}

function summarizeRuntime(jobs) {
  if (!jobs.length) {
    return { empty: 'No background jobs recorded yet.' };
  }
  const statusCounts = countStatuses(jobs);
  const pending = (statusCounts.submitted || 0) + (statusCounts.running || 0);
  const failed = statusCounts.failed || 0;
  const latest = pickLatest(jobs);
  return {
    kpis: [
      { label: 'Pending Jobs', value: String(pending) },
      { label: 'Failed Jobs', value: String(failed) },
      { label: 'Active Jobs', value: String(statusCounts.running || 0) },
      { label: 'Latest Job', value: latest?.job_id || '-' },
    ],
    copy: 'Jobs are the current runtime signal for operator-facing troubleshooting on the admin homepage.',
    secondaryLink: { href: buildUiJobsUrl('', pending > 0 ? 'running' : ''), label: 'Open /ui Jobs' },
    metaHtml: `<div class="overview-card-contracts"><span class="shell-chip">GET /jobs</span><span class="shell-chip">runtime truth stays in /ui</span></div>`,
    tone: failed > 0 ? 'is-alert' : pending > 0 ? 'is-warning' : '',
  };
}

    browserHtml = renderStructuredError(catalogState.error, 'Catalog schemas unavailable.');
  } else if (!schemas.length) {
    browserHtml = renderEmptyState('No schema available from the live catalog for this source.');
  } else {
    const tableBody = catalogState.tablesError
      ? renderStructuredError(catalogState.tablesError, 'Catalog tables unavailable.')
      : (!selectedSchema
        ? renderEmptyState('Select a schema to browse live tables.')
        : (!tables.length
          ? renderEmptyState('No table found for the selected schema.')
          : `
            <div class="catalog-table-list">
              ${tables.map((table) => `
                <div class="catalog-table-item">
                  <strong>${esc(table.name)}</strong>
                  <p>schema: ${esc(table.schema || selectedSchema)}</p>
                  <p>properties: ${esc(formatKeyValueSummary(table.properties))}</p>
                </div>
              `).join('')}
            </div>
          `));
    browserHtml = `
      <div class="catalog-browser-grid">
        <div class="catalog-schema-list">
          ${schemas.map((schema) => `
            <button type="button" class="btn btn-sm catalog-schema-button ${selectedSchema === schema.name ? 'is-active' : ''}" data-action="select-catalog-schema" data-source-id="${esc(source.source_id)}" data-schema-name="${esc(schema.name)}">
              <span>${esc(schema.name)}</span>
              <span class="shell-chip">${esc(formatKeyValueSummary(schema.properties))}</span>
            </button>
          `).join('')}
        </div>
        <div>${tableBody}</div>
      </div>
    `;
  }
  return renderAdminDetailCard({
    title: 'Catalog Browser',
    statusHtml: `<span class="shell-chip">${esc(selectedSchema || 'live catalog')}</span>`,
    note: 'Browse Catalog uses GET /sources/{source_id}/catalog/schemas and GET /sources/{source_id}/catalog/tables to inspect live catalog metadata without persisting source objects.',
    bodyHtml: browserHtml,
  });
}

async function enrichSourcesWithSyncMetadata(sources) {
  const records = await Promise.all(sources.map(async (source) => {
    try {
      const tables = await adminApi.listSourceObjects(source.source_id, { type: 'table' });
      const latestTable = pickLatest(tables, ['synced_at']);
      const syncJob = sourceSyncState(source.source_id);
      return {
        ...source,
        last_sync_at: syncJob?.updated_at || latestTable?.synced_at || '',
      };
    } catch {
      const syncJob = sourceSyncState(source.source_id);
      return {
        ...source,
        last_sync_at: syncJob?.updated_at || '',
      };
    }
  }));
  return records;
}

async function loadCatalogState(sourceId) {
  const existing = sourceCatalogState(sourceId);
  try {
    const schemas = await adminApi.listCatalogSchemas(sourceId);
    const selectedSchema = schemas.some((item) => item.name === existing.selectedSchema)
      ? existing.selectedSchema
      : (schemas[0]?.name || '');
    let tables = [];
    let tablesError = null;
    if (selectedSchema) {
      try {
        tables = await adminApi.listCatalogTables(sourceId, selectedSchema);
      } catch (error) {
        tablesError = normalizeApiError(error, 'Catalog tables unavailable.');
      }
    }
    const nextState = {
      schemas,
      selectedSchema,
      tables,
      error: null,
      tablesError,
    };
    dataSourcesUiState.catalog[sourceId] = nextState;
    return nextState;
  } catch (error) {
    const nextState = {
      schemas: [],
      selectedSchema: '',
      tables: [],
      error: normalizeApiError(error, 'Catalog schemas unavailable.'),
      tablesError: null,
    };
    dataSourcesUiState.catalog[sourceId] = nextState;
    return nextState;
  }
}

async function hydrateDataSources(panel, route) {
  const renderVersion = ++dataSourcesRenderVersion;
  const safeRender = (viewModel) => {
    if (renderVersion !== dataSourcesRenderVersion) return;
    const target = panel.querySelector('[data-role="data-sources-body"]');
    if (target) {
      target.innerHTML = renderDataSourcesBody(viewModel);
      bindDataSourcesEvents(panel, viewModel);
    }
  };

  safeRender({
    sources: [],
    selectedSourceId: route.sourceId || '',
    selectedSource: null,
    selections: [],
    tables: [],
    syncError: null,
    catalogState: {},
    listError: null,
  });

  try {
    const rawSources = await adminApi.listSources();
    const sources = await enrichSourcesWithSyncMetadata(rawSources);
    const firstSourceId = sources[0]?.source_id || '';
    const selectedSourceId = sources.some((item) => item.source_id === route.sourceId)
      ? route.sourceId
      : firstSourceId;

    if (route.sourceId !== selectedSourceId) {
      applyAdminRoute({ ...route, sourceId: selectedSourceId }, 'replace');
      return;
    }

    if (!selectedSourceId) {
      safeRender({
        sources,
        selectedSourceId: '',
        selectedSource: null,
        selections: [],
        tables: [],
        syncError: null,
        catalogState: {},
        listError: null,
      });
      return;
    }

    const [sourceDetail, selections, tables, catalogState] = await Promise.all([
      adminApi.getSource(selectedSourceId),
      adminApi.listSourceSelections(selectedSourceId),
      adminApi.listSourceObjects(selectedSourceId, { type: 'table' }),
      loadCatalogState(selectedSourceId),
    ]);
    const selectedSource = {
      ...sourceDetail,
      last_sync_at: sources.find((item) => item.source_id === selectedSourceId)?.last_sync_at || '',
    };
    safeRender({
      sources,
      selectedSourceId,
      selectedSource,
      selections,
      tables,
      syncError: dataSourcesUiState.syncErrors[selectedSourceId] || null,
      catalogState,
      listError: null,
    });
  } catch (error) {
    safeRender({
      sources: [],
      selectedSourceId: '',
      selectedSource: null,
      selections: [],
      tables: [],
      syncError: null,
      catalogState: {},
      listError: normalizeApiError(error, 'Data Sources unavailable.'),
    });
  }
}

async function hydrateOverview(panel, route) {
  const renderVersion = ++overviewRenderVersion;
  const cards = Object.fromEntries(OVERVIEW_CARD_SPECS.map((card) => [card.key, card]));

  const safeRender = (cardKey, html) => {
    if (renderVersion !== overviewRenderVersion) return;
    renderOverviewCardInto(panel, cardKey, html);
  };

  const settleCard = async (cardKey, loader, summarize) => {
    try {
      const payload = await loader();
      const summary = summarize(payload, route);
      if (summary?.empty) {
        safeRender(cardKey, renderOverviewCardEmpty(cards[cardKey], summary.empty, summary.secondaryLink || null));
        return;
      }
      safeRender(cardKey, renderOverviewCardSuccess(cards[cardKey], summary));
    } catch (error) {
      safeRender(cardKey, renderOverviewCardError(cards[cardKey], error));
    }
  };

  void settleCard('sources', () => requestJson('/sources', 'Source Summary unavailable.'), summarizeSources);
  void settleCard('engines', async () => ({
    engines: await requestJson('/engines', 'Engine / Binding Summary unavailable.'),
    bindings: await requestJson('/bindings', 'Engine / Binding Summary unavailable.'),
  }), (payload) => summarizeEngines(payload.engines, payload.bindings));
  void settleCard('semantic', async () => ({
    entities: await requestJson('/semantic/entities', 'Semantic Summary unavailable.'),
    metrics: await requestJson('/semantic/metrics', 'Semantic Summary unavailable.'),
    processObjects: await requestJson('/semantic/process-objects', 'Semantic Summary unavailable.'),
    dimensions: await requestJson('/semantic/dimensions', 'Semantic Summary unavailable.'),
    time: await requestJson('/semantic/time', 'Semantic Summary unavailable.'),
    enumSets: await requestJson('/semantic/enum-sets', 'Semantic Summary unavailable.'),
    typedBindings: await requestJson('/semantic/bindings', 'Semantic Summary unavailable.'),
    compatibilityProfiles: await requestJson('/compiler/compatibility-profiles', 'Semantic Summary unavailable.'),
  }), summarizeSemantic);
  void settleCard('sessions', () => requestJson('/sessions', 'Session Operations Summary unavailable.'), summarizeSessions);
  void settleCard('runtime', () => requestJson('/jobs', 'Runtime / Jobs Summary unavailable.'), summarizeRuntime);
  void settleCard('governance', async () => ({
    approvals: await requestJson('/approvals?status=pending', 'Governance / Approvals Summary unavailable.'),
    policies: await requestJson('/policies', 'Governance / Approvals Summary unavailable.'),
    qualityRules: await requestJson('/quality-rules', 'Governance / Approvals Summary unavailable.'),
  }), (payload) => summarizeGovernance(payload.approvals, payload.policies, payload.qualityRules));
  void settleCard('observability', async () => ({
    health: await requestJson('/health', 'Observability Summary unavailable.'),
    metrics: await requestJson('/metrics', 'Observability Summary unavailable.'),
  }), (payload) => summarizeObservability(payload.health, payload.metrics));
}

async function openSelectionModal(sourceId) {
  const overlay = ensureSelectionModal();
  const sourceLabel = overlay.querySelector('[data-role="selection-source"]');
  const schemaSelect = overlay.querySelector('[data-role="schema-select"]');
  const errorBox = overlay.querySelector('[data-role="selection-error"]');
  const checklist = overlay.querySelector('[data-role="table-checklist"]');
  const saveButton = overlay.querySelector('[data-role="save"]');

  const selectedKeys = new Set();
  try {
    const existingSelections = await adminApi.listSourceSelections(sourceId);
    existingSelections.forEach((item) => selectedKeys.add(sourceSelectionKey(item.schema_name, item.table_name)));
  } catch (error) {
    toast(normalizeApiError(error, 'Failed to load existing selections.').message, 'error');
  }

  let schemas = [];
  let currentSchema = '';

  const renderModalState = async (schemaName) => {
    currentSchema = schemaName || schemas[0]?.name || '';
    if (schemaSelect) {
      schemaSelect.innerHTML = schemas.length
        ? schemas.map((item) => `<option value="${esc(item.name)}" ${item.name === currentSchema ? 'selected' : ''}>${esc(item.name)}</option>`).join('')
        : '<option value="">No schema available</option>';
    }
    if (!currentSchema) {
      if (checklist) checklist.innerHTML = renderEmptyState('No schema available from the live catalog for this source.');
      return;
    }
    if (checklist) checklist.innerHTML = renderLoadingState('Loading live tables...');
    try {
      const tables = await adminApi.listCatalogTables(sourceId, currentSchema);
      if (checklist) checklist.innerHTML = renderSelectionChecklist(currentSchema, tables, selectedKeys);
      overlay.querySelectorAll('[data-role="table-checkbox"]').forEach((input) => {
        input.addEventListener('change', (event) => {
          const tableKey = sourceSelectionKey(
            event.currentTarget.dataset.schemaName || '',
            event.currentTarget.dataset.tableName || ''
          );
          if (event.currentTarget.checked) {
            selectedKeys.add(tableKey);
          } else {
            selectedKeys.delete(tableKey);
          }
        });
      });
    } catch (error) {
      if (checklist) checklist.innerHTML = renderStructuredError(error, 'Catalog tables unavailable.');
    }
  };

  try {
    schemas = await adminApi.listCatalogSchemas(sourceId);
  } catch (error) {
    if (errorBox) errorBox.innerHTML = renderStructuredError(error, 'Catalog schemas unavailable.');
  }

  if (sourceLabel) sourceLabel.textContent = sourceId;
  if (errorBox && schemas.length) errorBox.innerHTML = '';
  await renderModalState(schemas[0]?.name || '');

  if (schemaSelect) {
    schemaSelect.onchange = () => {
      void renderModalState(schemaSelect.value);
    };
  }

  if (saveButton) {
    saveButton.onclick = async () => {
      const payload = {
        selections: Array.from(selectedKeys).sort().map((key) => {
          const [schemaName, ...rest] = key.split('.');
          return { schema_name: schemaName, table_name: rest.join('.') };
        }),
      };
      try {
        await adminApi.replaceSourceSelections(sourceId, payload);
        toast('Selections updated.', 'success');
        closeModal('selection-modal');
        refreshCurrentDataSources();
      } catch (error) {
        if (errorBox) errorBox.innerHTML = renderStructuredError(error, 'Failed to save selections.');
      }
    };
  }

  openModal('selection-modal');
}

function openSourceFormModal(mode, source) {
  const overlay = ensureSourceFormModal();
  const title = overlay.querySelector('#source-form-title');
  const modeLabel = overlay.querySelector('[data-role="mode-label"]');
  const copy = overlay.querySelector('[data-role="copy"]');
  const form = overlay.querySelector('[data-role="form"]');
  const errorBox = overlay.querySelector('[data-role="error"]');
  const sourceTypeInput = form.querySelector('[name="source_type"]');
  const displayNameInput = form.querySelector('[name="display_name"]');
  const syncModeInput = form.querySelector('[name="sync_mode"]');
  const connectionInput = form.querySelector('[name="connection_json"]');
  const submit = overlay.querySelector('[data-role="submit"]');

  title.textContent = mode === 'edit' ? 'Edit Source' : 'Create Source';
  modeLabel.textContent = mode;
  copy.textContent = mode === 'edit'
    ? 'PUT /sources/{source_id} updates display name, connection, and sync_mode.'
    : 'POST /sources creates a new source entry and returns source_id.';
  if (errorBox) {
    errorBox.style.display = 'none';
    errorBox.innerHTML = '';
  }
  sourceTypeInput.value = source?.source_type || 'duckdb';
  sourceTypeInput.disabled = mode === 'edit';
  displayNameInput.value = source?.display_name || '';
  syncModeInput.value = source?.sync_mode || 'all';
  connectionInput.value = JSON.stringify(source?.connection || { path: '/tmp/demo.duckdb' }, null, 2);
  submit.textContent = mode === 'edit' ? 'Save Changes' : 'Create Source';

  form.onsubmit = async (event) => {
    event.preventDefault();
    let connection = {};
    try {
      connection = JSON.parse(connectionInput.value || '{}');
    } catch {
      if (errorBox) {
        errorBox.style.display = '';
        errorBox.innerHTML = renderErrorState('Connection JSON is invalid.');
      }
      return;
    }
    try {
      if (mode === 'edit' && source?.source_id) {
        await adminApi.updateSource(source.source_id, {
          display_name: displayNameInput.value.trim(),
          sync_mode: syncModeInput.value,
          connection,
        });
        toast('Source updated.', 'success');
      } else {
        const created = await adminApi.createSource({
          source_type: sourceTypeInput.value.trim(),
          display_name: displayNameInput.value.trim(),
          connection,
        });
        toast('Source created.', 'success');
        closeModal('source-form-modal');
        applyAdminRoute({ ...currentAdminRoute, tab: 'data-sources', sourceId: created.source_id }, 'replace');
        return;
      }
      closeModal('source-form-modal');
      refreshCurrentDataSources();
    } catch (error) {
      if (errorBox) {
        errorBox.style.display = '';
        errorBox.innerHTML = renderStructuredError(error, 'Failed to save source.');
      }
    }
  };

  openModal('source-form-modal');
}

async function handleRunSourceSync(sourceId) {
  try {
    delete dataSourcesUiState.syncErrors[sourceId];
    const syncResult = await adminApi.runSourceSync(sourceId);
    dataSourcesUiState.syncJobs[sourceId] = {
      job_id: syncResult.job_id,
      status: syncResult.status || 'submitted',
      updated_at: new Date().toISOString(),
    };
    refreshCurrentDataSources();
    const finalJob = await pollAsync(
      async () => adminApi.getSourceSyncStatus(sourceId, syncResult.job_id),
      {
        maxAttempts: 6,
        intervalMs: 500,
        shouldStop: (job) => ['succeeded', 'failed', 'cancelled', 'completed'].includes(
          String(job?.status || '').toLowerCase()
        ),
      }
    );
    dataSourcesUiState.syncJobs[sourceId] = {
      ...(finalJob || {}),
      job_id: finalJob?.job_id || syncResult.job_id,
      updated_at: finalJob?.updated_at || new Date().toISOString(),
    };
    if (String(finalJob?.status || '').toLowerCase() === 'failed') {
      toast('Sync failed.', 'error');
    } else {
      toast('Sync completed.', 'success');
    }
  } catch (error) {
    dataSourcesUiState.syncErrors[sourceId] = normalizeApiError(error, 'Sync request failed.');
    toast(dataSourcesUiState.syncErrors[sourceId].message, 'error');
  }
  refreshCurrentDataSources();
}

function handleDeleteSource(source) {
  openDangerConfirm({
    title: 'Delete Source',
    objectLabel: source.source_id,
    impactScope: 'Deletes the source entry, sync jobs, sync selections, and synced source objects if no bindings depend on it.',
    reversible: 'No',
    confirmLabel: 'Delete Source',
    detailsHtml: renderDetailList([
      { label: 'display_name', value: source.display_name || '-' },
      { label: 'source_type', value: source.source_type || '-' },
      { label: 'warning', value: '409 conflicts surface dependencies from bindings or typed bindings.' },
    ]),
    onConfirm: async () => {
      try {
        await adminApi.deleteSource(source.source_id);
        toast('Source deleted.', 'success');
        const nextSourceId = currentAdminRoute.sourceId === source.source_id ? '' : currentAdminRoute.sourceId;
        applyAdminRoute({ ...currentAdminRoute, sourceId: nextSourceId }, 'replace');
      } catch (error) {
        const normalized = normalizeApiError(error, 'Failed to delete source.');
        dataSourcesUiState.syncErrors[source.source_id] = normalized;
        toast(normalized.message, 'error');
        refreshCurrentDataSources();
      }
    },
  });
}

function bindDataSourcesEvents(panel, viewModel) {
  panel.querySelectorAll('[data-action="refresh-sources"]').forEach((button) => {
    button.addEventListener('click', () => refreshCurrentDataSources());
  });
  panel.querySelectorAll('[data-action="create-source"]').forEach((button) => {
    button.addEventListener('click', () => openSourceFormModal('create', null));
  });
  panel.querySelectorAll('[data-action="select-source"]').forEach((button) => {
    button.addEventListener('click', () => {
      applyAdminRoute({ ...currentAdminRoute, sourceId: button.dataset.sourceId || '' }, 'push');
    });
  });
  panel.querySelectorAll('[data-action="edit-source"]').forEach((button) => {
    button.addEventListener('click', () => {
      if (viewModel.selectedSource) {
        openSourceFormModal('edit', viewModel.selectedSource);
      }
    });
  });
  panel.querySelectorAll('[data-action="delete-source"]').forEach((button) => {
    button.addEventListener('click', () => {
      if (viewModel.selectedSource) {
        handleDeleteSource(viewModel.selectedSource);
      }
    });
  });
  panel.querySelectorAll('[data-action="run-sync"]').forEach((button) => {
    button.addEventListener('click', () => {
      const sourceId = button.dataset.sourceId || '';
      if (sourceId) void handleRunSourceSync(sourceId);
    });
  });
  panel.querySelectorAll('[data-action="manage-selections"]').forEach((button) => {
    button.addEventListener('click', () => {
      const sourceId = button.dataset.sourceId || '';
      if (sourceId) void openSelectionModal(sourceId);
    });
  });
  panel.querySelectorAll('[data-action="delete-selection"]').forEach((button) => {
    button.addEventListener('click', async () => {
      try {
        await adminApi.deleteSourceSelection(button.dataset.sourceId || '', button.dataset.selectionId || '');
        toast('Selection removed.', 'success');
        refreshCurrentDataSources();
      } catch (error) {
        toast(normalizeApiError(error, 'Failed to remove selection.').message, 'error');
      }
    });
  });
  panel.querySelectorAll('[data-action="clear-selections"]').forEach((button) => {
    button.addEventListener('click', () => {
      const sourceId = button.dataset.sourceId || '';
      openDangerConfirm({
        title: 'Clear Sync Selections',
        objectLabel: sourceId,
        impactScope: 'Removes all configured schema/table selections for this source.',
        reversible: 'No',
        confirmLabel: 'Clear Selections',
        onConfirm: async () => {
          try {
            await adminApi.clearSourceSelections(sourceId);
            toast('Selections cleared.', 'success');
            refreshCurrentDataSources();
          } catch (error) {
            toast(normalizeApiError(error, 'Failed to clear selections.').message, 'error');
          }
        },
      });
    });
  });
  panel.querySelectorAll('[data-action="select-catalog-schema"]').forEach((button) => {
    button.addEventListener('click', async () => {
      const sourceId = button.dataset.sourceId || '';
      const schemaName = button.dataset.schemaName || '';
      const existing = sourceCatalogState(sourceId);
      dataSourcesUiState.catalog[sourceId] = { ...existing, selectedSchema: schemaName };
      refreshCurrentDataSources();
    });
  });
}

function renderAdminPanel(route) {
  const panel = document.getElementById(`panel-${route.tab}`);
  if (!panel) return;
  const tabMeta = ADMIN_TAB_META[route.tab];
  const routeFocus = tabMeta.routeFocus.map((item) => `<span class="shell-chip"><strong>${esc(item)}</strong></span>`).join('');
  const isOverview = route.tab === 'overview';
  const isDataSources = route.tab === 'data-sources';
  const mainContent = isOverview
    ? renderOverviewShell()
    : isDataSources
      ? `<div data-role="data-sources-body">${renderDataSourcesLoading()}</div>`
    : renderAdminListDetailLayout({
        primaryHtml: `
          <div class="admin-shell-card">
            <h3>Page Scope</h3>
            <ul>
              ${tabMeta.summary.map((item) => `<li>${esc(item)}</li>`).join('')}
            </ul>
          </div>
          <div class="admin-shell-card">
            <h3>Implementation Boundary</h3>
            <p>T2 provides shared list/detail, JSON, error, and danger-confirm primitives. This page still waits for its task-specific data sources and write flows.</p>
          </div>
        `,
        secondaryHtml: renderAdminTableCard({
          title: 'Upcoming Page Integration',
          count: tabMeta.routeFocus.length,
          countLabel: 'route signal(s)',
          note: 'Later tasks will plug this page into real list queries and detail panes without re-implementing table shells or `/ui` deep links.',
          columns: ['Signal', 'Why it matters'],
          rowsHtml: tabMeta.routeFocus.map((item) => `
            <tr>
              <td><span class="inline-code">${esc(item)}</span></td>
              <td class="is-quiet">Shared renderers keep ${esc(item)} in the URL contract and out of ad-hoc client state.</td>
            </tr>
          `).join(''),
        }),
        detailHtml: renderRouteSummary(route, tabMeta),
      });

  panel.innerHTML = `
    <div class="admin-shell-header">
      <div class="admin-shell-copy">
        <h1>${esc(tabMeta.label)}</h1>
        <p>${esc(tabMeta.subtitle)}</p>
        <div class="shell-chip-group">
          ${routeFocus}
          <span class="shell-chip"><strong>refresh-safe</strong></span>
          <span class="shell-chip"><strong>shareable-link</strong></span>
        </div>
      </div>
      <div class="admin-shell-meta">
        <a class="btn btn-sm" href="/admin">Reset to Overview</a>
        <a class="btn btn-sm" href="${esc(buildUiSessionsUrl(route.sessionId || ''))}">Open /ui</a>
      </div>
    </div>
    ${renderAdminSubnav(route, tabMeta)}
    ${mainContent}
  `;

  if (isOverview) {
    void hydrateOverview(panel, route);
  }
  if (isDataSources) {
    void hydrateDataSources(panel, route);
  }

  panel.querySelectorAll('[data-subtab]').forEach((button) => {
    button.addEventListener('click', () => {
      applyAdminRoute({
        ...currentAdminRoute,
        tab: route.tab,
        subtab: button.dataset.subtab || '',
      });
    });
  });
}

function applyAdminRoute(nextRoute, historyMode = 'push') {
  currentAdminRoute = normalizeAdminRoute(nextRoute);
  writeAdminRoute(currentAdminRoute, historyMode);
  updateAdminBreadcrumb(currentAdminRoute);
  suppressAdminTabSync = true;
  setActiveTab(currentAdminRoute.tab);
  suppressAdminTabSync = false;
  renderAdminPanel(currentAdminRoute);
}

const adminApi = {
  getJson: requestJson,
  listSources() {
    return requestJson('/sources', 'Data Sources unavailable.');
  },
  getSource(sourceId) {
    return requestJson(`/sources/${encodeURIComponent(sourceId)}`, 'Source Summary unavailable.');
  },
  createSource(payload) {
    return sendJson('/sources', 'POST', payload, 'Create Source failed.');
  },
  updateSource(sourceId, payload) {
    return sendJson(`/sources/${encodeURIComponent(sourceId)}`, 'PUT', payload, 'Edit Source failed.');
  },
  deleteSource(sourceId) {
    return sendDelete(`/sources/${encodeURIComponent(sourceId)}`, 'Delete Source failed.');
  },
  runSourceSync(sourceId) {
    return sendJson(`/sources/${encodeURIComponent(sourceId)}/sync`, 'POST', {}, 'Run Sync failed.');
  },
  getSourceSyncStatus(sourceId, jobId) {
    return requestJson(`/sources/${encodeURIComponent(sourceId)}/sync/${encodeURIComponent(jobId)}`, 'Sync status unavailable.');
  },
  listSourceSelections(sourceId) {
    return requestJson(`/sources/${encodeURIComponent(sourceId)}/sync/selections`, 'Sync selections unavailable.');
  },
  replaceSourceSelections(sourceId, payload) {
    return sendJson(`/sources/${encodeURIComponent(sourceId)}/sync/selections`, 'POST', payload, 'Manage Selections failed.');
  },
  clearSourceSelections(sourceId) {
    return sendDelete(`/sources/${encodeURIComponent(sourceId)}/sync/selections`, 'Clear selections failed.');
  },
  deleteSourceSelection(sourceId, selectionId) {
    return sendDelete(`/sources/${encodeURIComponent(sourceId)}/sync/selections/${encodeURIComponent(selectionId)}`, 'Delete selection failed.');
  },
  listCatalogSchemas(sourceId) {
    return requestJson(`/sources/${encodeURIComponent(sourceId)}/catalog/schemas`, 'Catalog schemas unavailable.');
  },
  listCatalogTables(sourceId, schemaName) {
    return requestJson(`/sources/${encodeURIComponent(sourceId)}/catalog/tables?schema=${encodeURIComponent(schemaName)}`, 'Catalog tables unavailable.');
  },
  listSourceObjects(sourceId, params = {}) {
    const search = new URLSearchParams();
    if (params.type) search.set('type', params.type);
    if (params.schema) search.set('schema', params.schema);
    const query = search.toString();
    return requestJson(
      `/sources/${encodeURIComponent(sourceId)}/objects${query ? `?${query}` : ''}`,
      'Source objects unavailable.'
    );
  },
  async listApprovals(params) {
    const query = params ? `?${new URLSearchParams(params)}` : '';
    return requestJson(`/approvals${query}`, 'Approvals badge unavailable.');
  },
};

async function updateApprovalsBadge() {
  try {
    const approvals = await adminApi.listApprovals({ status: 'pending' });
    const badge = $('#approvals-badge');
    if (!badge) return;
    if (Array.isArray(approvals) && approvals.length > 0) {
      badge.textContent = String(approvals.length);
      badge.style.display = '';
    } else {
      badge.style.display = 'none';
    }
  } catch {
    const badge = $('#approvals-badge');
    if (badge) badge.style.display = 'none';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  initSidebar();
  currentAdminRoute = adminRouteFromLocation();
  window.addEventListener('tab-change', (event) => {
    if (suppressAdminTabSync) return;
    applyAdminRoute({
      ...currentAdminRoute,
      tab: event.detail?.tab || DEFAULT_ADMIN_ROUTE.tab,
    });
  });
  window.addEventListener('popstate', () => {
    currentAdminRoute = adminRouteFromLocation();
    updateAdminBreadcrumb(currentAdminRoute);
    suppressAdminTabSync = true;
    setActiveTab(currentAdminRoute.tab);
    suppressAdminTabSync = false;
    renderAdminPanel(currentAdminRoute);
  });
  updateAdminBreadcrumb(currentAdminRoute);
  suppressAdminTabSync = true;
  setActiveTab(currentAdminRoute.tab);
  suppressAdminTabSync = false;
  renderAdminPanel(currentAdminRoute);
  void updateApprovalsBadge();
});
</script>
