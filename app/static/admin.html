<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factum Admin</title>
<link rel="stylesheet" href="/static/shared.css">
<style>
/* Page-specific overrides */
.detail-back { cursor: pointer; color: var(--color-primary); font-size: var(--font-size-sm); margin-bottom: var(--space-md); display: inline-flex; align-items: center; gap: 4px; }
.detail-back:hover { color: var(--color-primary-hover); }
.detail-meta { display: grid; grid-template-columns: 140px 1fr; gap: var(--space-xs) var(--space-md); font-size: var(--font-size-base); margin-bottom: var(--space-lg); }
.detail-meta dt { color: var(--color-text-secondary); font-weight: 500; }
.detail-meta dd { color: var(--color-text); }
.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-md); }
.toolbar h2 { margin-bottom: 0; }
.filter-toolbar { display: flex; gap: var(--space-sm); align-items: center; }
.filter-toolbar select { padding: 6px 10px; border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: var(--font-size-sm); }
.auto-refresh { display: flex; align-items: center; gap: 6px; font-size: var(--font-size-sm); color: var(--color-text-secondary); }
.auto-refresh input[type="checkbox"] { margin: 0; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--color-border); border-top-color: var(--color-primary); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-row td { text-align: center; padding: var(--space-2xl); }
.source-status { display: inline-flex; align-items: center; gap: 6px; }
.engine-type-badge { font-family: var(--font-mono); font-size: var(--font-size-xs); }
.binding-connection { display: flex; align-items: center; gap: var(--space-sm); font-size: var(--font-size-sm); }
.binding-arrow { color: var(--color-text-muted); font-size: 16px; }
.severity-indicator { display: inline-flex; align-items: center; gap: 4px; }
.severity-indicator .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.severity-indicator .dot.error { background: var(--color-error); }
.severity-indicator .dot.warn { background: var(--color-warning); }
.severity-indicator .dot.info { background: var(--color-info); }
.approval-timeline .timeline-item { padding-bottom: var(--space-lg); }
.metrics-group { margin-bottom: var(--space-xl); }
.metrics-group h3 { font-size: var(--font-size-base); font-weight: 600; margin-bottom: var(--space-sm); color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.3px; font-size: var(--font-size-xs); }
.policy-type-badge { font-family: var(--font-mono); }
</style>
</head>
<body>

<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      Factum
      <small>Administration</small>
    </div>

    <div class="sidebar-section">Infrastructure</div>
    <ul class="sidebar-nav">
      <li class="active">
        <button data-tab="sources">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <ellipse cx="12" cy="5" rx="9" ry="3"/>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
          </svg>
          <span class="nav-label">Sources</span>
        </button>
      </li>
      <li>
        <button data-tab="engines">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="4" width="16" height="16" rx="2"/>
            <rect x="9" y="9" width="6" height="6"/>
            <path d="M9 1v3"/><path d="M15 1v3"/><path d="M9 20v3"/><path d="M15 20v3"/>
            <path d="M20 9h3"/><path d="M20 14h3"/><path d="M1 9h3"/><path d="M1 14h3"/>
          </svg>
          <span class="nav-label">Engines</span>
        </button>
      </li>
      <li>
        <button data-tab="bindings">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          <span class="nav-label">Bindings</span>
        </button>
      </li>
    </ul>

    <div class="sidebar-section">Semantic Layer</div>
    <ul class="sidebar-nav">
      <li>
        <button data-tab="entities">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
          <span class="nav-label">Entities</span>
        </button>
      </li>
      <li>
        <button data-tab="metrics">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <span class="nav-label">Metrics</span>
        </button>
      </li>
    </ul>

    <div class="sidebar-section">Governance</div>
    <ul class="sidebar-nav">
      <li>
        <button data-tab="governance">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <span class="nav-label">Policies</span>
        </button>
      </li>
      <li>
        <button data-tab="approvals">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <span class="nav-label">Approvals</span>
          <span class="nav-badge" id="approvals-badge" style="display:none;">0</span>
        </button>
      </li>
    </ul>

    <div class="sidebar-section">System</div>
    <ul class="sidebar-nav">
      <li>
        <button data-tab="observability">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <span class="nav-label">Observability</span>
        </button>
      </li>
    </ul>

    <div class="sidebar-footer">
      <a href="/ui">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/>
        </svg>
        <span>Analytics UI</span>
      </a>
    </div>
  </aside>

  <!-- Content Area -->
  <div class="content-area">
    <div class="content-header">
      <div class="breadcrumb">
        <span>Admin</span>
        <span class="sep">/</span>
        <span class="current">Sources</span>
      </div>
    </div>

    <div class="content-body">
      <!-- Sources -->
      <div class="panel active" id="panel-sources"></div>
      <!-- Engines -->
      <div class="panel" id="panel-engines"></div>
      <!-- Bindings -->
      <div class="panel" id="panel-bindings"></div>
      <!-- Entities -->
      <div class="panel" id="panel-entities"></div>
      <!-- Metrics -->
      <div class="panel" id="panel-metrics"></div>
      <!-- Governance -->
      <div class="panel" id="panel-governance"></div>
      <!-- Approvals -->
      <div class="panel" id="panel-approvals"></div>
      <!-- Observability -->
      <div class="panel" id="panel-observability"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-lg);">
      <h3 id="modal-title"></h3>
      <button id="modal-close" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--color-text-muted);padding:4px;">&times;</button>
    </div>
    <div id="modal-body"></div>
    <div id="modal-footer" style="display:flex;justify-content:flex-end;gap:var(--space-sm);margin-top:var(--space-lg);"></div>
  </div>
</div>

<script src="/static/shared.js"></script>
<script>
// ── Helpers ────────────────────────────────────────────────
const $ = (sel, ctx = document) => ctx.querySelector(sel);
const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

// Override shared.js api with our domain-specific methods
const api = {
  async _fetch(path, opts = {}) {
    const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      const detail = body.detail;
      const msg = (detail && typeof detail === 'object') ? detail.message : (detail || `HTTP ${res.status}`);
      throw new Error(msg);
    }
    return res.json();
  },
  // Sources
  listSources: ()         => api._fetch('/sources'),
  createSource: (d)       => api._fetch('/sources', { method: 'POST', body: JSON.stringify(d) }),
  getSource: (id)         => api._fetch(`/sources/${id}`),
  updateSource: (id, d)   => api._fetch(`/sources/${id}`, { method: 'PUT', body: JSON.stringify(d) }),
  deleteSource: (id)      => api._fetch(`/sources/${id}`, { method: 'DELETE' }),
  syncSource: (id)        => api._fetch(`/sources/${id}/sync`, { method: 'POST' }),
  listObjects: (id)       => api._fetch(`/sources/${id}/objects`),
  // Engines
  listEngines: ()         => api._fetch('/engines'),
  createEngine: (d)       => api._fetch('/engines', { method: 'POST', body: JSON.stringify(d) }),
  getEngine: (id)         => api._fetch(`/engines/${id}`),
  // Bindings
  listBindings: ()        => api._fetch('/bindings'),
  createBinding: (d)      => api._fetch('/bindings', { method: 'POST', body: JSON.stringify(d) }),
  deleteBinding: (id)     => api._fetch(`/bindings/${id}`, { method: 'DELETE' }),
  // Entities
  listEntities: ()        => api._fetch('/semantic/entities'),
  createEntity: (d)       => api._fetch('/semantic/entities', { method: 'POST', body: JSON.stringify(d) }),
  updateEntity: (id, d)   => api._fetch(`/semantic/entities/${id}`, { method: 'PUT', body: JSON.stringify(d) }),
  publishEntity: (id)     => api._fetch(`/semantic/entities/${id}/publish`, { method: 'POST' }),
  // Metrics
  listMetrics: ()         => api._fetch('/semantic/metrics'),
  createMetric: (d)       => api._fetch('/semantic/metrics', { method: 'POST', body: JSON.stringify(d) }),
  updateMetric: (id, d)   => api._fetch(`/semantic/metrics/${id}`, { method: 'PUT', body: JSON.stringify(d) }),
  publishMetric: (id)     => api._fetch(`/semantic/metrics/${id}/publish`, { method: 'POST' }),
  // Mappings
  listMappings: (params)  => api._fetch('/semantic/mappings' + (params ? '?' + new URLSearchParams(params) : '')),
  createMapping: (d)      => api._fetch('/semantic/mappings', { method: 'POST', body: JSON.stringify(d) }),
  deleteMapping: (id)     => api._fetch(`/semantic/mappings/${id}`, { method: 'DELETE' }),
  // Catalog browsing & selections
  browseSchemas: (id)          => api._fetch(`/sources/${id}/catalog/schemas`),
  browseTables: (id, schema)   => api._fetch(`/sources/${id}/catalog/tables?schema=${encodeURIComponent(schema)}`),
  listSelections: (id)         => api._fetch(`/sources/${id}/sync/selections`),
  setSelections: (id, selections) => api._fetch(`/sources/${id}/sync/selections`, { method: 'POST', body: JSON.stringify({ selections }) }),
  // Governance
  listPolicies: ()             => api._fetch('/policies'),
  createPolicy: (d)            => api._fetch('/policies', { method: 'POST', body: JSON.stringify(d) }),
  updatePolicy: (id, d)        => api._fetch(`/policies/${id}`, { method: 'PUT', body: JSON.stringify(d) }),
  deletePolicy: (id)           => api._fetch(`/policies/${id}`, { method: 'DELETE' }),
  listQualityRules: ()         => api._fetch('/quality-rules'),
  createQualityRule: (d)       => api._fetch('/quality-rules', { method: 'POST', body: JSON.stringify(d) }),
  deleteQualityRule: (id)      => api._fetch(`/quality-rules/${id}`, { method: 'DELETE' }),
  // Approvals
  listApprovals: (params)      => api._fetch('/approvals' + (params ? '?' + new URLSearchParams(params) : '')),
  approveRequest: (id, d)      => api._fetch(`/approvals/${id}/approve`, { method: 'POST', body: JSON.stringify(d) }),
  rejectRequest: (id, d)       => api._fetch(`/approvals/${id}/reject`, { method: 'POST', body: JSON.stringify(d) }),
  // Observability
  getHealth: ()                => api._fetch('/health'),
  getMetrics: ()               => api._fetch('/metrics'),
};

function toast(msg, type = 'success') {
  let container = document.querySelector('.toast-container');
  if (!container) {
    container = document.createElement('div');
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function loadingRow(cols) {
  return `<tr class="loading-row"><td colspan="${cols}"><span class="spinner"></span></td></tr>`;
}

// ── Modal ──────────────────────────────────────────────────
function openModal(title, bodyHtml, footerHtml) {
  $('#modal-title').textContent = title;
  $('#modal-body').innerHTML = bodyHtml;
  $('#modal-footer').innerHTML = footerHtml;
  $('#modal-overlay').classList.add('open');
}
function closeModal() { $('#modal-overlay').classList.remove('open'); }
$('#modal-close').onclick = closeModal;
$('#modal-overlay').onclick = (e) => { if (e.target === e.currentTarget) closeModal(); };

// ── Tab switching (rendered via shared.js initSidebar) ─────
// We also hook into the tab-change event for lazy-loading
const renderers = {};
window.addEventListener('tab-change', (e) => {
  const tab = e.detail.tab;
  if (renderers[tab]) renderers[tab]();
});

// ── Pending approvals badge ────────────────────────────────
async function updateApprovalsBadge() {
  try {
    const approvals = await api.listApprovals({ status: 'pending' });
    const badge = $('#approvals-badge');
    if (badge) {
      if (approvals.length > 0) {
        badge.textContent = approvals.length;
        badge.style.display = '';
      } else {
        badge.style.display = 'none';
      }
    }
  } catch {}
}

// ── Helper functions ───────────────────────────────────────
function engineTypeBadge(type) {
  const map = { duckdb: 'badge-info', trino: 'badge-primary' };
  const cls = map[(type || '').toLowerCase()] || 'badge-gray';
  return `<span class="badge ${cls} engine-type-badge">${esc(type || 'unknown')}</span>`;
}

function policyTypeBadge(type) {
  const map = { aggregate_only: 'badge-info', field_mask: 'badge-warning', row_filter: 'badge-error', max_rows: 'badge-gray' };
  const cls = map[(type || '').toLowerCase()] || 'badge-gray';
  return `<span class="badge ${cls} policy-type-badge">${esc(type || 'unknown')}</span>`;
}

function severityBadge(sev) {
  const map = { error: 'badge-error', warn: 'badge-warning', info: 'badge-info' };
  const cls = map[(sev || '').toLowerCase()] || 'badge-gray';
  return `<span class="badge ${cls}">${esc(sev || 'info')}</span>`;
}

function syncStatusDot(source) {
  const status = (source.status || '').toLowerCase();
  if (status === 'synced' || status === 'active' || status === 'ok') return '<span class="status-dot green"></span>';
  if (status === 'error' || status === 'failed') return '<span class="status-dot red"></span>';
  return '<span class="status-dot gray"></span>';
}

// ── Sources Tab ────────────────────────────────────────────
renderers.sources = async () => {
  const panel = $('#panel-sources');
  panel.innerHTML = `
    <div class="card">
      <div class="card-header">
        <h2>Catalog Sources</h2>
        <button class="btn btn-primary" id="add-source">+ Add Source</button>
      </div>
      <table>
        <thead><tr><th>Name</th><th>Type</th><th>Sync Mode</th><th>Status</th><th>Created</th><th></th></tr></thead>
        <tbody id="sources-tbody">${loadingRow(6)}</tbody>
      </table>
    </div>`;

  const CONN_TEMPLATES = {
    local:          '{"path": "/path/to/file.duckdb"}',
    duckdb:         '{"path": "/path/to/file.duckdb"}',
    hive_metastore: '{"host": "localhost", "port": 9083}',
    trino:          '{"host": "localhost", "port": 8080, "user": "factum", "catalog": "hive", "schema": "default"}',
    unity_catalog:  '{"host": "your-workspace.azuredatabricks.net", "token": "", "catalog": "main"}',
    aws_glue:       '{"region": "us-east-1", "catalog_id": null}',
    polaris:        '{"host": "polaris.example.com", "token": "", "warehouse": "default"}',
  };
  $('#add-source').onclick = () => {
    openModal('Add Source',
      `<div class="form-group"><label>Source Type</label><select id="f-src-type"><option value="local">local</option><option value="duckdb">duckdb</option><option value="hive_metastore">hive_metastore</option><option value="trino">trino</option><option value="unity_catalog">unity_catalog</option><option value="aws_glue">aws_glue</option><option value="polaris">polaris</option></select></div>
       <div class="form-group"><label>Display Name</label><input type="text" id="f-src-name" placeholder="My Source"></div>
       <div class="form-group"><label>Connection (JSON)</label><textarea id="f-src-conn">{"path": "/path/to/file.duckdb"}</textarea></div>`,
      `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="f-src-submit">Create</button>`);
    $('#f-src-type').onchange = () => {
      $('#f-src-conn').value = CONN_TEMPLATES[$('#f-src-type').value] || '{}';
    };
    $('#f-src-submit').onclick = async () => {
      try {
        let conn = {};
        try { conn = JSON.parse($('#f-src-conn').value); } catch { throw new Error('Invalid connection JSON'); }
        await api.createSource({ source_type: $('#f-src-type').value, display_name: $('#f-src-name').value, connection: conn });
        toast('Source created');
        closeModal();
        renderers.sources();
      } catch (err) { toast(err.message, 'error'); }
    };
  };

  try {
    const sources = await api.listSources();
    const tbody = $('#sources-tbody');
    if (!sources.length) { tbody.innerHTML = `<tr><td colspan="6" class="empty">No sources registered.</td></tr>`; return; }
    tbody.innerHTML = sources.map(s => {
      const mode = s.sync_mode || 'all';
      let actionBtn = '';
      if (mode === 'by_select') {
        actionBtn = `<button class="btn btn-sm btn-primary select-tables-btn" data-id="${s.source_id}">Select Tables</button>`;
      } else if (mode === 'none') {
        actionBtn = `<button class="btn btn-sm" disabled>Sync</button>`;
      } else {
        actionBtn = `<button class="btn btn-sm sync-btn" data-id="${s.source_id}">Sync</button>`;
      }
      return `<tr>
        <td><span class="source-status">${syncStatusDot(s)}<a href="#" class="src-link" data-id="${s.source_id}">${esc(s.display_name)}</a></span></td>
        <td><span class="badge badge-gray">${esc(s.source_type)}</span></td>
        <td>${esc(mode)}</td>
        <td>${statusBadge(s.status)}</td>
        <td>${fmtDate(s.created_at)}</td>
        <td>${actionBtn} <button class="btn btn-sm edit-src-btn" data-id="${s.source_id}">Edit</button> <button class="btn btn-sm btn-danger del-src-btn" data-id="${s.source_id}">Delete</button></td>
      </tr>`;
    }).join('');
    $$('.src-link', tbody).forEach(a => a.onclick = (e) => { e.preventDefault(); showSourceDetail(a.dataset.id); });
    $$('.sync-btn', tbody).forEach(b => b.onclick = async () => {
      try { await api.syncSource(b.dataset.id); toast('Sync triggered'); } catch (err) { toast(err.message, 'error'); }
    });
    $$('.select-tables-btn', tbody).forEach(b => b.onclick = () => openTableSelectionModal(b.dataset.id));
    $$('.edit-src-btn', tbody).forEach(btn => btn.onclick = () => editSource(btn.dataset.id, sources));
    $$('.del-src-btn', tbody).forEach(btn => btn.onclick = async () => {
      if (!confirm('Delete this source? This will also remove its synced objects, selections, and bindings.')) return;
      try { await api.deleteSource(btn.dataset.id); toast('Source deleted'); renderers.sources(); } catch (err) { toast(err.message, 'error'); }
    });
  } catch (err) { toast(err.message, 'error'); }
};

function editSource(id, sources) {
  const s = sources.find(x => x.source_id === id);
  if (!s) return;
  const SYNC_MODES = ['all', 'by_select', 'none'];
  const modeOptions = SYNC_MODES.map(m => `<option value="${m}"${m === (s.sync_mode || 'all') ? ' selected' : ''}>${m}</option>`).join('');
  openModal('Edit Source',
    `<div class="form-group"><label>Display Name</label><input type="text" id="f-esrc-name" value="${attr(s.display_name)}"></div>
     <div class="form-group"><label>Sync Mode</label><select id="f-esrc-mode">${modeOptions}</select></div>
     <div class="form-group"><label>Connection (JSON)</label><textarea id="f-esrc-conn">${esc(JSON.stringify(s.connection, null, 2))}</textarea></div>`,
    `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="f-esrc-save">Save</button>`);
  $('#f-esrc-save').onclick = async () => {
    try {
      let conn;
      try { conn = JSON.parse($('#f-esrc-conn').value); } catch { throw new Error('Invalid connection JSON'); }
      await api.updateSource(id, { display_name: $('#f-esrc-name').value, sync_mode: $('#f-esrc-mode').value, connection: conn });
      toast('Source updated');
      closeModal();
      renderers.sources();
    } catch (err) { toast(err.message, 'error'); }
  };
}

async function openTableSelectionModal(sourceId) {
  openModal('Select Tables to Sync',
    `<div class="form-group"><label>Schema</label><select id="f-sel-schema"><option value="">Loading schemas...</option></select></div>
     <div id="sel-tables-area" style="max-height:300px;overflow-y:auto;"></div>`,
    `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="f-sel-save" disabled>Save &amp; Sync</button>`);

  const schemaSelect = $('#f-sel-schema');
  const tablesArea = $('#sel-tables-area');
  let currentSelections = new Set();

  try {
    const [schemas, existingSels] = await Promise.all([
      api.browseSchemas(sourceId),
      api.listSelections(sourceId).catch(() => [])
    ]);
    existingSels.forEach(s => currentSelections.add(`${s.schema_name}.${s.table_name}`));

    schemaSelect.innerHTML = '<option value="">-- pick a schema --</option>' +
      schemas.map(s => `<option value="${attr(s.name)}">${esc(s.name)}</option>`).join('');
  } catch (err) {
    tablesArea.innerHTML = `<p class="empty">Failed to load schemas: ${esc(err.message)}</p>`;
    return;
  }

  schemaSelect.onchange = async () => {
    const schema = schemaSelect.value;
    if (!schema) { tablesArea.innerHTML = ''; return; }
    tablesArea.innerHTML = `<p style="padding:12px;text-align:center;"><span class="spinner"></span></p>`;
    try {
      const tables = await api.browseTables(sourceId, schema);
      if (!tables.length) { tablesArea.innerHTML = '<p class="empty">No tables in this schema.</p>'; return; }
      tablesArea.innerHTML = tables.map(t => {
        const name = t.name;
        const key = `${schema}.${name}`;
        const checked = currentSelections.has(key) ? 'checked' : '';
        return `<label style="display:block;padding:4px 0;font-size:14px;cursor:pointer;">
          <input type="checkbox" class="sel-cb" data-schema="${attr(schema)}" data-table="${attr(name)}" ${checked} style="margin-right:8px;">
          ${esc(name)}
        </label>`;
      }).join('');
      $('#f-sel-save').disabled = false;
    } catch (err) {
      tablesArea.innerHTML = `<p class="empty">Failed to load tables: ${esc(err.message)}</p>`;
    }
  };

  $('#f-sel-save').onclick = async () => {
    const checkedBoxes = $$('.sel-cb', tablesArea);
    const visibleSchema = schemaSelect.value;
    currentSelections.forEach(key => {
      if (key.startsWith(visibleSchema + '.')) currentSelections.delete(key);
    });
    checkedBoxes.forEach(cb => {
      if (cb.checked) currentSelections.add(`${cb.dataset.schema}.${cb.dataset.table}`);
    });

    const selections = [...currentSelections].map(key => {
      const dot = key.indexOf('.');
      return { schema_name: key.slice(0, dot), table_name: key.slice(dot + 1) };
    });

    try {
      await api.setSelections(sourceId, selections);
      toast('Selections saved');
      await api.syncSource(sourceId);
      toast('Sync triggered');
      closeModal();
      renderers.sources();
    } catch (err) { toast(err.message, 'error'); }
  };
}

async function showSourceDetail(id) {
  const panel = $('#panel-sources');
  panel.innerHTML = `<div class="card"><span class="detail-back" id="src-back">&larr; Back to sources</span><div style="padding:24px;text-align:center;"><span class="spinner"></span></div></div>`;
  $('#src-back').onclick = () => renderers.sources();
  try {
    const [src, objs] = await Promise.all([api.getSource(id), api.listObjects(id)]);
    const schemas = objs.filter(o => o.object_type === 'schema');
    const tables = objs.filter(o => o.object_type === 'table');
    const columns = objs.filter(o => o.object_type === 'column');
    const colsByParent = {};
    columns.forEach(c => { (colsByParent[c.parent_id] = colsByParent[c.parent_id] || []).push(c); });
    const tablesByParent = {};
    tables.forEach(t => { (tablesByParent[t.parent_id] = tablesByParent[t.parent_id] || []).push(t); });
    const orphanTables = tables.filter(t => !schemas.some(s => s.object_id === t.parent_id));

    let objectsHtml = '';
    if (!tables.length && !schemas.length) {
      objectsHtml = '<p class="empty">No objects synced. Trigger a sync to populate.</p>';
    } else {
      schemas.forEach(s => {
        objectsHtml += `<h3 style="margin-top:16px;font-size:14px;color:var(--color-text-secondary);">Schema: ${esc(s.native_name)}</h3>`;
        const schemaTables = tablesByParent[s.object_id] || [];
        if (!schemaTables.length) {
          objectsHtml += `<p class="empty" style="margin-left:12px;">No tables in this schema.</p>`;
        } else {
          objectsHtml += renderTablesWithColumns(schemaTables, colsByParent);
        }
      });
      if (orphanTables.length) {
        if (schemas.length) objectsHtml += `<h3 style="margin-top:16px;font-size:14px;color:var(--color-text-secondary);">Tables</h3>`;
        objectsHtml += renderTablesWithColumns(orphanTables, colsByParent);
      }
    }

    panel.innerHTML = `
      <span class="detail-back" id="src-back2">&larr; Back to sources</span>
      <div class="stat-grid">
        <div class="stat-card stat-info">
          <div class="stat-label">Schemas</div>
          <div class="stat-value">${schemas.length}</div>
        </div>
        <div class="stat-card stat-success">
          <div class="stat-label">Tables</div>
          <div class="stat-value">${tables.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Columns</div>
          <div class="stat-value">${columns.length}</div>
        </div>
      </div>
      <div class="card">
        <h2>${esc(src.display_name)}</h2>
        <dl class="detail-meta">
          <dt>ID</dt><dd><code style="font-size:var(--font-size-sm);">${esc(src.source_id)}</code></dd>
          <dt>Type</dt><dd>${esc(src.source_type)}</dd>
          <dt>Status</dt><dd>${statusBadge(src.status)}</dd>
          <dt>Sync Mode</dt><dd>${esc(src.sync_mode || 'all')}</dd>
          <dt>Created</dt><dd>${fmtDate(src.created_at)}</dd>
        </dl>
        ${(src.sync_mode || 'all') === 'by_select' ? '<button class="btn btn-primary btn-sm" id="src-manage-sel" style="margin-bottom:12px;">Manage Selections</button>' : ''}
      </div>
      <div class="card">
        <h2>Tables &amp; Columns (${tables.length} tables, ${columns.length} columns)</h2>
        ${objectsHtml}
      </div>`;
    $('#src-back2').onclick = () => renderers.sources();
    const manageBtn = $('#src-manage-sel');
    if (manageBtn) manageBtn.onclick = () => openTableSelectionModal(id);
  } catch (err) { toast(err.message, 'error'); renderers.sources(); }
}

function renderTablesWithColumns(tables, colsByParent) {
  let html = '<table><thead><tr><th>Table</th><th>FQN</th><th>Columns</th><th>Properties</th></tr></thead><tbody>';
  tables.forEach(t => {
    const cols = colsByParent[t.object_id] || [];
    const colNames = cols.map(c => esc(c.native_name)).join(', ');
    const props = t.properties || {};
    const tableProps = props.table_properties || {};
    const owner = tableProps.owner || props.owner || '';
    const comment = tableProps.comment || props.comment || '';

    // Format table properties for display
    let propsHtml = '';
    if (owner) {
      propsHtml += `<div style="margin-bottom:4px;"><span style="color:var(--color-text-secondary);">Owner:</span> ${esc(owner)}</div>`;
    }
    if (comment) {
      const shortComment = comment.length > 100 ? comment.substring(0, 100) + '...' : comment;
      propsHtml += `<div style="margin-bottom:4px;"><span style="color:var(--color-text-secondary);">Comment:</span> ${esc(shortComment)}</div>`;
    }
    // Show other table properties
    const otherProps = Object.entries(tableProps).filter(([k]) => !['owner', 'comment'].includes(k));
    if (otherProps.length > 0) {
      propsHtml += `<details style="margin-top:4px;"><summary style="cursor:pointer;color:var(--color-primary);font-size:var(--font-size-xs);">${otherProps.length} more properties</summary>`;
      propsHtml += '<div style="margin-top:4px;font-size:var(--font-size-xs);">';
      otherProps.forEach(([k, v]) => {
        propsHtml += `<div><code>${esc(k)}</code>: ${esc(String(v))}</div>`;
      });
      propsHtml += '</div></details>';
    }
    if (!propsHtml) {
      propsHtml = '<span class="empty">-</span>';
    }

    html += `<tr>
      <td><strong>${esc(t.native_name)}</strong></td>
      <td><code style="font-size:12px;color:var(--color-text-secondary);">${esc(t.fqn)}</code></td>
      <td>${colNames || '<span class="empty">no columns synced</span>'}</td>
      <td style="font-size:var(--font-size-xs);max-width:300px;">${propsHtml}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  return html;
}

          ${m.status === 'draft' ? `<button class="btn btn-sm btn-primary pub-met" data-id="${m.metric_id}">Publish</button>` : ''}
        </td>
      </tr>`;
    }).join('');
    $$('.pub-met', tbody).forEach(btn => btn.onclick = async () => {
      try { await api.publishMetric(btn.dataset.id); toast('Metric published'); renderers.metrics(); } catch (err) { toast(err.message, 'error'); }
    });
    $$('.edit-met', tbody).forEach(btn => btn.onclick = () => editMetric(btn.dataset.id, metrics));
    $$('.met-link', tbody).forEach(a => { a.onclick = (e) => { e.preventDefault(); showMappings('metric', a.dataset.id, a.textContent, 'met'); }; });
  } catch (err) { toast(err.message, 'error'); }
};

function editMetric(id, metrics) {
  const m = metrics.find(x => x.metric_id === id);
  if (!m) return;
  const dims = m.dimensions || [];
  openModal('Edit Metric',
    `<div class="form-group"><label>Display Name</label><input type="text" id="f-met-dname" value="${attr(m.display_name)}"></div>
     <div class="form-group"><label>Description</label><textarea id="f-met-desc">${esc(m.description || '')}</textarea></div>
     <div class="form-group"><label>Definition SQL</label><textarea id="f-met-sql">${esc(m.definition_sql || '')}</textarea></div>
     <div class="form-group"><label>Dimensions (comma-separated)</label><input type="text" id="f-met-dims" value="${attr(dims.join(', '))}"></div>
     <div class="form-group"><label>Desired Direction</label><select id="f-met-dir"><option value="">-- none --</option><option value="up"${m.desired_direction === 'up' ? ' selected' : ''}>up</option><option value="down"${m.desired_direction === 'down' ? ' selected' : ''}>down</option><option value="neutral"${m.desired_direction === 'neutral' ? ' selected' : ''}>neutral</option></select></div>`,
    `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="f-met-save">Save</button>`);
  $('#f-met-save').onclick = async () => {
    try {
      const newDims = $('#f-met-dims').value.split(',').map(d => d.trim()).filter(Boolean);
      const updateData = { display_name: $('#f-met-dname').value, description: $('#f-met-desc').value, definition_sql: $('#f-met-sql').value, dimensions: newDims };
      const dirEdit = $('#f-met-dir').value;
      if (dirEdit) updateData.desired_direction = dirEdit; else updateData.desired_direction = null;
      await api.updateMetric(id, updateData);
      toast('Metric updated');
      closeModal();
      renderers.metrics();
    } catch (err) { toast(err.message, 'error'); }
  };
}

async function showMappings(semType, semId, name, prefix) {
  const card = $(`#${prefix}-mappings-card`);

  $(`#${prefix}-mappings-title`).textContent = `Mappings for ${name}`;
  const tbody = $(`#${prefix}-mappings-tbody`);
  tbody.innerHTML = loadingRow(5);

  $(`#${prefix}-add-mapping`).onclick = () => openAddMappingModal(semType, semId, name, prefix);

  try {
    const mappings = await api.listMappings({ semantic_type: semType, semantic_id: semId });
    if (!mappings.length) { tbody.innerHTML = `<tr><td colspan="5" class="empty">No mappings.</td></tr>`; return; }
    tbody.innerHTML = mappings.map(m => `<tr>
      <td>${esc(m.semantic_type)}</td><td><code style="font-size:var(--font-size-sm);">${esc(m.semantic_id)}</code></td><td><code style="font-size:var(--font-size-sm);">${esc(m.object_id)}</code></td><td><span class="badge badge-gray">${esc(m.mapping_type)}</span></td>
      <td><button class="btn btn-sm btn-danger del-map" data-id="${m.mapping_id}">Delete</button></td>

async function openAddMappingModal(semType, semId, name, prefix) {
  let sources = [];
  try { sources = await api.listSources(); } catch {}
  const srcOpts = sources.map(s => `<option value="${s.source_id}">${esc(s.display_name)}</option>`).join('');

  openModal('Add Mapping',
    `<div class="form-group"><label>Source</label><select id="f-map-source"><option value="">-- select source --</option>${srcOpts}</select></div>
     <div class="form-group"><label>Table</label><select id="f-map-obj" disabled><option value="">-- select source first --</option></select></div>
     <div class="form-group"><label>Mapping Type</label><select id="f-map-mtype"><option value="primary_table">primary_table</option><option value="direct">direct</option><option value="derived">derived</option></select></div>
     <div class="form-group"><label>Mapping JSON</label><textarea id="f-map-json">{}</textarea></div>`,
    `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="f-map-submit">Create</button>`);

  $('#f-map-source').onchange = async () => {
    const sourceId = $('#f-map-source').value;
    const objSelect = $('#f-map-obj');
    if (!sourceId) { objSelect.innerHTML = '<option value="">-- select source first --</option>'; objSelect.disabled = true; return; }
    objSelect.innerHTML = '<option value="">Loading...</option>';
    objSelect.disabled = true;
    try {
      const objs = await api.listObjects(sourceId);
      const tables = objs.filter(o => o.object_type === 'table');
      if (!tables.length) { objSelect.innerHTML = '<option value="">No tables found</option>'; return; }
      objSelect.innerHTML = '<option value="">-- select table --</option>' + tables.map(t => `<option value="${t.object_id}">${esc(t.fqn)}</option>`).join('');
      objSelect.disabled = false;
    } catch (err) { objSelect.innerHTML = '<option value="">Error loading tables</option>'; }
  };

  $('#f-map-submit').onclick = async () => {
    try {
      const objectId = $('#f-map-obj').value;
      if (!objectId) throw new Error('Please select a table');
      let mj = {};
      try { mj = JSON.parse($('#f-map-json').value); } catch { throw new Error('Invalid mapping JSON'); }
      await api.createMapping({ semantic_type: semType, semantic_id: semId, object_id: objectId, mapping_type: $('#f-map-mtype').value, mapping_json: mj });
      toast('Mapping created');
      closeModal();
      showMappings(semType, semId, name, prefix);
    } catch (err) { toast(err.message, 'error'); }
  };
}

    `<div class="form-group"><label>Reviewer Name</label><input type="text" id="f-apr-reviewer" placeholder="Your name"></div>
     <div class="form-group"><label>Reason</label><textarea id="f-apr-reason" placeholder="Reason for this decision..."></textarea></div>`,

    try {
      const data = {
        reviewer: $('#f-apr-reviewer').value,
        reason: $('#f-apr-reason').value
      };

        await api.approveRequest(approvalId, data);

        toast('Request rejected');
      }
      closeModal();
      renderers.approvals();
      updateApprovalsBadge();
    } catch (err) { toast(err.message, 'error'); }
  };
}

// ── Observability Tab ──────────────────────────────────────
let observabilityInterval = null;

renderers.observability = async () => {
  if (observabilityInterval) {
    clearInterval(observabilityInterval);
    observabilityInterval = null;
  }

  const panel = $('#panel-observability');
  panel.innerHTML = `
    <div class="card">
      <div class="card-header">
        <h2>System Health</h2>
        <div class="auto-refresh">
          <input type="checkbox" id="obs-auto-refresh">
          <label for="obs-auto-refresh">Auto-refresh (10s)</label>
        </div>
      </div>
      <div id="health-content"><span class="spinner"></span></div>
    </div>
    <div class="card">
      <h2>Request Metrics</h2>
      <div id="metrics-content"><span class="spinner"></span></div>
    </div>`;

  const loadObservability = async () => {
    // Load health
    try {
      const health = await api.getHealth();
      const healthEl = $('#health-content');
      if (healthEl) {
        const healthStatus = (health.status || 'unknown').toLowerCase();
        const healthBadgeCls = healthStatus === 'ok' ? 'badge-success' : healthStatus === 'error' ? 'badge-error' : 'badge-warning';
        let extraFields = '';
        for (const [key, value] of Object.entries(health)) {
          if (key === 'status' || key === 'db_path' || key === 'database') continue;
          extraFields += `<dt>${esc(key)}</dt><dd>${esc(String(value))}</dd>`;
        }
        healthEl.innerHTML = `
          <dl class="detail-meta">
            <dt>Status</dt><dd><span id="health-status-badge" class="badge ${healthBadgeCls}">${esc(health.status || 'unknown')}</span></dd>
            <dt>Database Path</dt><dd><code style="font-size:var(--font-size-sm);">${esc(health.db_path || health.database || '-')}</code></dd>
            ${extraFields}
          </dl>`;
      }
    } catch (err) {
      const healthEl = $('#health-content');
      if (healthEl) healthEl.innerHTML = `<p class="empty">Failed to load health: ${esc(err.message)}</p>`;
    }

    // Load metrics
    try {
      const metrics = await api.getMetrics();
      const metricsEl = $('#metrics-content');
      if (!metricsEl) return;

      if (typeof metrics === 'object' && metrics !== null) {
        const statEntries = [];
        const tableEntries = [];

        for (const [key, value] of Object.entries(metrics)) {
          if (typeof value === 'number') {
            statEntries.push({ key, value });
          } else if (typeof value === 'string') {
            tableEntries.push({ key, value });
          } else if (typeof value === 'object' && value !== null) {
            tableEntries.push({ key, value: JSON.stringify(value) });
          }
        }

        let html = '';

        // Group numeric metrics into categories for mini bar charts
        const requestMetrics = statEntries.filter(s => s.key.toLowerCase().includes('request') || s.key.toLowerCase().includes('count'));
        const latencyMetrics = statEntries.filter(s => s.key.toLowerCase().includes('latency') || s.key.toLowerCase().includes('time') || s.key.toLowerCase().includes('duration'));
        const errorMetrics = statEntries.filter(s => s.key.toLowerCase().includes('error') || s.key.toLowerCase().includes('fail'));
        const otherMetrics = statEntries.filter(s =>
          !requestMetrics.includes(s) && !latencyMetrics.includes(s) && !errorMetrics.includes(s)
        );

        // Stat cards
        if (statEntries.length) {
          html += '<div class="stat-grid">';
          statEntries.forEach(s => {
            const label = s.key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            let cardClass = '';
            if (s.key.toLowerCase().includes('error') || s.key.toLowerCase().includes('fail')) cardClass = 'stat-error';
            else if (s.key.toLowerCase().includes('request') || s.key.toLowerCase().includes('count')) cardClass = 'stat-info';
            else if (s.key.toLowerCase().includes('latency') || s.key.toLowerCase().includes('time')) cardClass = 'stat-warning';
            html += `<div class="stat-card ${cardClass}"><div class="stat-label">${esc(label)}</div><div class="stat-value">${esc(String(s.value))}</div></div>`;
          });
          html += '</div>';
        }

        // Mini bar charts for grouped metrics
        if (requestMetrics.length > 1) {
          html += `<div class="metrics-group"><h3>Requests</h3>${miniBarChart(requestMetrics.map(m => m.value), 50)}</div>`;
        }
        if (latencyMetrics.length > 1) {
          html += `<div class="metrics-group"><h3>Latency</h3>${miniBarChart(latencyMetrics.map(m => m.value), 50)}</div>`;
        }
        if (errorMetrics.length > 1) {
          html += `<div class="metrics-group"><h3>Errors</h3>${miniBarChart(errorMetrics.map(m => m.value), 50)}</div>`;
        }

        if (tableEntries.length) {
          html += '<table><thead><tr><th>Metric</th><th>Value</th></tr></thead><tbody>';
          tableEntries.forEach(e => {
            html += `<tr><td>${esc(e.key)}</td><td><code style="font-size:var(--font-size-sm);">${esc(truncate(String(e.value), 100))}</code></td></tr>`;
          });
          html += '</tbody></table>';
        }

        if (!statEntries.length && !tableEntries.length) {
          html = '<p class="empty">No metrics data available.</p>';
        }

        metricsEl.innerHTML = html;
      } else {
        metricsEl.innerHTML = '<p class="empty">No metrics data available.</p>';
      }
    } catch (err) {
      const metricsEl = $('#metrics-content');
      if (metricsEl) metricsEl.innerHTML = `<p class="empty">Failed to load metrics: ${esc(err.message)}</p>`;
    }
  };

  loadObservability();

  // Auto-refresh toggle
  const checkbox = $('#obs-auto-refresh');
  if (checkbox) {
    checkbox.onchange = () => {
      if (observabilityInterval) {
        clearInterval(observabilityInterval);
        observabilityInterval = null;
      }
      if (checkbox.checked) {
        observabilityInterval = setInterval(() => {
          const obsPanel = $('#panel-observability');
          if (obsPanel && obsPanel.classList.contains('active')) {
            loadObservability();
          } else {
            clearInterval(observabilityInterval);
            observabilityInterval = null;
          }
        }, 10000);
      }
    };
  }
};

// ── Utilities ──────────────────────────────────────────────
function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }
function attr(s) { return esc(s).replace(/"/g, '&quot;'); }
function truncate(s, n) { return s.length > n ? s.slice(0, n) + '...' : s; }
function fmtDate(s) { if (!s) return ''; try { return new Date(s).toLocaleDateString(); } catch { return s; } }
function parseJSON(s, fallback) { try { return JSON.parse(s); } catch { return fallback; } }
