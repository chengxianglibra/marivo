version: 0.1.1  # const: required, must be "0.1.1"
#
# OSI - Core Metadata Spec (YAML Schema) + MARIVO Vendor Extensions
#
# This document combines the upstream OSI core spec structure with the
# MARIVO-specific extension payloads used by Marivo. The MARIVO sections
# below are extensions to the OSI core contract.

# Enumerations
# Standard enums used throughout the specification

# Supported expression language dialects
dialects:
  - "ANSI_SQL"   # Standard SQL dialect
  - "SNOWFLAKE"  # Snowflake
  - "MDX"        # Multi-Dimensional Expressions
  - "TABLEAU"    # Tableau
  - "DATABRICKS" # Databricks SQL
  - "TRINO"      # Trino SQL

# Supported vendors for custom extensions (MARIVO only in current schema)
vendors:
  - "MARIVO"

# Supported time granularities, ordered from finest to coarsest.
time_granularities:
  - "hour"
  - "day"
  - "week"
  - "month"
  - "quarter"
  - "year"

# Supported metric decomposition semantics. Determines decomposition strategy, not SQL aggregation.
decomposition_semantics:
  - "sum"
  - "ratio"
  - "weighted_average"

# AI Context — additional context for AI tools.
# Accepts either a plain string or a structured object.
# oneOf:
#   - string
#   - object:
#       instructions: string       # Instructions for AI on how to use this entity
#       synonyms: string[]         # Alternative names and terms
#       examples: string[]         # Sample questions or use cases
#       # additionalProperties: true (allows vendor-specific fields)

# Custom Extension envelope
custom_extension:
  vendor_name: Vendor  # Required. Must be one of the values from 'vendors' enum.
  data: object         # Required. Vendor-specific data payload.
  # additionalProperties: false

# MARIVO-specific custom extension envelopes

marivo_dataset_custom_extension:
  vendor_name: "MARIVO"         # Required, const. Must be "MARIVO".
  data: MarivoDatasetExtension  # Required.
  # additionalProperties: false

marivo_field_custom_extension:
  vendor_name: "MARIVO"         # Required, const. Must be "MARIVO".
  data: MarivoFieldExtension   # Required.
  # additionalProperties: false

marivo_metric_custom_extension:
  vendor_name: "MARIVO"         # Required, const. Must be "MARIVO".
  data: MarivoMetricExtension  # Required.
  # additionalProperties: false

# Extension payload schemas

# MARIVO extension for Dataset.
dataset_extension:
  datasource_id: string  # Required. minLength: 1. Marivo datasource reference for routing, readiness, and schema resolution.
  # additionalProperties: false

# MARIVO extension for Field (time fields only).
field_extension:
  support_min_granularity: TimeGranularity  # Required. Finest time granularity supported. Requests must use this granularity or coarser.
  data_type: string            # Required. Physical SQL data type of this time field column. Enum: date, timestamp, string, integer.
  format: string             # Required when data_type is 'string' or 'integer'. Temporal format pattern (e.g. 'yyyymmdd', 'yyyy-mm-dd', 'yyyymmddhh', 'hh', 'epoch_seconds'). Optional for date/timestamp types.
  required_prefix: string    # Required when format is 'hh' or 'h'. Field name of the date-format time field that provides date context for this hour-only field. Must reference a time field on the same dataset. Not allowed on fields with complete date or timestamp formats.
  # additionalProperties: false

metric_component_ref:
  metric: string  # Required. minLength: 1. Reference to a published semantic metric, e.g. 'metric.converted_users'.
  # additionalProperties: false

# MARIVO extension for Metric.
metric_extension:
  decomposition_semantics: DecompositionSemantics  # default: "sum". Determines decomposition strategy, not SQL aggregation.
    # Decision rule:
    #   - "sum" for additive quantities — delta_share decomposition, reconcileable delta.
    #   - "ratio" for proportions/rates — requires numerator+denominator, ratio decomposition.
    #   - "weighted_average" for ratio-of-sums — requires numerator+weight, within/mix decomposition.
  numerator: MetricComponentRef  # Required for ratio and weighted_average. For ratio: top of fraction. For weighted_average: value being weighted.
  denominator: MetricComponentRef  # Required for ratio. Bottom of fraction. Must not be defined for weighted_average.
  weight: MetricComponentRef  # Required for weighted_average. Segment weight. Must not be defined for ratio.
  # Conditional: ratio requires numerator+denominator; weighted_average requires numerator+weight; sum must not define any component refs.
  # additionalProperties: false

# Top-level semantic model definition
semantic_model:
  # Required: Unique identifier for the semantic model
  - name: string

    # Optional: Human-readable description of the semantic model
    description: string

    # Optional: Additional context for AI tools
    ai_context: AIContext

    # Required: Collection of logical datasets (fact and dimension tables)
    # minItems: 1
    datasets: []

    # Optional: Defines how logical datasets are connected
    relationships: []

    # Optional: Quantifiable measures spanning datasets
    metrics: []

    # No MARIVO custom extensions are defined for semantic models.
    # maxItems: 0
    custom_extensions: []

# Logical Dataset Schema
# Represents business entities or concepts (fact and dimension tables)
datasets:
  # Required: Unique identifier for the logical dataset
  - name: string

    # Required: Reference to the underlying physical table or view as a relation FQN
    # Format: schema.table or catalog.schema.table
    source: string

    # Optional: Primary key definition that uniquely identifies rows
    primary_key: string[]

    # Optional: Array of unique key definitions (each can be single or composite)
    unique_keys: string[][]

    # Optional: Human-readable description
    description: string

    # Optional: Additional context for AI tools
    ai_context: AIContext

    # Optional: Row-level fields for grouping, filtering, and metric expressions
    fields: Field[]

    # Optional: MARIVO dataset custom extension payload.
    custom_extensions: MarivoDatasetCustomExtension[]

# Relationship Schema
# Defines how logical datasets are connected (many-to-one or one-to-one)
relationships:
  # Required: Unique identifier for the relationship
  - name: string

    # Required: The logical dataset on the many side
    from: string

    # Required: The logical dataset on the one side
    to: string

    # Required: Foreign key columns in the 'from' dataset (minItems: 1)
    from_columns: string[]

    # Required: Primary/unique key columns in the 'to' dataset (minItems: 1)
    to_columns: string[]

    # Optional: Additional context for AI tools
    ai_context: AIContext

    # No MARIVO custom extensions are defined for relationships.
    # maxItems: 0
    custom_extensions: []

# Field Schema
# Represents row-level attributes for grouping, filtering, and metric expressions
# Conditional rule: if dimension.is_time == true → custom_extensions is required (minItems: 1, maxItems: 1);
#                   if dimension.is_time != true or dimension absent → custom_extensions maxItems: 0 (not allowed).
fields:
  # Required: Unique identifier for the field within the dataset
  - name: string

    # Required: Expression definition with multi-dialect support (minItems: 1)
    expression:
      dialects:
        - dialect: Dialect     # Required. Default: "ANSI_SQL"
          expression: string   # Required. SQL or dialect-specific scalar expression.

    # Optional: Dimension metadata
    dimension:
      is_time: boolean        # Indicates if this is a time-based dimension for temporal filtering

    # Optional: Label for categorization (e.g., "filter")
    label: string

    # Optional: Human-readable description
    description: string

    # Optional: Additional context for AI tools
    ai_context: AIContext

    # Conditional: MARIVO field custom extension payload.
    # Required when dimension.is_time is true (minItems: 1, maxItems: 1).
    # Not allowed when dimension.is_time is false/absent (maxItems: 0).
    custom_extensions: MarivoFieldCustomExtension[]

# Metrics Schema
# Quantitative measures defined on business data
metrics:
  # Required: Unique identifier for the metric
  - name: string

    # Required: Expression definition with multi-dialect support (minItems: 1)
    expression:
      dialects:
        - dialect: Dialect     # Required. Default: "ANSI_SQL"
          expression: string   # Required. Aggregate expression with aggregate functions. Row-level expressions without aggregates will produce incorrect SQL.

    # Optional: Human-readable description of what the metric measures
    description: string

    # Optional: Additional context for AI tools
    ai_context: AIContext

    # Optional: MARIVO metric custom extension payload.
    custom_extensions: MarivoMetricCustomExtension[]
