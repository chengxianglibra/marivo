version: 0.1.1

# OSI-Marivo Vendor Extensions v0.1 readable schema
#
# This YAML file follows the OSI core-spec style: enumerations are top-level
# fields, schema sections use snake_case names, and object shapes are written
# as readable contract sketches. The canonical machine-validation schema is
# osi-marivo.schema.json.

# Extension payload schemas

# MARIVO extension for Dataset.
dataset_extension:
  datasource_id: string        # Required. Marivo datasource reference for routing and schema resolution.

# MARIVO extension for Metric.
metric_extension:
  additive_dimensions:         # Dimension and time fields across which the metric is additive.
    - string
  sample_kind: string          # numeric | rate | binary | survival. Default: numeric. NOT NULL.

# OSI custom extension envelope for MARIVO dataset/metric payloads.
custom_extension:
  vendor_name: MARIVO
  data:
    object: dataset_extension | metric_extension
