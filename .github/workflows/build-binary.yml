name: Build Binary

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-13
            target: macos-x86_64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: windows-x86_64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install GNU make on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install make --no-progress -y

      - name: Bootstrap venv
        env:
          PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: |
          "$PYTHON" -m venv .venv
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            VENV_PYTHON=".venv/Scripts/python.exe"
          else
            VENV_PYTHON=".venv/bin/python"
          fi
          "$VENV_PYTHON" -m pip install --upgrade pip

      - name: Build binary
        run: make binary

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: marivo-${{ matrix.target }}
          path: |
            dist/pyinstaller/marivo_*.tar.gz
            dist/pyinstaller/marivo_*.zip
          if-no-files-found: error
