name: Build Binary

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-13
            target: macos-x86_64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (without duckdb)
        run: |
          python -m pip install --upgrade pip
          pip install --no-deps .
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller marivo.spec --noconfirm

      - name: Smoke test
        run: |
          ./dist/marivo/marivo --help
          ./dist/marivo/marivo serve --help

      - name: Package archive
        shell: bash
        run: |
          VERSION=$(python -c "import importlib.metadata; print(importlib.metadata.version('marivo'))")
          TARGET="${{ matrix.target }}"
          cd dist
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            7z a marivo_${VERSION}_${TARGET}.zip marivo/
          else
            tar czf marivo_${VERSION}_${TARGET}.tar.gz marivo/
          fi
          echo "Packaged: marivo_${VERSION}_${TARGET}.*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: marivo-${{ matrix.target }}
          path: |
            dist/marivo_*.tar.gz
            dist/marivo_*.zip
          if-no-files-found: error
