[pytest]
testpaths = tests
pythonpath = .
addopts = -n auto --dist=loadscope
# Restrict class collection to unittest.TestCase subclasses only.
# Without this, pytest tries to collect any class named Test* that appears in
# test files (including imported domain types like TestResultFinding), which
# produces PyptestCollectionWarning because TypedDicts have a non-standard __init__.
python_classes =
markers =
    slow: tests that take >10s (skip for quick CI with -m "not slow")
    mysql: tests that require MARIVO_TEST_MYSQL_DSN and a live MySQL server
