# Marivo configuration file
# Copy to marivo.yaml (or set MARIVO_CONFIG env var) to activate.
#
# Sources listed here are auto-registered and synced on app startup.
# Engines listed here are auto-registered on app startup.
# Registration is idempotent — restarting the app won't create duplicates.

sources:
  # Local demo catalog (ships with Marivo, no external dependencies)
  - name: "Local Demo"
    type: duckdb
    connection: {}

engines:
  - name: "Local DuckDB"
    type: duckdb
    connection:
      path: data/mvp.duckdb

  # Trino example
  # - name: "Trino Prod"
  #   type: trino
  #   connection:
  #     host: trino.internal
  #     port: 8080
  #     user: marivo
  #     catalog: hive
  #     schema: default

bindings:
  - source: "Local Demo"
    engine: "Local DuckDB"
    priority: 10
    namespace: {}

