# Marivo runtime configuration file.
# Copy to marivo.yaml, or set MARIVO_CONFIG to this file.
#
# Source, engine, and mapping inventory is managed through the HTTP API.
# Do not add sources, engines, bindings, or mappings to this file.

metadata:
  # Local development default.
  engine: sqlite
  path: .marivo/metadata.sqlite

# Production shared metadata store example.
# MySQL metadata stores Marivo control-plane state only; it is not a source
# adapter and not an execution engine. Render secrets into this file from your
# deployment secret manager, or use a DSN supplied by the runtime environment.
#
# metadata:
#   engine: mysql
#   dsn: mysql+pymysql://marivo:${MARIVO_METADATA_PASSWORD}@mysql.internal:3306/marivo_metadata?connect_timeout=10&pool_size=5&ssl=true
#
# Equivalent explicit-field form:
#
# metadata:
#   engine: mysql
#   host: mysql.internal
#   port: 3306
#   database: marivo_metadata
#   user: marivo
#   password: ${MARIVO_METADATA_PASSWORD}
#   connect_timeout: 10
#   pool_size: 5
#   ssl: true

observability:
  log_level: INFO
  metrics_enabled: true

governance:
  enabled: true

