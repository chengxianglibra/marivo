version: 0.2.0

# AOI - Analysis Operation Interface v0.2 readable schema
#
# This YAML file follows the OSI core-spec style: enumerations are top-level
# fields, schema sections use snake_case names, and object shapes are written
# as readable contract sketches. The canonical machine-validation schema is
# aoi.schema.json.

# Enumerations

# Supported bucket sizes for time-bucketed requests and result points.
time_granularities:
  - hour      # Calendar hour bucket.
  - day       # Calendar day bucket.
  - week      # Calendar week bucket.
  - month     # Calendar month bucket.
  - quarter   # Calendar quarter bucket.
  - year      # Calendar year bucket.

# Supported comparison modes for compare requests.
compare_types:
  - normal                       # Pair time-series buckets by relative position in the input artifact windows.
  - holiday_aligned              # Align time-series buckets by holiday calendar, falling back to relative position.
  - weekday_aligned              # Align time-series buckets by weekday, falling back to relative position.
  - holiday_and_weekday_aligned  # Align by holiday calendar, then weekday, then relative position.

# Statistical test families supported by hypothesis test requests.
hypothesis_families:
  - two_sample_mean        # Difference in means between two independent samples.

# Direction of the statistical alternative hypothesis.
hypothesis_alternatives:
  - two_sided  # Test for any difference.
  - greater    # Test whether left is greater than right.
  - less       # Test whether left is less than right.

# Agent-facing significance presets for hypothesis test requests.
hypothesis_significances:
  - conservative  # Strict threshold; internally resolves to alpha=0.01.
  - balanced      # Default threshold; internally resolves to alpha=0.05.
  - aggressive    # Exploratory threshold; internally resolves to alpha=0.10.

# Supported measurement kinds for test requests.
test_kinds:
  - numeric  # Numeric metric test.

# Supported correlation methods.
correlation_methods:
  - pearson   # Linear correlation coefficient.
  - spearman  # Rank correlation coefficient.

# Supported anomaly detection strategies.
detect_strategies:
  - point_anomaly  # Detect anomalous buckets within the scan window.
  - period_shift   # Detect whole-period level shifts against the previous adjacent window.

# Supported anomaly detection sensitivity presets.
detect_sensitivities:
  - conservative  # Stricter candidate inclusion.
  - balanced      # Balanced candidate inclusion.
  - aggressive    # Broader candidate inclusion; default.

# Foundation primitives

# Multi-dialect boolean filter expression, following the OSI Expression shape.
expression:
  # Required: one or more dialect-specific boolean expressions.
  dialects:
    # One expression variant for a concrete SQL dialect.
    - dialect: string       # Optional. Recommended values use uppercase snake case, e.g. ANSI_SQL.
      expression: string    # Required. Boolean expression in the declared dialect.

# Absolute time slice used by requests and result caveats.
time_scope:
  # Required: OSI dataset field that provides the time values for this slice.
  field: string

  # Required: inclusive/exclusive time range semantics are implementation-defined by the caller contract.
  start: iso8601_datetime   # Required: range start timestamp.
  end: iso8601_datetime     # Required: range end timestamp.

# Map of dimension or split names to their string values.
dimension_key_map:
  # Required: arbitrary dimension names are object keys; values are normalized string labels.
  additional_properties: string

# Scalar dimension value used for contribution keys.
dimension_value:
  # Required: concrete scalar value type.
  type: string_or_number_or_boolean

  # Required: true because null is a valid dimension value when the grouped dimension is null or missing.
  nullable: true

# Blocking failure returned instead of a result.
analysis_failure:
  # Required: portable machine-readable failure code scoped by intent, e.g. compare.scope_mismatch.
  code: string

  # Required: portable human-readable failure explanation.
  message: string

# Statistical hypothesis configuration for test requests.
hypothesis:
  # Required: statistical test family, one of hypothesis_families.
  family: hypothesis_families

  # Required: alternative hypothesis direction, one of hypothesis_alternatives.
  alternative: hypothesis_alternatives

  # Required: significance preset, one of hypothesis_significances.
  significance: hypothesis_significances

# Paired source slice used by test requests.
slice:
  # Required: time range for this side of the test.
  time_scope: time_scope

  # Optional: filter expression for this side of the test. Omit when there is no filter.
  filter: expression

# Requests

# Observe a metric as a metric_frame artifact. Shape is derived from optional
# granularity and dimensions.
observe:
  # Required: metric identifier to observe.
  metric: string

  # Required: analysis time range.
  time_scope: time_scope

  # Optional: filter expression. Omit when there is no filter.
  filter: expression

  # Optional: time axis grain. When present, observe returns a time_series or panel metric_frame.
  granularity: time_granularities

  # Optional: dimension axes. When present, observe returns a segmented or panel metric_frame.
  dimensions: string[]

# Compare two upstream artifacts and produce a delta result.
compare:
  # Required: artifact_id for the current input artifact.
  current_artifact_id: string

  # Required: artifact_id for the baseline input artifact.
  baseline_artifact_id: string

  # Optional: alignment strategy from compare_types; omitted means normal.
  compare_type: compare_types

# Decompose a compare result by one dimension.
decompose:
  # Required: artifact_id of the compare artifact to decompose.
  compare_artifact_id: string

  # Required: dimension name used for attribution.
  dimension: string

  # Optional: maximum number of contribution rows to return, range [1, +infinity).
  limit: integer

# Correlate two upstream time-series artifacts.
correlate:
  # Required: artifact_id for the left time-series artifact.
  left_artifact_id: string

  # Required: artifact_id for the right time-series artifact.
  right_artifact_id: string

  # Optional: correlation method, one of correlation_methods.
  method: correlation_methods

  # Optional: minimum aligned numeric pair count required to run, range [1, +infinity).
  min_pairs: integer

# Detect anomalous buckets or segments for a metric.
detect:
  # Required: metric identifier to inspect.
  metric: string

  # Required: analysis time range.
  time_scope: time_scope

  # Required: bucket size for anomaly detection, one of time_granularities.
  granularity: time_granularities

  # Optional: filter expression. Omit when there is no filter.
  filter: expression

  # Optional: single dimension used to split independent anomaly series.
  dimension: string

  # Required: detection strategy, one of detect_strategies.
  strategy: detect_strategies

  # Optional: detection sensitivity preset, one of detect_sensitivities. Omitted means aggressive.
  sensitivity: detect_sensitivities

  # Optional: maximum number of anomaly candidates to return, range [1, +infinity).
  limit: integer

# Run a statistical test between two source slices.
test:
  # Required: metric identifier to test.
  metric: string

  # Required: current source slice.
  current: slice

  # Required: baseline source slice.
  baseline: slice

  # Required: statistical sample grain used to split each source slice into observations, one of time_granularities.
  grain: time_granularities

  # Required: metric kind, one of test_kinds.
  kind: test_kinds

  # Required: hypothesis configuration.
  hypothesis: hypothesis

# Forecast future values from an upstream time-series artifact.
forecast:
  # Required: artifact_id of the source time-series artifact.
  source_artifact_id: string

  # Required: number of future buckets to forecast, range [1, +infinity).
  horizon: integer

# Derived requests

# Validate a metric difference by wrapping a fixed-family hypothesis test.
validate:
  # Required: metric identifier to validate.
  metric: string

  # Required: current source slice.
  current: slice

  # Required: baseline source slice.
  baseline: slice

  # Required: statistical sample grain passed to the wrapped hypothesis test, one of time_granularities.
  grain: time_granularities

  # Required: hypothesis configuration.
  hypothesis: hypothesis

# Attribute a metric difference by wrapping observe + compare + decompose.
attribute:
  # Required: metric identifier to attribute.
  metric: string

  # Required: current source slice.
  current: slice

  # Required: baseline source slice.
  baseline: slice

  # Required: one or more dimensions used for attribution.
  dimensions: string[]

  # Optional: decomposition method. Omitted means delta_share.
  decomposition_method: delta_share

  # Optional: maximum driver rows per dimension, range [1, +infinity). Omitted means 5.
  decomposition_limit: integer

# Diagnose anomalies by wrapping detect, observe, compare, and decompose.
diagnose:
  # Required: semantic metric identifier to diagnose. Diagnose runs against exactly one metric.
  metric: string

  # Required: time range scanned by the internal detect step before follow-up diagnosis.
  time_scope: time_scope

  # Required: time bucket granularity used by the internal detect scan.
  granularity: time_granularities

  # Optional: AOI Expression applied to candidate detection and follow-up observe/compare/decompose.
  filter: expression

  # Optional: split internal detect into independent series by this dimension.
  # This controls anomaly scanning only; omit it to scan the overall metric series.
  # It is independent from dimensions.
  scan_dimension: string

  # Required: one or more dimensions used for attribution follow-up after candidates are found.
  # These drive follow-up decompose steps and are independent from scan_dimension.
  dimensions: string[]

  # Required: detection strategy passed to the internal detect step.
  strategy: detect_strategies

  # Optional: detection sensitivity preset passed to the internal detect step. Omitted means aggressive.
  sensitivity: detect_sensitivities

  # Optional: maximum anomaly candidates to diagnose end-to-end. Omitted means 3.
  # This bounds follow-up candidates, not driver rows.
  candidate_limit: integer

  # Optional: maximum driver rows per dimension, range [1, +infinity). Omitted means 5.
  # This bounds each decompose result, not how many candidates are diagnosed.
  decomposition_limit: integer

# Artifact envelope and result variants

# Shared artifact envelope returned by every AOI operation.
artifact:
  # Required: stable artifact identifier.
  artifact_id: string

  # Present on success. Exactly one of result or failure must be present.
  result:
    # Result body must match one of the AOI result schemas below.
    one_of:
      - delta_frame_artifact           # Compare delta frame artifact.
      - attribution_frame_artifact     # Ranked contribution frame for a compare result.
      - anomaly_candidates_result      # Ranked anomalous buckets or segments.
      - association_result             # Correlation/association statistics.
      - hypothesis_test_result         # Statistical hypothesis test output.
      - forecast_series_result         # Forecasted future time-series values.

  # Present on blocking failure. Exactly one of result or failure must be present.
  failure: analysis_failure

# Observe metric frame artifact

# Successful artifact returned by observe.
metric_frame_artifact:
  artifact_id: string
  artifact_family: metric_frame
  shape: scalar | time_series | segmented | panel
  subject:
    kind: metric
    metric_ref: string
    time_scope: time_scope
    scope:
      current_value: number | null
      baseline_value: number | null
      delta_abs: number | null
      delta_pct: number | null
      direction: increase | decrease | flat | undefined
  axes:
    - kind: time | dimension
      grain: time_granularities
      name: string
  measures:
    - id: value
      value_type: number
      nullable: true
      unit: string
  payload:
    series:
      - keys: object
        points:
          - window:
              start: iso8601_datetime
              end: iso8601_datetime
            value: number

# Compare delta frame artifact

# Successful artifact returned by compare.
delta_frame_artifact:
  artifact_id: string
  artifact_family: delta_frame
  shape: scalar_delta | time_series_delta | segmented_delta | panel_delta
  subject:
    kind: comparison
    metric_ref: string
    current:
      time_scope: time_scope
      scope: object
    baseline:
      time_scope: time_scope
      scope: object
  axes:
    - kind: time | dimension | comparison_side
      grain: time_granularities
      name: string
  measures:
    - id: delta_abs | delta_pct
      value_type: number
      nullable: true
      unit: string
  payload:
    series:
      - keys: object
        points:
          - window:
              start: iso8601_datetime
              end: iso8601_datetime
            current_value: number
            baseline_value: number
            delta_abs: number
            delta_pct: number
            direction: increase | decrease | flat | undefined
            presence: both | current_only | baseline_only
    scope:
      current_value: number
      baseline_value: number
      delta_abs: number
      delta_pct: number
      direction: increase | decrease | flat | undefined

# Decompose, detect, correlate, test, and forecast results

# Artifact returned by decompose requests.
attribution_frame_artifact:
  artifact_id: string
  artifact_family: attribution_frame
  shape: ranked_contributions
  subject:
    kind: comparison
    metric_ref: string
    current:
      time_scope: time_scope
      scope: object
    baseline:
      time_scope: time_scope
      scope: object
  axes:
    - kind: dimension
      name: string
  measures:
    - id: contribution_abs
      value_type: number
      nullable: false
    - id: contribution_pct
      value_type: number
      nullable: true
  capabilities:
    - filterable
  lineage:
    operation: decompose
    source_artifact_ids: string[]
  payload:
    series:
      - keys: dimension_key_map
        points:
          - contribution_abs: number
            contribution_pct: number | null
            current_value: number | null
            baseline_value: number | null
            # Optional interpretive metadata for current/baseline membership;
            # not a delta measure or readiness/status flag.
            presence: both | current_only | baseline_only
            rank: integer
    scope: object
    quality:
      reconciliation_status: string | null
      reconciliation_gap: number | null
      confidence_grade: string | null
      unexplained_delta_abs: number | null
      unexplained_pct: number | null
      unexplained_reason: string | null

# Result for detect requests.
anomaly_candidates_result:
  # Required: ranked anomaly candidates.
  items:
    # One anomaly candidate.
    - item_id: string                         # Required: stable row identifier.
      bucket_start: iso8601_datetime          # Required: bucket start timestamp.
      value: number                           # Required: observed metric value; range follows the metric domain. Higher/lower has the metric's normal business meaning.
      score: number                           # Required: anomaly score, range [0, +infinity). Higher means more anomalous within the same implementation and scoring profile.
      series_keys: dimension_key_map          # Required, nullable: split-series dimension values. Null means unsplit series.

# Result for correlate requests.
association_result:
  # Required: correlation or association coefficient, range [-1, 1].
  # Higher positive values mean stronger positive association; values near 0 mean weak/no association under the chosen method; lower negative values mean stronger inverse association.
  coefficient: number

  # Required, nullable: p-value when available. Null means unavailable. Range is [0, 1]; lower means stronger evidence against the null association model.
  p_value: number

  # Required: number of matched observation pairs used, range [0, +infinity). Higher usually means a more stable estimate, subject to data quality.
  n_pairs: integer

  # Required, nullable: time range actually matched. Null means the full referenced scope was used.
  matched_time_scope: time_scope

# Result for test requests.
hypothesis_test_result:
  # Required: test statistic. Range and sign semantics are hypothesis-family specific; larger absolute values usually mean stronger separation from the null model.
  statistic: number

  # Required: p-value for the test. Range is [0, 1]; lower means stronger evidence against the null hypothesis.
  p_value: number

  # Required: hypothesis decision.
  decision:
    # Required, nullable: true when the null hypothesis is rejected; false when not; null when undecidable.
    reject_null: boolean

  # Required: non-blocking caveats about assumptions; empty string list when none are reported.
  assumption_notes: string[]

# Result for forecast requests.
forecast_series_result:
  # Required: forecasted values by future bucket.
  points:
    # One forecasted point.
    - bucket_start: iso8601_datetime # Required: forecast bucket start timestamp.
      value: number                  # Required: forecast metric value; range follows the metric domain. Higher/lower has the metric's normal business meaning.
      ci_low: number                # Required, nullable: lower confidence interval bound in metric units. Null means unavailable. When present with ci_high, must be <= ci_high; lower values mean a lower plausible outcome.
      ci_high: number               # Required, nullable: upper confidence interval bound in metric units. Null means unavailable. When present with ci_low, must be >= ci_low; higher values mean a higher plausible outcome.
