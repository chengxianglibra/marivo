version: 0.3.0-draft

# AOI - Analysis Operation Interface v0.3 readable schema draft.
#
# This file is a design-side schema sketch derived from aoi-v0.3-design.md.
# It documents the target artifact algebra contract in docs/specs/analysis and
# does not replace the canonical published package at aoi-spec/schema/.
#
# Style note: this follows the existing readable YAML schema style rather than
# JSON Schema draft syntax. Field names, unions, and comments are normative
# design guidance for the v0.3 contract.

schema_status:
  status: design_draft
  source_design: docs/specs/analysis/aoi-v0.3-design.md
  canonical_package_target: aoi-spec/schema/aoi.schema.yaml
  compatibility:
    breaking_from_v0_2: true
    preserves_v0_2_result_failure_wrapper: false

# Enumerations

aoi_operations:
  - observe
  - compare
  - decompose
  - correlate
  - detect
  - test
  - forecast
  - validate
  - attribute
  - diagnose

atomic_operations:
  - observe
  - compare
  - decompose
  - correlate
  - detect
  - test
  - forecast

derived_operations:
  - validate
  - attribute
  - diagnose

artifact_families:
  - metric_frame
  - delta_frame
  - candidate_set
  - attribution_frame
  - association_result
  - forecast_frame
  - hypothesis_test_result
  - diagnosis_result

artifact_capabilities:
  - sliceable
  - filterable
  - rollupable
  - comparable
  - decomposable
  - testable
  - forecastable

artifact_axes:
  - time
  - dimension
  - candidate
  - comparison_side
  - sample_group

transform_kinds:
  - slice
  - filter
  - rollup
  - summarize_samples

# Inline transforms are not AOI operations. They modify an artifact input inside
# a consuming operation and never create public artifacts or artifact_ids.
non_operation_transforms:
  - slice
  - filter
  - rollup
  - summarize_samples

time_granularities:
  - hour
  - day
  - week
  - month
  - quarter
  - year

compare_types:
  - normal
  - holiday_aligned
  - weekday_aligned
  - holiday_and_weekday_aligned

correlation_methods:
  - pearson
  - spearman

detect_strategies:
  - point_anomaly
  - period_shift

detect_sensitivities:
  - conservative
  - balanced
  - aggressive

hypothesis_families:
  - two_sample_mean

hypothesis_alternatives:
  - two_sided
  - greater
  - less

hypothesis_significances:
  - conservative
  - balanced
  - aggressive

test_kinds:
  - numeric

failure_code_families:
  - envelope
  - artifact_ref
  - transform
  - capability
  - operation
  - manifest

manifest_node_statuses:
  - succeeded
  - failed
  - skipped

# Foundation primitives

analysis_failure:
  # Required: portable blocking failure code. The prefix before the first dot
  # must be one of failure_code_families.
  code: string

  # Required: portable human-readable explanation.
  message: string

  # Optional: stable structured details. Implementations must not rely on this
  # field to replace a portable code.
  details: object

artifact_ref:
  # Required: identity of a public AOI artifact.
  artifact_id: string

axis_ref:
  # Required: one of artifact_axes.
  axis: artifact_axes

  # Optional: stable semantic field or dimension identifier backing the axis.
  ref: string

measure_ref:
  # Required: shape-scoped measure id, interpreted by family + shape.
  measure: string

  # Optional: display or semantic backing ref for the measure.
  ref: string

subject_scope_ref:
  # Optional: reusable semantic scope identity.
  scope_ref: string

  # Optional: time window covered by this subject.
  time_scope: time_scope

  # Optional: structured source constraints.
  filter: expression

expression:
  # Required: one or more dialect-specific boolean expressions. Transform guard
  # must validate dialect, fields, functions, and injection boundaries before
  # query compilation.
  dialects:
    - dialect: string
      expression: string

time_scope:
  field: string
  start: iso8601_datetime
  end: iso8601_datetime

candidate_selector:
  # Required: stable selector for a candidate emitted by candidate_set.
  candidate_id: string

  # Optional: candidate-specific axis selectors, such as time or dimension.
  selectors: object

sample_group_selector:
  # Required: stable group label used for sample summary inputs.
  group: string

  # Optional: group-specific source filter.
  filter: expression

time_selector:
  start: iso8601_datetime
  end: iso8601_datetime

dimension_selector:
  dimension: string
  value: string_or_number_or_boolean_or_null

sample_group_selector_ref:
  group: string

horizon:
  buckets: integer
  granularity: time_granularities

hypothesis:
  family: hypothesis_families
  alternative: hypothesis_alternatives
  significance: hypothesis_significances

source_slice:
  time_scope: time_scope
  filter: expression

# Artifact algebra

artifact_subject:
  # Discriminated union keyed by kind. Subject must never degrade to an
  # unconstrained map.
  metric:
    kind: metric
    metric_ref: string
    scope: subject_scope_ref

  comparison:
    kind: comparison
    metric_ref: string
    current: subject_scope_ref
    baseline: subject_scope_ref

  candidate:
    kind: candidate
    metric_ref: string
    candidate_selector: candidate_selector

  hypothesis:
    kind: hypothesis
    hypothesis_ref: string
    metric_ref: string
    groups: sample_group_selector[]

  diagnosis:
    kind: diagnosis
    metric_ref: string
    candidate_selector: candidate_selector

artifact_lineage:
  # Required: operation that produced the public artifact.
  producing_operation: aoi_operations

  # Required: source artifacts consumed by the producing operation. Empty list
  # is valid for source-style observe or unresolved failures before refs exist.
  source_artifacts: artifact_ref[]

  # Required: normalized inline transforms applied before consumption.
  applied_transforms: normalized_transform[]

  # Optional: manifest id when the artifact was produced inside a derived
  # operation expansion.
  manifest_id: string

artifact_input:
  # Required: referenced public artifact.
  artifact_id: string

  # Optional: transforms applied in declaration order by the consuming
  # operation. These do not produce public artifacts.
  transforms: transform[]

transform:
  # Discriminated union keyed by kind.
  slice:
    kind: slice
    axis: artifact_axes
    selector: time_selector_or_dimension_selector_or_candidate_selector_or_sample_group_selector

  filter:
    kind: filter
    predicate: expression

  rollup:
    kind: rollup
    target_axes: axis_ref[]
    aggregation_policy: metric_default

  summarize_samples:
    kind: summarize_samples
    grain: time_granularities
    groups: sample_group_selector[]

normalized_transform:
  # Same semantic union as transform after schema normalization and reference
  # resolution. Public lineage records normalized transforms, not private query
  # plans or storage locators.
  kind: transform_kinds
  normalized_args: object

artifact_envelope:
  # Discriminated union by success/failure shape.
  successful:
    artifact_id: string
    artifact_family: artifact_families
    shape: string
    subject: artifact_subject
    axes: axis_ref[]
    measures: measure_ref[]
    capabilities: artifact_capabilities[]
    lineage: artifact_lineage
    payload: family_specific_payload

    # Illegal on successful artifacts.
    failure: forbidden
    failure_stage: forbidden

  resolved_failed:
    artifact_id: string
    failure_stage: resolved
    artifact_family: artifact_families
    shape: string
    subject: artifact_subject
    axes: axis_ref[]
    measures: measure_ref[]
    capabilities: []
    lineage: artifact_lineage
    failure: analysis_failure

    # Illegal on failed artifacts.
    payload: forbidden

  unresolved_failed:
    artifact_id: string
    failure_stage: unresolved
    operation: aoi_operations

    # Optional only when a complete legal subject branch is already known.
    subject: artifact_subject

    lineage: artifact_lineage
    failure: analysis_failure

    # Illegal on unresolved failures; do not fabricate resolved metadata.
    artifact_family: forbidden
    shape: forbidden
    axes: forbidden
    measures: forbidden
    capabilities: forbidden
    payload: forbidden

attribution_frame_artifact:
  artifact_id: string
  artifact_family: attribution_frame
  shape: ranked_contributions
  subject:
    kind: comparison
    metric_ref: string
    current:
      time_scope: time_scope
      scope: object
    baseline:
      time_scope: time_scope
      scope: object
  axes:
    - kind: dimension
      name: string
  measures:
    - id: contribution_abs
      value_type: number
      nullable: false
    - id: contribution_pct
      value_type: number
      nullable: true
  capabilities:
    - filterable
  lineage:
    operation: decompose
    source_artifact_ids: string[]
  payload:
    series:
      - keys: dimension_key_map
        points:
          - contribution_abs: number
            contribution_pct: number | null
            current_value: number | null
            baseline_value: number | null
            # Optional interpretive metadata for current/baseline membership;
            # not a delta measure or readiness/status flag.
            presence: both | current_only | baseline_only
            rank: integer
    scope: object
    quality:
      reconciliation_status: string | null
      reconciliation_gap: number | null
      confidence_grade: string | null
      unexplained_delta_abs: number | null
      unexplained_pct: number | null
      unexplained_reason: string | null

# Registry summary

artifact_registry:
  # The eventual public package should materialize this as a machine-readable
  # source such as aoi-spec/registry/artifact-registry.yaml. This design-side
  # summary captures the intended family/shape compatibility matrix.
  version: 0.3.0-draft

  families:
    metric_frame:
      shapes:
        scalar:
          required_axes: []
          measures: [value]
          capabilities: [comparable, filterable]
          transforms: [filter, summarize_samples]
          consumers: [compare, attribute, validate]

        time_series:
          required_axes: [time]
          measures: [value]
          capabilities: [sliceable, filterable, rollupable, comparable, forecastable, testable]
          transforms: [slice, filter, rollup, summarize_samples]
          consumers: [compare, correlate, detect, forecast, test]

        segmented:
          required_axes: [dimension]
          measures: [value]
          capabilities: [sliceable, filterable, rollupable, comparable]
          transforms: [slice, filter, rollup]
          consumers: [compare, attribute]

        panel:
          required_axes: [time, dimension]
          measures: [value]
          capabilities: [sliceable, filterable, rollupable, comparable]
          transforms: [slice, filter, rollup, summarize_samples]
          consumers: [compare, detect, forecast]
          notes: forecast requires an effective single time_series after slice or rollup.

        sample_summary:
          required_axes: [sample_group]
          measures: [n, mean, stddev]
          capabilities: [testable]
          transforms: []
          consumers: [test, validate]

    delta_frame:
      shapes:
        scalar_delta:
          required_axes: [comparison_side]
          measures: [delta_abs, delta_pct]
          capabilities: [filterable, decomposable]
          transforms: [filter]
          consumers: [decompose, attribute, diagnose]

        time_series_delta:
          required_axes: [time, comparison_side]
          measures: [delta_abs, delta_pct]
          capabilities: [sliceable, filterable, decomposable]
          transforms: [slice, filter]
          consumers: [decompose, attribute, diagnose]

        segmented_delta:
          required_axes: [dimension, comparison_side]
          measures: [delta_abs, delta_pct]
          capabilities: [sliceable, filterable, decomposable]
          transforms: [slice, filter]
          consumers: [decompose, attribute, diagnose]

        panel_delta:
          required_axes: [time, dimension, comparison_side]
          measures: [delta_abs, delta_pct]
          capabilities: [sliceable, filterable, decomposable]
          transforms: [slice, filter]
          consumers: [decompose, attribute, diagnose]

    candidate_set:
      shapes:
        ranked_candidates:
          required_axes: [candidate]
          measures: [score, value]
          capabilities: [sliceable]
          transforms: [slice]
          consumers: [diagnose]

    attribution_frame:
      shapes:
        ranked_contributions:
          required_axes: [dimension]
          measures: [contribution_abs, contribution_pct]
          capabilities: [filterable]
          transforms: [filter]
          consumers: []
          read_surface: projection

    association_result:
      shapes:
        pairwise_association:
          required_axes: []
          measures: [coefficient, p_value]
          capabilities: []
          transforms: []
          consumers: []
          read_surface: projection

    forecast_frame:
      shapes:
        forecast_series:
          required_axes: [time]
          measures: [forecast_value, ci_low, ci_high]
          capabilities: [sliceable]
          transforms: [slice]
          consumers: []
          read_surface: projection

    hypothesis_test_result:
      shapes:
        two_sample_mean:
          required_axes: []
          measures: [statistic, p_value]
          capabilities: []
          transforms: []
          consumers: [validate]
          read_surface: projection

    diagnosis_result:
      shapes:
        candidate_diagnoses:
          required_axes: [candidate]
          measures: [candidate_status]
          capabilities: [sliceable]
          transforms: [slice]
          consumers: []
          read_surface: projection

  transform_rules:
    slice:
      requires_capability: sliceable
      selector_axes: [time, dimension, candidate, sample_group]
      effect: narrows rows, window, or selector and may change effective shape.
      failure_family: transform

    filter:
      requires_capability: filterable
      effect: narrows rows without changing axis definitions.
      failure_family: transform

    rollup:
      requires_capability: rollupable
      effect: removes or coarsens axes using OSI metric aggregation semantics.
      failure_family: capability

    summarize_samples:
      requires_capability: testable
      effect: creates effective metric_frame(sample_summary) inside the consuming operation only.
      failure_family: capability

  consumer_rules:
    compare:
      accepts: metric_frame with comparable capability.
      output_family: delta_frame

    decompose:
      accepts: delta_frame with decomposable capability.
      output_family: attribution_frame

    correlate:
      accepts: two effective metric_frame(time_series) inputs.
      output_family: association_result

    detect:
      accepts: effective scan-ready metric_frame(time_series) or metric_frame(panel), plus source-style convenience input.
      output_family: candidate_set

    test:
      accepts: two effective metric_frame(sample_summary) inputs.
      output_family: hypothesis_test_result

    forecast:
      accepts: one effective metric_frame(time_series) input.
      output_family: forecast_frame

    validate:
      accepts: source slices or sample_summary artifact inputs plus hypothesis.
      output_family: hypothesis_test_result

    attribute:
      accepts: comparable metric_frame inputs or source-style slices plus dimensions.
      output_family: attribution_frame

    diagnose:
      accepts: scan-ready metric_frame or source-style scan scope plus dimensions.
      output_family: diagnosis_result

# Requests

requests:
  observe:
    operation: observe

    # Required: metric identifier to observe.
    metric: string

    # Required: analysis time range.
    time_scope: time_scope

    # Optional: source filter.
    filter: expression

    # Optional: requests time_series or panel output when present.
    granularity: time_granularities

    # Optional: requests segmented or panel output when non-empty.
    dimensions: string[]

    # Output: metric_frame(scalar | time_series | segmented | panel).
    output: artifact_envelope

  compare:
    operation: compare

    # Required: current and baseline metric_frame artifact inputs.
    current: artifact_input
    baseline: artifact_input

    # Optional: alignment strategy; omitted means normal.
    compare_type: compare_types

    # Output: delta_frame.
    output: artifact_envelope

  decompose:
    operation: decompose

    # Required: delta_frame input.
    source: artifact_input

    # Required: dimension name used for attribution.
    dimension: string

    # Optional: maximum number of contribution rows.
    limit: integer

    # Output: attribution_frame(ranked_contributions).
    output: artifact_envelope

  correlate:
    operation: correlate

    # Required: effective metric_frame(time_series) inputs.
    left: artifact_input
    right: artifact_input

    # Optional: correlation method.
    method: correlation_methods

    # Optional: minimum aligned numeric pair count.
    min_pairs: integer

    # Output: association_result(pairwise_association).
    output: artifact_envelope

  detect:
    operation: detect

    # Preferred v0.3 artifact-DAG input.
    source: artifact_input

    # Source-style convenience input, lowered to an observe/detect logical DAG.
    metric: string
    time_scope: time_scope
    granularity: time_granularities
    filter: expression
    dimension: string

    strategy: detect_strategies
    sensitivity: detect_sensitivities
    limit: integer

    # Output: candidate_set(ranked_candidates).
    output: artifact_envelope

  test:
    operation: test

    # Required: effective metric_frame(sample_summary) inputs. Callers may use
    # summarize_samples inline transforms on metric_frame inputs to satisfy this.
    current: artifact_input
    baseline: artifact_input

    kind: test_kinds
    hypothesis: hypothesis

    # Output: hypothesis_test_result(two_sample_mean).
    output: artifact_envelope

  forecast:
    operation: forecast

    # Required: effective metric_frame(time_series) input.
    source: artifact_input

    # Required: forecast horizon.
    horizon: horizon

    # Output: forecast_frame(forecast_series).
    output: artifact_envelope

  validate:
    operation: validate

    # Preferred v0.3 artifact inputs: effective sample_summary inputs.
    current: artifact_input
    baseline: artifact_input

    # Source-style convenience input, lowered to observe -> summarize_samples -> test.
    metric: string
    current_slice: source_slice
    baseline_slice: source_slice
    grain: time_granularities

    hypothesis: hypothesis

    # Output: primary hypothesis_test_result artifact plus optional manifest.
    output: derived_response

  attribute:
    operation: attribute

    # Preferred v0.3 artifact inputs: comparable metric_frame inputs.
    current: artifact_input
    baseline: artifact_input

    # Source-style convenience input, lowered to observe -> compare -> decompose.
    metric: string
    current_slice: source_slice
    baseline_slice: source_slice
    dimensions: string[]
    compare_type: compare_types
    limit: integer

    # Output: primary attribution_frame artifact plus optional manifest.
    output: derived_response

  diagnose:
    operation: diagnose

    # Preferred v0.3 artifact input: scan-ready metric_frame.
    source: artifact_input

    # Source-style convenience input, lowered to detect -> candidate slice ->
    # compare -> decompose.
    metric: string
    time_scope: time_scope
    granularity: time_granularities
    filter: expression
    dimensions: string[]
    strategy: detect_strategies
    sensitivity: detect_sensitivities
    limit: integer

    # Output: primary diagnosis_result artifact plus optional manifest.
    output: derived_response

# Responses

operation_response:
  # Required: primary operation output artifact. May be successful, resolved
  # failed, or unresolved failed.
  artifact: artifact_envelope

derived_response:
  # Required: primary output artifact for validate, attribute, or diagnose.
  artifact: artifact_envelope

  # Optional: deterministic expansion record for derived operations.
  manifest: execution_manifest

execution_manifest:
  # ExecutionManifest is not an artifact family and is never a downstream AOI
  # artifact input.
  manifest_id: string
  root_operation: derived_operations
  primary_artifact_id: string
  nodes: execution_node[]
  edges: execution_edge[]

execution_node:
  node_id: string
  operation: aoi_operations
  inline_transforms: transform[]
  status: manifest_node_statuses
  output_artifact_id: string
  failure_code: string

execution_edge:
  from_node_id: string
  to_node_id: string
  artifact_id: string

validation_notes:
  - Success and failure are mutually exclusive: success has payload and no failure; failure has failure and no payload.
  - Resolved failures expose family, shape, axes, and measures but must have empty capabilities.
  - Unresolved failures must not fabricate artifact_family, shape, axes, measures, or capabilities.
  - Failure codes must use one of the stable failure_code_families as their prefix.
  - Transform validation must fail closed before query compilation or artifact consumption.
  - Projection is a read/presentation surface, not a canonical transform and not a downstream artifact input.
  - ExecutionManifest is an audit/debug expansion record, not an artifact family.
  - Public lineage excludes engine id, query hash, wall time, debug SQL, storage locator, and other Marivo-private execution details.
